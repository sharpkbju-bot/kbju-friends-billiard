<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Billiard World Pro</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent-primary: #3b82f6; /* Electric Blue */
            --accent-gold: #fbbf24;    /* Gold for 1st */
            --accent-danger: #f43f5e;  /* Neon Red for Loser */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            padding-bottom: 100px; /* For Bottom Nav */
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 40px 20px 20px;
            background: linear-gradient(to bottom, #1e293b, var(--bg-deep));
            text-align: left;
        }
        header h1 { font-size: 24px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        header p { color: var(--text-dim); font-size: 14px; margin: 5px 0 0; }

        /* Main Container */
        .container { padding: 0 20px; }

        /* Tab Content */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Summary Card */
        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Leaderboard Table */
        .stats-table { width: 100%; border-collapse: collapse; }
        .stats-table th { color: var(--text-dim); font-size: 12px; padding: 10px 5px; text-align: center; border-bottom: 1px solid #334155; }
        .stats-table td { padding: 15px 5px; text-align: center; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .rank-name { font-weight: 700; text-align: left !important; padding-left: 10px !important; }

        /* Input Styles */
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; color: var(--text-dim); font-size: 12px; margin-bottom: 8px; font-weight: 600; }
        select {
            width: 100%; padding: 15px; border-radius: 16px; background: #334155;
            border: 1px solid #475569; color: white; font-size: 16px; font-weight: 600;
            appearance: none;
        }

        /* Buttons */
        .btn-primary {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; font-weight: 800; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--glass); backdrop-filter: blur(20px);
            height: 70px; border-radius: 25px; display: flex;
            justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-dim); font-size: 11px; font-weight: 700; cursor: pointer;
        }
        .nav-item.active { color: var(--accent-primary); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* History List */
        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px;
        }
        .history-date { font-size: 12px; color: var(--text-dim); }
        .history-ranks { font-size: 13px; font-weight: 600; color: var(--text-main); }

        /* Loading */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(59, 130, 246, 0.1);
            border-top: 4px solid var(--accent-primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="font-weight: 700; color: var(--accent-primary);">DATA LOADING...</div>
</div>

<header>
    <h1 id="page-title">대시보드</h1>
    <p id="page-sub">경배와 친구들의 전적 관리</p>
</header>

<div class="container">
    <div id="tab-home" class="tab-content active">
        <div class="card">
            <h3 style="margin-top:0; font-size:16px; color:var(--accent-gold);">👑 이달의 챔피언</h3>
            <div id="monthly-king" style="font-size: 24px; font-weight: 900;">데이터 분석 중...</div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 15px 0; font-size:15px;">📊 랭킹 보드</h3>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th class="rank-name">멤버</th>
                        <th>게임</th>
                        <th>1위</th>
                        <th>꼴찌</th>
                        <th>승률</th>
                    </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-input" class="tab-content">
        <div class="card">
            <div class="input-group">
                <span class="input-label">인원 선택</span>
                <select id="p-count" onchange="createInputs()">
                    <option value="2">2명</option>
                    <option value="3" selected>3명</option>
                    <option value="4">4명</option>
                    <option value="5">5명</option>
                </select>
            </div>
            <div id="input-fields"></div>
            <button class="btn-primary" onclick="submitGame()">기록 저장하기</button>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <div id="history-list"></div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('home', this)">
        <span class="nav-icon">🏠</span><span>홈</span>
    </div>
    <div class="nav-item" onclick="switchTab('input', this)">
        <span class="nav-icon">➕</span><span>기록</span>
    </div>
    <div class="nav-item" onclick="switchTab('history', this)">
        <span class="nav-icon">📜</span><span>내역</span>
    </div>
</nav>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzVCB4XXeebyVvbDe91gcarwdwTSmmM92KciZf7F-1GLXikP3Jlz0rivWodR-1xXRMdtg/exec";
    const players = ["경배", "원석", "정석", "진웅", "창한", "경석"];
    let gameLogs = [];

    // 탭 전환 로직
    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        el.classList.add('active');
        
        const titles = { home: '대시보드', input: '기록하기', history: '최근 전적' };
        document.getElementById('page-title').innerText = titles[tabId];
    }

    // 입력 필드 동적 생성
    function createInputs() {
        const count = document.getElementById('p-count').value;
        const container = document.getElementById('input-fields');
        container.innerHTML = "";
        for(let i=1; i<=count; i++) {
            const label = (i == count) ? "💀 꼴찌" : `${i}위🥇`;
            container.innerHTML += `
                <div class="input-group">
                    <span class="input-label">${label}</span>
                    <select class="rank-select">
                        <option value="">선택</option>
                        ${players.map(p => `<option value="${p}">${p}</option>`).join('')}
                    </select>
                </div>`;
        }
    }

    // 데이터 가져오기
    async function loadData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(GAS_URL);
            gameLogs = await res.json();
            renderStats();
            renderHistory();
        } catch(e) { console.error(e); }
        finally { document.getElementById('loader').style.display = 'none'; }
    }

    // 통계 렌더링
    function renderStats() {
        let stats = {};
        players.forEach(p => stats[p] = { played: 0, win: 0, lose: 0 });

        gameLogs.forEach(g => {
            const active = g.ranks.filter(r => r && r.trim() !== "");
            active.forEach((name, idx) => {
                if(stats[name]) {
                    stats[name].played++;
                    if(idx === 0) stats[name].win++;
                    if(idx === active.length - 1) stats[name].lose++;
                }
            });
        });

        const sorted = [...players].sort((a,b) => (stats[b].win / (stats[b].played || 1)) - (stats[a].win / (stats[a].played || 1)));
        
        document.getElementById('monthly-king').innerText = sorted[0] + " (승률 " + (stats[sorted[0]].played > 0 ? (stats[sorted[0]].win / stats[sorted[0]].played * 100).toFixed(1) : 0) + "%)";

        document.getElementById('stats-body').innerHTML = sorted.map(p => `
            <tr>
                <td class="rank-name">${p}</td>
                <td>${stats[p].played}</td>
                <td style="color:var(--accent-gold)">${stats[p].win}</td>
                <td style="color:var(--accent-danger)">${stats[p].lose}</td>
                <td style="font-weight:800; color:var(--accent-primary)">${stats[p].played > 0 ? (stats[p].win / stats[p].played * 100).toFixed(0) : 0}%</td>
            </tr>
        `).join('');
    }

    // 히스토리 렌더링
    function renderHistory() {
        const historyContainer = document.getElementById('history-list');
        const recent = [...gameLogs].reverse().slice(0, 20);
        historyContainer.innerHTML = recent.map(g => `
            <div class="history-item">
                <div class="history-ranks">${g.ranks.filter(n => n).join(' → ')}</div>
                <div class="history-date">${new Date(g.date).toLocaleDateString('ko-KR', {month:'short', day:'numeric'})}</div>
            </div>
        `).join('');
    }

    // 저장
    async function submitGame() {
        const selects = document.querySelectorAll('.rank-select');
        const ranks = Array.from(selects).map(s => s.value);
        if(ranks.some(r => !r)) return alert("모든 순위를 선택해주세요!");
        if(new Set(ranks).size !== ranks.length) return alert("중복된 플레이어가 있습니다.");

        document.getElementById('loader').style.display = 'flex';
        try {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "SAVE",
                    date: new Date().toISOString().split('T')[0],
                    ranks: ranks
                })
            });
            alert("저장 성공!");
            loadData();
            switchTab('home', document.querySelector('.nav-item'));
        } catch(e) { alert("오류 발생!"); }
    }

    window.onload = () => {
        createInputs();
        loadData();
    };
</script>
</body>
</html>
