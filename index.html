<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>경배와 친구들 당구</title>
    <style>
        :root { --main: #007bff; --bg: #f4f7f6; --accent: #ff4757; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 100px; }
        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; border: 1px solid #eee; font-size: 14px; background: white; }
        .day.selected { background: var(--main); color: white; font-weight: bold; }
        .has-record { border: 2px solid #2ed573; background: #e8f9ee; }
        .input-row { display: flex; align-items: center; margin-bottom: 10px; }
        .input-row label { width: 50px; font-weight: bold; font-size: 13px; color: #555; }
        select { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; background: #fff; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .save-btn { background: var(--main); color: white; }
        .edit-mode-btn { background: #f39c12; color: white; }
        .game-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        .stats-table th, .stats-table td { padding: 12px 5px; border-bottom: 1px solid #eee; text-align: center; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading">처리 중입니다...</div>

<div class="card">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
        <button onclick="changeMonth(-1)" style="border:none; background:#eee; border-radius:50%; width:30px; height:30px;">◀</button>
        <b id="monthDisplay" style="font-size:18px;"></b>
        <button onclick="changeMonth(1)" style="border:none; background:#eee; border-radius:50%; width:30px; height:30px;">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card">
    <h3 id="selectedDateTitle" style="margin-top:0;">날짜를 선택하세요</h3>
    <div id="inputArea"></div>
    <button id="mainBtn" class="btn save-btn" onclick="saveGame()">기록 저장</button>
    <div id="dayGameList"></div>
</div>

<div class="card">
    <h3>📊 누적 전적</h3>
    <table class="stats-table">
        <thead><tr><th>이름</th><th>참여</th><th>1위🥇</th><th>꼴찌💀</th></tr></thead>
        <tbody id="statsBody"></tbody>
    </table>
</div>

<button onclick="startResetProcess()" style="width:100%; color:#aaa; border:none; background:none; font-size:12px; text-decoration:underline; margin-top:30px;">전체 데이터 초기화</button>

<script>
    // ⚠️ 새로 배포한 웹 앱 URL을 여기에 붙여넣으세요
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw46jHiYFPJ5IaO_CjwiLTo9uPNSPufJKThnAgBBxrAalDHQIoimfaZGbEnonaRTCaz/exec"; 
    const players = ["경배", "원석", "진웅", "창한", "정석"];
    let gameLogs = [], curDate = new Date(), selDate = new Date().toLocaleDateString('sv-SE'), editId = null;

    async function fetchData() {
        toggleLoading(true);
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            gameLogs = await res.json();
            render();
        } catch(e) { console.error(e); }
        finally { toggleLoading(false); }
    }

    function render() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        const y = curDate.getFullYear(), m = curDate.getMonth();
        document.getElementById('monthDisplay').innerText = `${y}년 ${m+1}월`;
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += "<div></div>";
        for(let d=1; d<=last; d++) {
            const dstr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const cls = `day ${dstr===selDate?'selected':''} ${gameLogs.some(g=>g.date.includes(dstr))?'has-record':''}`;
            grid.innerHTML += `<div class="${cls}" onclick="selectDate('${dstr}')">${d}</div>`;
        }
        
        const list = document.getElementById('dayGameList');
        list.innerHTML = "";
        const filtered = gameLogs.filter(g => g.date.includes(selDate));
        if(filtered.length > 0) list.innerHTML = "<p style='font-size:12px; color:#888; margin-top:15px;'>오늘의 경기 (클릭 시 수정)</p>";
        filtered.forEach((g, i) => {
            list.innerHTML += `<div class="game-item">
                <span style="flex:1" onclick="enterEdit('${g.round}', '${g.ranks}')">${i+1}. ${g.ranks.join(' → ')}</span>
                <b onclick="deleteGame('${g.round}')" style="color:red; cursor:pointer; margin-left:10px;">삭제</b>
            </div>`;
        });

        const stats = {};
        players.forEach(p => stats[p] = {p:0, f:0, l:0});
        gameLogs.forEach(g => {
            g.ranks.forEach((n, i) => {
                if(stats[n]) {
                    stats[n].p++;
                    if(i===0) stats[n].f++;
                    if(i===g.ranks.length-1) stats[n].l++;
                }
            });
        });
        document.getElementById('statsBody').innerHTML = players.map(p => `<tr><td><b>${p}</b></td><td>${stats[p].p}</td><td>${stats[p].f}</td><td style="color:red">${stats[p].l}</td></tr>`).join('');
    }

    function selectDate(d) { selDate = d; document.getElementById('selectedDateTitle').innerText = `📅 ${d}`; cancelEdit(); render(); }
    
    function updateInputs(pre = []) {
        const area = document.getElementById('inputArea');
        area.innerHTML = "";
        const count = pre.length > 0 ? pre.length : 3;
        for(let i=0; i<count; i++) {
            area.innerHTML += `<div class="input-row"><label>${i+1}위</label><select id="r${i}"><option value="">선택</option>${players.map(p=>`<option value="${p}" ${pre[i]===p?'selected':''}>${p}</option>`).join('')}</select></div>`;
        }
    }

    async function saveGame() {
        const ranks = [0,1,2,3,4].map(i => {
            const el = document.getElementById('r'+i);
            return el ? el.value : "";
        }).filter(v => v !== "");
        
        if(ranks.length < 2) return alert("최소 2명 이상의 순위를 입력하세요.");
        toggleLoading(true);
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: editId?"UPDATE":"SAVE", date: selDate, ranks, round: editId }) });
        setTimeout(() => { fetchData(); cancelEdit(); }, 2000);
    }

    async function deleteGame(id) {
        if(!confirm("이 기록을 삭제할까요?")) return;
        toggleLoading(true);
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "DELETE", round: id }) });
        setTimeout(fetchData, 2000);
    }

    function enterEdit(id, rstr) {
        editId = id;
        const rArr = rstr.split(',');
        updateInputs(rArr);
        const btn = document.getElementById('mainBtn');
        btn.innerText = "기록 수정 완료";
        btn.className = "btn edit-mode-btn";
        window.scrollTo(0, 300);
    }

    function cancelEdit() {
        editId = null;
        updateInputs();
        const btn = document.getElementById('mainBtn');
        btn.innerText = "기록 저장";
        btn.className = "btn save-btn";
    }

    function startResetProcess() { if(confirm("모든 데이터를 삭제하고 초기화할까요?")) { fetch(GAS_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:"RESET"})}); setTimeout(fetchData, 2000); } }
    function changeMonth(v) { curDate.setMonth(curDate.getMonth()+v); render(); }
    function toggleLoading(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }
    window.onload = () => { selectDate(selDate); fetchData(); };
</script>
</body>
</html>
