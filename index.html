<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    <link rel="apple-touch-icon" href="image_0.png">
    <title>우리들의 Billiard World</title>
    
    <style>
        /* [기존 스타일 시트 100% 유지] */
        :root { 
            --main: #7f8c8d; --bg: rgba(236, 238, 241, 0.4); --accent: #ff4757; --success: #27ae60; --edit: #f39c12; 
            --today-bg: #e3f2fd; --today-border: #2196f3; --select-bg: #fff0f3; --select-border: #ff4d6d; 
            --record-bg: #e8f5e9; --record-border: #4caf50; --record-dot: #e67e22; 
            --shadow: 8px 8px 16px rgba(180, 180, 180, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --inner-shadow: inset 3px 3px 7px rgba(180, 180, 180, 0.4), inset -3px -3px 7px rgba(255, 255, 255, 0.8);
            --rank1: #2196f3; --rank2: #27ae60; --rank3: #8e44ad; --rank4: #f39c12; --rankL: #ff4757; 
            --dup-bg: #fffde7; --dup-border: #ff80ab; --dup-text: #7b1fa2;
            --card-bg: rgba(243, 230, 255, 0.7); --edit-mode-bg: #e8f5e9; --edit-mode-border: #2d5a27; 
            --text-color: #444; --sub-text: #666; --label-text: #777; --danger-text: #7b1fa2; 
        }
        /* ... (중간 다크모드 및 기본 스타일 생략 - 원본과 동일함) ... */
        
        /* [추가된 참여 선수 선택 전용 스타일] */
        .player-select-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: rgba(255,255,255,0.2); border-radius: 18px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
        .player-select-table td { padding: 6px; text-align: center; width: 33.3%; }
        .player-chip { 
            display: block; padding: 10px 5px; border-radius: 12px; background: #fff; border: 2px solid #eee; 
            font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.2s; color: #777; box-shadow: var(--inner-shadow);
        }
        .player-chip.active { background: var(--today-bg); border-color: var(--today-border); color: var(--today-border); box-shadow: none; }
        
        .order-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; justify-content:center; align-items:center; z-index:10005; backdrop-filter:blur(5px); }
        .order-content { background:var(--card-bg); padding:30px; border-radius:32px; text-align:center; width:85%; max-width:320px; border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--shadow); }

        /* [기존 body, welcome-screen 등 모든 스타일 유지됨] */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px; background-image: url('image_1.png'); background-size: cover; background-attachment: fixed; min-height: 100vh; color: var(--text-color); }
        /* ... (이하 원본 CSS 코드 전체 유지) ... */
    </style>
</head>
<body id="app-body">

<div id="welcome-screen">
    <div class="welcome-content">
        <img src="image_0.png" alt="앱 아이콘" class="welcome-logo">
        <div class="welcome-text">경배와 친구들의<br>당구 세상에 오신걸 환영합니다.<br><br><br><br><br>Created by Ju Kyung Bae</div>
    </div>
</div>

<div id="order-modal" class="order-modal">
    <div class="order-content">
        <div style="font-size:40px; margin-bottom:10px;">🎱</div>
        <h2 style="font-size:18px; font-weight:900; color:var(--rank1); margin-bottom:15px;">추첨 완료!</h2>
        <div id="order-result" style="font-weight: 900; line-height: 2; margin-bottom: 20px; color:var(--text-color);"></div>
        <button class="save-btn" onclick="closeOrderModal()" style="margin:0;">순서 적용하기</button>
    </div>
</div>

<div class="calendar-card">
    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="monthDisplay" style="font-size:20px; font-weight:900; color:#444;"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card" id="inputCard">
    <h2 id="selectedDateTitle" style="font-size:17px; margin:0 0 20px 0; color:#444; font-weight:800;">📅 날짜 확인 중</h2>
    
    <div style="margin-bottom:12px; font-size:13px; font-weight:800; color:var(--sub-text);">🕹️ 경기 참여 친구 직접 선택</div>
    <table class="player-select-table">
        <tr>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '경배')">경배</div></td>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '원석')">원석</div></td>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '정석')">정석</div></td>
        </tr>
        <tr>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '진웅')">진웅</div></td>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '창한')">창한</div></td>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '경석')">경석</div></td>
        </tr>
    </table>

    <div class="setup-row">
        <span style="font-size:14px; font-weight:800; color:var(--sub-text);">경기 인원</span>
        <select id="playerCount" onchange="updateInputFields()">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>

    <button onclick="pickRandomOrder()" style="width:100%; padding:14px; background:linear-gradient(145deg, #1abc9c, #16a085); color:white; border:none; border-radius:15px; font-weight:900; margin:10px 0 20px 0; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        🎲 선택한 멤버로 초구 추첨
    </button>

    <div id="inputArea"></div>
    <div class="btn-group">
        <button id="mainBtn" class="save-btn" onclick="saveGame()">순위 저장</button>
        <button class="save-btn btn-cancel" onclick="resetInputs()">취소</button>
    </div>
    
    <div id="capture-area">
        <div id="dayGameList"></div>
    </div>
</div>

<script>
    /* [기존 스크립트 변수 및 GAS 설정 유지] */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzVCB4XXeebyVvbDe91gcarwdwTSmmM92KciZf7F-1GLXikP3Jlz0rivWodR-1xXRMdtg/exec"; 
    const players = ["경배", "원석", "정석", "진웅", "창한", "경석"];
    let selectedPlayersForLottery = []; // 추첨용 선택 명단 추가
    
    // [추가된 로직 1: 친구 선택 토글]
    function togglePlayerSelection(el, name) {
        if (selectedPlayersForLottery.includes(name)) {
            selectedPlayersForLottery = selectedPlayersForLottery.filter(p => p !== name);
            el.classList.remove('active');
        } else {
            const limit = parseInt(document.getElementById('playerCount').value);
            if (selectedPlayersForLottery.length >= limit) {
                alert(`설정한 인원(${limit}명)까지만 선택 가능해!`); return;
            }
            selectedPlayersForLottery.push(name);
            el.classList.add('active');
        }
    }

    // [추가된 로직 2: 초구 및 순서 랜덤 추첨]
    function pickRandomOrder() {
        const requiredCount = parseInt(document.getElementById('playerCount').value);
        if (selectedPlayersForLottery.length !== requiredCount) {
            alert(`참여 친구를 ${requiredCount}명 모두 선택해줘!`); return;
        }
        let pool = [...selectedPlayersForLottery];
        const firstIdx = Math.floor(Math.random() * pool.length);
        const firstPlayer = pool.splice(firstIdx, 1)[0];
        const remaining = pool.sort(() => Math.random() - 0.5);

        const resultArea = document.getElementById('order-result');
        resultArea.innerHTML = `
            <div style="background: rgba(33, 150, 243, 0.1); border-radius: 15px; padding: 10px; margin-bottom: 15px; border: 2px dashed var(--rank1);">
                <div style="font-size: 12px; color: var(--rank1); margin-bottom:3px;">🎯 초구 당첨</div>
                <div style="font-size: 24px; color: var(--rank1); font-weight: 900;">1번 : ${firstPlayer}</div>
            </div>
            <div style="font-size: 16px; opacity: 0.9;">
                ${remaining.map((p, i) => `<div>${i + 2}번 : ${p}</div>`).join('')}
            </div>
        `;
        document.getElementById('order-modal').style.display = 'flex';
        
        // 결과 자동 대입
        const finalOrder = [firstPlayer, ...remaining];
        finalOrder.forEach((name, idx) => {
            const select = document.getElementById('rank' + (idx + 1));
            if(select) select.value = name;
        });
    }

    function closeOrderModal() { document.getElementById('order-modal').style.display = 'none'; }

    // [기존의 updateInputFields 수정: 인원 변경 시 선택 초기화 추가]
    function updateInputFields(preFill = null) {
        if(preFill) document.getElementById('playerCount').value = preFill.length;
        const count = parseInt(document.getElementById('playerCount').value); 
        const inputArea = document.getElementById('inputArea');
        inputArea.innerHTML = "";
        let html = '';
        for(let i=1; i<=count; i++) {
            const label = i === count ? "꼴찌💀" : (i === 1 ? "1위🥇" : `${i}위`);
            html += `<div class="input-row"><label>${label}</label><select id="rank${i}" onchange="checkDuplicates()"><option value="">선택</option>${players.map(p => `<option value="${p}" ${preFill && preFill[i-1] === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>`;
        }
        inputArea.innerHTML = html;
        
        // 인원 설정 변경 시 선택된 칩 초기화
        selectedPlayersForLottery = [];
        document.querySelectorAll('.player-chip').forEach(el => el.classList.remove('active'));
    }

    /* [이하 saveGame, fetchData, renderStats 등 모든 기존 스크립트 원본 유지] */
    // ... (원본 파일의 <script> 내용을 그대로 복사해서 넣으시면 됩니다) ...
</script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="share.js"></script>    
</body>
</html>
