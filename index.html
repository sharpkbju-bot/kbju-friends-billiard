<!DOCTYPE html>        
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json?v=2.41">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">

    <link rel="icon" type="image/png" sizes="512x512" href="image_0.png?v=2.41">
    <link rel="apple-touch-icon" href="image_0.png?v=2.41">
        
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <title>우리들의 Billiard World</title>
    
    <style>
        :root { 
            --main: #7f8c8d; 
            --bg: rgba(236, 238, 241, 0.4); 
            --accent: #ff4757; 
            --success: #27ae60; 
            --edit: #f39c12; 
            --today-bg: #e3f2fd; 
            --today-border: #2196f3; 
            --select-bg: #fff0f3; 
            --select-border: #ff4d6d; 
            --record-bg: #e8f5e9; 
            --record-border: #4caf50; 
            --record-dot: #e67e22; 
            --shadow: 8px 8px 16px rgba(180, 180, 180, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --inner-shadow: inset 3px 3px 7px rgba(180, 180, 180, 0.4), inset -3px -3px 7px rgba(255, 255, 255, 0.8);
            
            --rank1: #2196f3; 
            --rank2: #27ae60; 
            --rank3: #8e44ad; 
            --rank4: #f39c12; 
            --rankL: #ff4757; 
            
            --dup-bg: #fffde7;    
            --dup-border: #ff80ab; 
            --dup-text: #7b1fa2;
            
            --card-bg: rgba(243, 230, 255, 0.7); 

            --edit-mode-bg: #e8f5e9;
            --edit-mode-border: #2d5a27; 
            
            --text-color: #444;
            --sub-text: #666;
            --label-text: #777;
            --danger-text: #7b1fa2; 
        }

        [data-theme='dark'] {
            --main: #bdc3c7;
            --bg: rgba(30, 30, 30, 0.9);
            --today-bg: #1a237e;
            --today-border: #448aff;
            --select-bg: #4a148c;
            --select-border: #e91e63;
            --record-bg: #1b5e20;
            --record-border: #81c784;
            --shadow: 8px 8px 16px rgba(0, 0, 0, 0.6), -4px -4px 10px rgba(60, 60, 60, 0.2);
            --inner-shadow: inset 3px 3px 7px rgba(0, 0, 0, 0.7), inset -2px -2px 5px rgba(60, 60, 60, 0.2);
            --card-bg: rgba(60, 60, 65, 0.9);  
            --dup-bg: #3e2723;
            --dup-border: #ff5252;
            --dup-text: #ffccbc;
            --text-color: #eeeeee;
            --sub-text: #cccccc;
            --label-text: #bbbbbb;
            --danger-text: #ffffff; 
            --rank1: #64b5f6; 
            --rank2: #2ecc71;   
            --rank3: #ba68c8; 
            --rank4: #ffb74d; 
            --rankL: #ff8a80; 
            --edit-mode-bg: rgba(35, 35, 45, 0.9); 
            --edit-mode-border: #27ae60;
        }

        [data-theme='dark'] .win-rate-pill { color: #ffd60a !important; }
        [data-theme='dark'] .stats-table td[style*="color:darkblue;"] { color: #448aff !important; }
        [data-theme='dark'] .stats-table td[style*="color:darkred;"] { color: #ff5252 !important; }
        [data-theme='dark'] .stats-table td[style*="color:#8e44ad;"] { color: #eeeeee !important; }
        [data-theme='dark'] .stats-table td[style*="color:#5D4037;"] { color: #eeeeee !important; }

        [data-theme='dark'] #monthDisplay, 
        [data-theme='dark'] #selectedDateTitle,
        [data-theme='dark'] .stats-card h2,
        [data-theme='dark'] #searchCard h2 { color: #ffffff !important; }
        
        [data-theme='dark'] .weekday { color: #95a5a6 !important; }
        
        [data-theme='dark'] .setup-row span,
        [data-theme='dark'] .theme-wrap span,
        [data-theme='dark'] .zoom-wrap span,
        [data-theme='dark'] .input-row label { color: var(--label-text) !important; }
        
        [data-theme='dark'] select, [data-theme='dark'] input[type="date"], [data-theme='dark'] input[type="text"]#searchDateRange { 
            background: rgba(60, 60, 60, 0.5); color: #ffffff !important; color-scheme: dark; 
        }
        
        [data-theme='dark'] .game-item { background: linear-gradient(145deg, #2c2c2c, #333333); }
        [data-theme='dark'] .game-info { color: #eee; }
        [data-theme='dark'] .nav-btn { background: rgba(60, 60, 60, 0.6); color: #ffffff !important; box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5), -2px -2px 6px rgba(70, 70, 70, 0.3); }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: env(safe-area-inset-top) 15px 100px 15px;
            background-image: url('image_1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-color);
            scroll-behavior: smooth;
        }
        
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2196f3, #0d47a1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease-out; color: white; text-align: center;
            pointer-events: none;
        }
        .welcome-content { animation: fadeInUp 1s ease-out; }
        .welcome-logo { width: 60px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
        .welcome-text { font-size: 14px; font-weight: 300; line-height: 1.6; text-shadow: 0 2px 4px rgba(0,0,0,0.2); font-family: "Apple Chancery", "Snell Roundhand", "Comic Sans MS", cursive; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .calendar-card {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border-radius: 32px;
            padding: 24px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn {
            border: none;
            background: rgba(236, 238, 241, 0.4);
            width: 44px; height: 44px; border-radius: 14px;
            box-shadow: 4px 4px 8px rgba(180, 180, 180, 0.3), -4px -4px 8px rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer; color: #777; transition: 0.2s;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .weekday { font-size: 11px; font-weight: 900; padding-bottom: 10px; color: #95a5a6; }

        .day { 
            width: 100%; max-width: 42px; height: 42px; margin: 0 auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 16px; cursor: pointer; font-size: 15px; font-weight: 700; position: relative; 
            background: linear-gradient(145deg, rgba(253, 253, 253, 0.8), rgba(226, 229, 234, 0.8)); 
            box-shadow: 6px 6px 14px rgba(0, 0, 0, 0.22), -2px -2px 6px rgba(255, 255, 255, 0.8); 
            transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: #555; border: 1px solid rgba(255,255,255,0.4);
            -webkit-transform: translateZ(0); transform: translateZ(0); 
        }
        .day.sat { color: #5dade2; } 
        .day.sun, .day.holiday { color: #e67e22; } 
        .day.today { background: var(--today-bg) !important; color: var(--today-border) !important; border: 2px solid var(--today-border) !important; }
        
        .day.has-record { background: var(--record-bg) !important; border: 2px solid var(--record-border) !important; color: #2e7d32 !important; }
        .day.has-record::after { content: ''; position: absolute; bottom: 4px; width: 5px; height: 5px; background: var(--record-dot) !important; border-radius: 50%; }

        .day.selected { 
            background: #ff4d6d !important; color: #ffffff !important; 
            transform: scale(1.15) translateZ(0) !important; z-index: 5; 
            border: 2px solid #c51162 !important; 
            box-shadow: 4px 4px 10px rgba(255, 77, 109, 0.4), -2px -2px 6px rgba(255, 255, 255, 0.9) !important; 
        }
        .day.selected::after { background: #ffffff !important; } 

        [data-theme='dark'] .day { color: #ffffff !important; background: linear-gradient(145deg, #2c2c2c, #252525); border: 1px solid rgba(255,255,255,0.1); box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4), -2px -2px 6px rgba(60, 60, 60, 0.2); }
        [data-theme='dark'] .day.sat { color: #5dade2 !important; }
        [data-theme='dark'] .day.sun, [data-theme='dark'] .day.holiday { color: #e67e22 !important; }
        [data-theme='dark'] .day.today { background: #1a237e !important; color: #448aff !important; border: 2px solid #448aff !important; }
        [data-theme='dark'] .day.has-record { background: #1b5e20 !important; border: 2px solid #81c784 !important; color: #81c784 !important; }
        
        [data-theme='dark'] .day.selected { background: #d81b60 !important; color: #ffffff !important; border: 2px solid #f48fb1 !important; box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.6), -2px -2px 6px rgba(60, 60, 60, 0.2) !important; }
        [data-theme='dark'] .day.selected::after { background: #ffffff !important; }
        
        .card { background: var(--card-bg); backdrop-filter: blur(5px); border-radius: 28px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.4); }
        .setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; }
        
        select#playerCount { flex: none !important; width: 85px !important; padding: 8px !important; margin-left: auto; border-radius: 12px !important; }
        .input-row { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; width: 100%; }
        .input-row label { width: 85px; min-width: 85px; max-width: 85px; font-size: 13px; font-weight: 800; color: var(--label-text); flex-shrink: 0; white-space: nowrap; }
        
        select, input[type="date"], input[type="text"]#searchDateRange { 
            width: 0; flex: 1 1 auto; padding: 12px; border-radius: 15px; border: 2px solid transparent; font-size: 14px; 
            background: rgba(236, 238, 241, 0.4); box-shadow: var(--inner-shadow); color: var(--text-color); font-weight: 600; 
            -webkit-appearance: none; text-align: center; text-align-last: center; margin: 0;
        }

        .edit-active select { background-color: var(--edit-mode-bg) !important; border: 2px solid var(--edit-mode-border) !important; color: #27ae60 !important; }
        select.duplicate-error { background: var(--dup-bg) !important; border: 2px solid var(--dup-border) !important; color: var(--dup-text) !important; }

        button.save-btn { 
            width: 100%; padding: 16px; background: linear-gradient(145deg, #abb2b9, #7f8c8d); color: white; border: none;
            border-radius: 18px; font-weight: 800; margin-top: 15px; cursor: pointer; font-size: 14px; 
            box-shadow: 8px 10px 20px rgba(0, 0, 0, 0.38), -2px -2px 8px rgba(255, 255, 255, 0.5); transition: 0.2s all ease;
        }
        button.save-btn:active { transform: scale(0.97); }
        button.edit-btn { background: linear-gradient(145deg, #ffae24, #da8c10) !important; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group button { flex: 1; margin-top: 0 !important; }
        .btn-cancel { background: #bdc3c7 !important; }

        .stats-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 12px; table-layout: fixed; }
        .stats-table th { padding: 8px 0px; color: #5D4037; font-weight: 900; text-transform: uppercase; font-size: 12px; border-bottom: 2px solid rgba(0,0,0,0.05); white-space: nowrap; }
        .stats-table thead tr { background: rgba(232, 245, 233, 0.8); }
        .stats-table tr { background: rgba(255, 255, 255, 0.4); }
        .stats-table td { padding: 12px 0px; text-align: center; font-weight: 800; color: var(--text-color); white-space: nowrap; font-size: 14px; }
        .win-rate-pill { color: #27ae60; font-size: 13px; display: inline-block; text-align: right; width: 100%; font-weight: 800; }

        .history-area { margin-top: 15px; padding: 15px; background: rgba(255, 255, 255, 0.3); border-radius: 20px; display: none; animation: fadeIn 0.3s ease; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: rgba(255, 252, 212, 0.85); border-radius: 12px; margin-bottom: 8px; font-weight: 800; color: #555; border: 2.5px solid #ff69b4; }

        .toast-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.7); color: white; padding: 12px 25px; border-radius: 20px; font-weight: 800; font-size: 14px; z-index: 10002; display: none; }
        .danger-zone { margin-top: 50px; padding: 25px; border-radius: 28px; background: var(--card-bg); backdrop-filter: blur(5px); box-shadow: var(--shadow); text-align: center; }
        .reset-btn { width: 100%; background: linear-gradient(145deg, #e67e22, #d35400); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; margin-bottom: 8px; }
        .exit-btn { width: 100%; background: linear-gradient(145deg, #7f8c8d, #626e6e); color: white; border: none; padding: 16px; border-radius: 18px; font-weight: 800; font-size: 14px; }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(236, 238, 241, 0.8); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .spinner { border: 5px solid rgba(209, 217, 230, 0.6); border-top: 5px solid var(--main); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .game-item { position: relative; padding: 18px 8px; border-radius: 22px; background: linear-gradient(145deg, #f0f0f0, #ffffff); margin-top: 15px; display: flex; justify-content: center; align-items: center; box-shadow: 6px 6px 12px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s ease; }
        .game-info { font-size: 20px; font-weight: 900; color: var(--text-color); width: 100%; display: flex; justify-content: center; align-items: center; white-space: nowrap; }
        .game-info span { color: #888; margin-right: 8px; font-size: 13px; }

        .zoom-active .calendar-grid { gap: 6px !important; }
        .zoom-active .day { max-width: 36px !important; height: 36px !important; font-size: 13px !important; border-radius: 12px !important; }
        .zoom-active .game-info { font-size: 16px !important; }
        
        .share-btn-common { width: 100%; padding: 12px; background: linear-gradient(145deg, #6a11cb, #2575fc); color: white; border: none; border-radius: 18px; font-weight: 800; display: block; box-shadow: 0px 4px 15px rgba(0,0,0,0.2); cursor: pointer; font-size: 12px; }

        .player-chip { padding: 10px 5px; border-radius: 12px; background: rgba(255,255,255,0.8); font-weight: 800; font-size: 13px; text-align: center; cursor: pointer; color: var(--sub-text); border: 2px solid transparent; transition: 0.2s; }
        .player-chip.active { background: #e1bee7 !important; border: 2px solid #7b1fa2 !important; color: #4a148c !important; font-weight: 900 !important; }

        /* 🌟 개인 프로필 카드 스타일 (캡처 겹침 방지 구조) */
        .profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 11000; backdrop-filter: blur(8px); }
        .profile-card-content { position: relative; background: var(--card-bg); padding: 25px; border-radius: 32px; width: 90%; max-width: 360px; box-shadow: var(--shadow); color: #444; text-align: center; animation: scaleUpPopup 0.4s ease-out; overflow-y: auto; max-height: 85vh; }
        .p-stat-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .p-stat-item { background: rgba(255,255,255,0.4); padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.3); }
        .rival-box { background: rgba(255,255,255,0.5); padding: 15px; border-radius: 22px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.4); }

        @keyframes scaleUpPopup { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes scaleDownPopup { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.3); opacity: 0; } }
        
        .last-game-content { position: relative; background: var(--card-bg); padding: 30px 20px; border-radius: 32px; text-align: center; width: 85%; max-width: 320px; box-shadow: var(--shadow); overflow: hidden; animation: scaleUpPopup 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .last-game-content::before { content: ''; position: absolute; top: -2.5%; left: -2.5%; width: 105%; height: 105%; border-radius: inherit; background: conic-gradient(from var(--glimmer-angle), transparent 30%, var(--rank1), var(--accent), var(--edit), var(--rank1) 70%, transparent); animation: glimmerspin 2s linear infinite; z-index: -2; filter: blur(8px); }
        .last-game-content::after { content: ''; position: absolute; top: 2px; left: 2px; width: calc(100% - 4px); height: calc(100% - 4px); border-radius: inherit; background: var(--card-bg); z-index: -1; }
        @keyframes glimmerspin { 0% { --glimmer-angle: 0deg; } 100% { --glimmer-angle: 360deg; } }
        @property --glimmer-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    </style>
</head>
<body id="app-body">

<div id="welcome-screen">
    <div class="welcome-content">
        <img src="image_0.png" alt="앱 아이콘" class="welcome-logo">
        <div class="welcome-text">경배와 친구들의<br>당구 세상에 오신걸 환영합니다.<br><br><br><br><br>Created by&nbsp;&nbsp;&nbsp;<span style="font-size: 20px; font-weight: bold;">Ju Kyung Bae</span></div><br>Version&nbsp;&nbsp;2.41
    </div>
</div>

<div id="profile-card-modal" class="profile-modal">
    <div class="profile-card-content" id="profile-card-content"></div>
</div>

<div id="last-game-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 10006; backdrop-filter: blur(5px);">
    <div class="last-game-content" id="last-game-content"></div>
</div>

<div id="toast" class="toast-msg">기록 없음</div>

<div id="exit-modal">
    <div class="modal-content">
        <div style="font-size:50px; margin-bottom:15px;">👋</div>
        <div id="exit-msg" style="font-size:16px; font-weight:800; color:#444; line-height:1.6; margin-bottom:25px;">오늘도 다들 즐거웠니?<br>다음에 또 보자!</div>
        <button class="save-btn" id="modalOkBtn" style="margin-bottom:12px;" onclick="closeAppWindow()">OK</button>
        <button class="save-btn" style="background:#abb2b9; margin:0; width: 100%;" onclick="closeExitModal()">취소</button>
    </div>
</div>

<div id="order-modal" class="order-modal">
    <div class="order-content">
        <div style="font-size:40px; margin-bottom:15px;">🎱</div>
        <h2 style="font-size:18px; font-weight:900; color:var(--rank1); margin:0 0 20px 0;">게임 순서 결정</h2>
        <div id="order-result" style="font-weight: 900; line-height: 2.0; margin-bottom: 25px; color:var(--text-color);"></div>
        <button class="save-btn" style="margin:0; width:100%;" onclick="closeOrderModal()">확인</button>
    </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loadingText" style="font-weight:800; color:var(--main);">순위 데이터 동기화 중</div></div>

<div class="calendar-card">
    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="monthDisplay" style="font-size:20px; font-weight:900; color:#444; letter-spacing:-1px;"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card" id="inputCard">
    <h2 id="selectedDateTitle" style="font-size:17px; margin:0 0 20px 0; color:#444; font-weight:800;">📅 날짜 확인 중</h2>
    <div id="editBadge" style="display:none; color:white; font-size:13px; font-weight:bold; margin-bottom:15px; background: var(--edit); padding: 12px; border-radius: 12px; text-align: center;">✏️ 기록 수정 중</div>

    <div class="theme-wrap" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.04);">
        <span style="font-size:14px; font-weight:800; color:var(--sub-text);">다크 모드</span>
        <label style="position:relative; width:50px; height:26px;"><input type="checkbox" id="themeSwitch" onchange="toggleTheme()" style="opacity: 0; width: 0; height: 0;"><span style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px;"></span></label>
    </div>

    <div class="zoom-wrap" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.04);">
        <span style="font-size:14px; font-weight:800; color:var(--sub-text);">화면 크기</span>
        <div>
            <label style="font-size:14px; font-weight:800; margin-right:8px;">기본 <input type="radio" name="z" value="1" onclick="changeZoom('1')" checked></label>
            <label style="font-size:14px; font-weight:800;">확대 <input type="radio" name="z" value="1.2" onclick="changeZoom('1.2')"></label>
        </div>
    </div>

    <div class="setup-row">
        <span style="font-size:14px; font-weight:800; color:#555;">게임 인원</span>
        <select id="playerCount" onchange="updateInputFields()">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>

    <div class="player-select-wrap">
        <div style="font-size:13px; font-weight:800; color:var(--sub-text); margin-bottom:10px;">🕹️ 선수 선택</div>
        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">
            <div class="player-chip" onclick="togglePlayerSelection(this, '경배')">경배</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '원석')">원석</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '정석')">정석</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '진웅')">진웅</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '창한')">창한</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '경석')">경석</div>
        </div>
    </div>
    
    <button class="share-btn-common" style="background:#1abc9c; margin-bottom:20px;" onclick="pickRandomOrder()">🎲 초구 추첨하기</button>

    <div id="inputArea"></div>
    <div class="btn-group">
        <button id="mainBtn" class="save-btn" onclick="saveGame()">순위 저장</button>
        <button class="save-btn btn-cancel" onclick="resetInputs()">취소</button>
    </div>
    <div id="dayGameList"></div>
</div>

<div class="card stats-card">
    <h2 style="font-size:16px; margin:5px 0 14px 10px; color:#444; font-weight:800;">📊 멤버별 누적 전적 (이름 터치)</h2>
    <table class="stats-table">
        <thead>
            <tr>
                <th style="text-align:left; padding-left:12px;">이름</th>
                <th>참여</th>
                <th style="color:var(--rank1);">1위🥇</th>
                <th style="color:var(--rankL);">꼴찌💀</th>
                <th style="text-align:right; padding-right:12px;">승률</th>
            </tr>
        </thead>
        <tbody id="statsBody"></tbody>
    </table>
    <div id="richFriendArea" style="display:none; background: var(--bg); padding: 20px; border-radius: 22px; text-align: center; margin-top: 20px; color: #7f8c8d; font-weight: 800;"></div>
</div>

<div class="card" id="searchCard">
    <h2 style="font-size:16px; margin:5px 0 15px 10px; color:#444; font-weight:800;">🔍 월별 선수 전적 검색</h2>
    <div class="input-row"><label>검색월</label><input type="text" id="searchDateRange" readonly></div>
    <div class="input-row"><label>선수명</label><select id="searchPlayer"><option value="">선택</option></select></div>
    <div id="search-capture-area">
        <div style="display:flex; gap:10px;"><button class="save-btn" style="flex:2; margin:0;" onclick="searchRecords()">기록 검색</button><button class="save-btn btn-cancel" style="flex:1; margin:0;" onclick="resetSearch()">🔄</button></div>
        <div id="searchSummaryArea" style="margin-top:15px; display:none;"></div>
    </div>
    <div id="searchHistoryListArea" style="margin-top:10px; display:none;"></div>
</div>

<div class="danger-zone"><button class="exit-btn" id="exitBtn" onclick="showExitModal()">🚪 앱 종료</button></div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzVCB4XXeebyVvbDe91gcarwdwTSmmM92KciZf7F-1GLXikP3Jlz0rivWodR-1xXRMdtg/exec"; 
    const players = ["경배", "원석", "정석", "진웅", "창한", "경석"];
    let gameLogs = []; let currentViewDate = new Date(); let selectedDateStr = new Date().toLocaleDateString('sv-SE');
    let editMode = false; let editRound = null; let selectedPlayersForLottery = []; let searchFlatpickr; let animationStep = 0;

    // 🌟 개인 프로필 카드 함수 (캡처 겹침 방지 및 수칙 준수 로직)
    function renderMemberHistory(name) {
        if (!gameLogs || gameLogs.length === 0) return;
        const personalGames = gameLogs.filter(g => g.ranks.includes(name)).sort((a, b) => (new Date(b.dateStr) - new Date(a.dateStr)) || (parseInt(b.round) - parseInt(a.round)));
        if (personalGames.length === 0) return;

        let rankCounts = [0, 0, 0, 0, 0]; let rivals = {}; let victims = {};
        personalGames.forEach(g => {
            const actual = g.ranks.filter(n => n.trim() !== ""); const myRank = actual.indexOf(name);
            if (myRank === actual.length - 1 && actual.length > 1) rankCounts[4]++; else if (myRank < 4) rankCounts[myRank]++;
            if (myRank !== 0) { const winner = actual[0]; rivals[winner] = (rivals[winner] || 0) + 1; }
            if (myRank !== actual.length - 1) { const loser = actual[actual.length - 1]; victims[loser] = (victims[loser] || 0) + 1; }
        });

        const getTop = (obj) => { let max = 0, p = "없음"; for (let k in obj) { if (obj[k] > max) { max = obj[k]; p = k; } } return max > 0 ? `${p} (${max}회)` : "기록 부족"; };
        const winRate = ((rankCounts[0] / personalGames.length) * 100).toFixed(1);

        let html = `
            <div id="capture-target" style="padding:15px; background:#f4f4f4; border-radius:25px; width:340px; margin:0 auto; display:block;">
                <div style="font-size:22px; font-weight:900; margin-bottom:20px; color:#444;">🎱 ${name} 프로필</div>
                <div class="p-stat-box">
                    <div class="p-stat-item"><div style="font-size:11px; opacity:0.7;">총 참여</div><div style="font-size:16px; font-weight:900;">${personalGames.length}G</div></div>
                    <div class="p-stat-item"><div style="font-size:11px; opacity:0.7;">승률</div><div style="font-size:16px; font-weight:900; color:#e67e22;">${winRate}%</div></div>
                </div>
                <div class="rival-box">
                    <div style="margin-bottom:8px; font-size:13px; font-weight:900;">🔥 나의 천적: <span style="color:#ff5252;">${getTop(rivals)}</span></div>
                    <div style="font-size:13px; font-weight:900;">💎 나의 단골: <span style="color:#2196f3;">${getTop(victims)}</span></div>
                </div>
                <div style="text-align:left; margin-bottom:10px; font-size:12px; font-weight:900; color:#666;">🏆 최근 5경기 기록</div>
                <div style="display:flex; flex-direction:column; gap:8px;">
        `;

        personalGames.slice(0, 5).forEach(g => {
            const dailyIdx = gameLogs.filter(dayG => dayG.dateStr === g.dateStr).indexOf(g) + 1;
            const actual = g.ranks.filter(n => n.trim() !== ""); const rIdx = actual.indexOf(name);
            const rLabel = (rIdx === actual.length - 1) ? "꼴찌💀" : (rIdx + 1) + "위";
            const rColor = rIdx === 0 ? '#2196f3' : (rIdx === actual.length-1 ? '#ff5252' : '#5d4037');
            html += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 15px; background:#ffffff; border-radius:12px; border:1px solid rgba(0,0,0,0.05); width:100%;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size:13px; font-weight:800; color:#4a148c;">${g.dateStr}</span>
                        <span style="font-size:11px; font-weight:900; color:#1b5e20;">${dailyIdx}G</span>
                    </div>
                    <span style="font-size:15px; font-weight:900; color:${rColor};">${rLabel}</span>
                </div>`;
        });

        html += `</div></div>
            <button class="save-btn" style="margin-top:20px; font-size:12px; background:#6a11cb;" onclick="shareMemberResult('${name}')">📸 프로필 카드 스크린샷 공유</button>
            <button class="save-btn" style="background:#abb2b9; margin-top:10px;" onclick="document.getElementById('profile-card-modal').style.display='none'">닫기</button>
        `;
        document.getElementById('profile-card-content').innerHTML = html;
        document.getElementById('profile-card-modal').style.display = 'flex';
    }

    async function shareMemberResult(name) {
        const target = document.getElementById('capture-target'); if (!target) return;
        showLoading(true, "이미지 생성 중...");
        try {
            const canvas = await html2canvas(target, { backgroundColor: '#f4f4f4', scale: 2, logging: false, useCORS: true });
            canvas.toBlob(async (blob) => {
                const file = new File([blob], `${name}_profile.png`, { type: 'image/png' });
                if (navigator.share) { await navigator.share({ files: [file], title: `${name}의 프로필` }); } 
                else { const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `${name}_profile.png`; link.click(); }
                showLoading(false);
            }, 'image/png');
        } catch (e) { alert("캡처 오류"); showLoading(false); }
    }

    // 🌟 원본 v2.30의 모든 핵심 로직 100% 유지 (최적화 없이 그대로 복원)
    function showLastGameResult() {
        if (!gameLogs || gameLogs.length === 0) { setTimeout(showLastGameResult, 500); return; }
        const latestDate = gameLogs.reduce((max, game) => (game.dateStr > max ? game.dateStr : max), gameLogs[0].dateStr);
        const lastGame = gameLogs.filter(g => g.dateStr === latestDate).pop();
        const actualRanks = lastGame.ranks.filter(n => n && n.trim() !== "");
        let html = `<div style="font-size:40px; margin-bottom:10px;">🏆</div><h2 style="font-size:18px; font-weight:900; color:var(--text-color); margin:0 0 5px 0;">지난 마지막 게임 결과</h2><div style="font-size:15px; font-weight:800; color:var(--sub-text); margin-bottom: 20px;">[ ${lastGame.dateStr} ]</div><div style="display:flex; flex-direction:column; gap:8px; font-weight:900;">`;
        actualRanks.forEach((name, i) => {
            const rankLabel = (i === actualRanks.length - 1) ? "꼴찌💀" : `${i + 1}위`;
            const rankColor = (i === 0) ? 'var(--rank1)' : (i === actualRanks.length - 1 ? 'var(--rankL)' : 'var(--text-color)');
            html += `<div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.4); padding:12px 20px; border-radius:15px; border:1px solid rgba(0,0,0,0.05); shadow: inset 1px 1px 3px rgba(255,255,255,0.7);"><span style="color:${rankColor};">${rankLabel}</span><span style="color:${rankColor};">${name}</span></div>`;
        });
        html += `</div>`;
        const modal = document.getElementById('last-game-modal'); const content = document.getElementById('last-game-content');
        content.innerHTML = html; modal.style.display = 'flex';
        setTimeout(() => { content.style.animation = 'scaleDownPopup 0.4s ease-in forwards'; setTimeout(() => { modal.style.display = 'none'; }, 400); }, 3000);
    }

    async function fetchData() {
        showLoading(true, "Cloud 동기화 중");
        try {
            const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
            const rawData = await response.json();
            gameLogs = rawData.map(g => ({ ...g, dateStr: formatDate(g.date) }));
            renderAll(); showLoading(false);
        } catch (e) { showLoading(false); }
    }

    function togglePlayerSelection(el, name) {
        if (selectedPlayersForLottery.includes(name)) { selectedPlayersForLottery = selectedPlayersForLottery.filter(p => p !== name); el.classList.remove('active'); } 
        else { if (selectedPlayersForLottery.length >= parseInt(document.getElementById('playerCount').value)) return alert("인원 초과!"); selectedPlayersForLottery.push(name); el.classList.add('active'); }
        updateInputFields();
    }
    function resetPlayerSelection() { selectedPlayersForLottery = []; document.querySelectorAll('.player-chip').forEach(el => el.classList.remove('active')); updateInputFields(); }
    function updateInputFields() { const count = parseInt(document.getElementById('playerCount').value); const area = document.getElementById('inputArea'); area.innerHTML = ""; let target = selectedPlayersForLottery.length > 0 ? selectedPlayersForLottery : players; for(let i=1; i<=count; i++) { area.innerHTML += `<div class="input-row"><label>${i === count ? '꼴찌💀' : i+'위'}</label><select id="rank${i}"><option value="">선택</option>${target.map(p => `<option value="${p}">${p}</option>`).join('')}</select></div>`; } }
    async function saveGame() { const count = parseInt(document.getElementById('playerCount').value); const ranks = []; for(let i=1; i<=count; i++) { const v = document.getElementById('rank'+i).value; if(!v) return alert("순위 선택 필수!"); ranks.push(v); } showLoading(true, "저장 중"); await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "SAVE", date: selectedDateStr, ranks: ranks }) }); fetchData(); }
    function renderCalendar() { const grid = document.getElementById('calendarGrid'); grid.innerHTML = ""; const year = currentViewDate.getFullYear(); const month = currentViewDate.getMonth(); document.getElementById('monthDisplay').innerText = `${year}년 ${month + 1}월`; ["일","월","화","수","목","금","토"].forEach((d, i) => grid.innerHTML += `<div class="weekday" style="color:${i===0?'#e67e22':i===6?'#5dade2':'#95a5a6'}">${d}</div>`); const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate(); for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`; for (let d = 1; d <= lastDate; d++) { const dStr = formatDate(new Date(year, month, d)); grid.innerHTML += `<div class="day ${dStr === selectedDateStr ? 'selected' : ''} ${gameLogs.some(g => g.dateStr === dStr) ? 'has-record' : ''}" onclick="selectDate('${dStr}')">${d}</div>`; } }
    function renderStats() { let stats = {}; players.forEach(p => stats[p] = { played: 0, ranks: [0,0,0,0,0] }); gameLogs.forEach(g => { const actual = g.ranks.filter(n => n.trim() !== ""); actual.forEach((n, i) => { if(stats[n]) { stats[n].played++; if(i === actual.length-1 && actual.length>1) stats[n].ranks[4]++; else if(i<4) stats[n].ranks[i]++; } }); }); const sorted = [...players].sort((a,b) => stats[b].ranks[0] - stats[a].ranks[0]); document.getElementById('statsBody').innerHTML = sorted.map(p => { const win = stats[p].played > 0 ? ((stats[p].ranks[0] / stats[p].played) * 100).toFixed(1) : "0.0"; return `<tr><td style="font-weight:900; cursor:pointer; text-decoration:underline;" onclick="renderMemberHistory('${p}')">${p}</td><td>${stats[p].played}</td><td style="color:var(--rank1);">${stats[p].ranks[0]}</td><td style="color:var(--rankL);">${stats[p].ranks[4]}</td><td>${win}%</td></tr>`; }).join(''); }
    function renderGameList() { const games = gameLogs.filter(g => g.dateStr === selectedDateStr); document.getElementById('dayGameList').innerHTML = games.map((g, i) => `<div class="game-item"><span>${i+1}G</span><div>${g.ranks.filter(n => n.trim() !== "").join('→')}</div></div>`).join(''); }
    
    function pickRandomOrder() {
        const count = parseInt(document.getElementById('playerCount').value);
        if (selectedPlayersForLottery.length !== count) return alert(`${count}명을 선택해줘!`);
        let pool = [...selectedPlayersForLottery].sort(() => Math.random() - 0.5);
        pool.forEach((n, i) => { const el = document.getElementById('rank' + (i + 1)); if (el) el.value = n; });
    }

    function searchRecords() {
        const m = document.getElementById('searchDateRange').value; const p = document.getElementById('searchPlayer').value;
        if(!m || !p) return alert("월과 선수를 선택해줘!");
        const filtered = gameLogs.filter(g => g.dateStr.startsWith(m) && g.ranks.includes(p));
        document.getElementById('searchSummaryArea').style.display = 'block';
        document.getElementById('searchSummaryArea').innerHTML = `<div style="background:var(--record-bg); padding:15px; border-radius:15px; font-weight:900; color:var(--record-border); text-align:center;">${p}의 ${m} 성적: ${filtered.length}전</div>`;
    }

    function resetSearch() { document.getElementById('searchDateRange').value = ""; document.getElementById('searchPlayer').value = ""; document.getElementById('searchSummaryArea').style.display='none'; }
    function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }
    function formatDate(d) { const date = new Date(d); return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0'); }
    function selectDate(d) { selectedDateStr = d; document.getElementById('selectedDateTitle').innerText = `📅 ${d}`; renderCalendar(); renderGameList(); }
    function showLoading(v, t) { document.getElementById('loadingText').innerText = t; document.getElementById('loading').style.display = v ? 'flex' : 'none'; }
    function renderAll() { renderCalendar(); renderStats(); renderGameList(); }
    function toggleTheme() { const isDark = document.getElementById('themeSwitch').checked; document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light'); }
    function changeZoom(v) { document.body.style.zoom = v; }
    function showExitModal() { document.getElementById('exit-modal').style.display = 'flex'; }
    function closeExitModal() { document.getElementById('exit-modal').style.display = 'none'; }
    function closeAppWindow() { window.close(); }
    function closeOrderModal() { document.getElementById('order-modal').style.display = 'none'; }

    window.onload = () => { 
        searchFlatpickr = flatpickr("#searchDateRange", { plugins: [new monthSelectPlugin({ shorthand: true, dateFormat: "Y-m" })], locale: "ko", onChange: (dates, dateStr) => {
            let options = '<option value="">선택</option>'; players.forEach(p => options += `<option value="${p}">${p}</option>`); document.getElementById('searchPlayer').innerHTML = options;
        }});
        fetchData();
        setTimeout(() => { const ws = document.getElementById('welcome-screen'); if(ws) { ws.style.opacity = '0'; setTimeout(() => { ws.style.display = 'none'; showLastGameResult(); }, 800); } }, 3000);
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent); if(isIOS) { document.getElementById('exitBtn').innerText = "📱 Return Home"; }
    };
</script>
</body>
</html>
