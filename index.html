<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    <link rel="apple-touch-icon" href="image_0.png">
    <title>우리들의 Billiard World</title>
    
    <style>
        /* [1] 기존 원본 CSS 그대로 유지 */
        :root { 
            --main: #7f8c8d; --bg: rgba(236, 238, 241, 0.4); --accent: #ff4757; --success: #27ae60; --edit: #f39c12; 
            --today-bg: #e3f2fd; --today-border: #2196f3; --select-bg: #fff0f3; --select-border: #ff4d6d; 
            --record-bg: #e8f5e9; --record-border: #4caf50; --record-dot: #e67e22; 
            --shadow: 8px 8px 16px rgba(180, 180, 180, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --inner-shadow: inset 3px 3px 7px rgba(180, 180, 180, 0.4), inset -3px -3px 7px rgba(255, 255, 255, 0.8);
            --rank1: #2196f3; --rank2: #27ae60; --rank3: #8e44ad; --rank4: #f39c12; --rankL: #ff4757; 
            --dup-bg: #fffde7; --dup-border: #ff80ab; --dup-text: #7b1fa2;
            --card-bg: rgba(243, 230, 255, 0.7); --text-color: #444; --sub-text: #666; --label-text: #777; --danger-text: #7b1fa2; 
        }

        /* [2] 친구 선택 테이블 전용 스타일 추가 (기존 UI 방해 금지) */
        .player-select-table { width: 100%; border-collapse: separate; border-spacing: 5px; margin-bottom: 15px; }
        .player-chip { 
            padding: 12px 5px; border-radius: 14px; background: rgba(255,255,255,0.6); border: 1px solid rgba(0,0,0,0.05);
            font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.2s; color: #777; text-align: center;
            box-shadow: var(--shadow);
        }
        .player-chip.active { background: var(--today-bg); border: 2px solid var(--today-border); color: var(--today-border); box-shadow: none; }
        
        .lottery-btn { width: 100%; padding: 15px; background: linear-gradient(145deg, #27ae60, #2ecc71); color: white; border: none; border-radius: 18px; font-weight: 900; margin-bottom: 20px; box-shadow: var(--shadow); cursor: pointer; }

        /* [이후 원본 style 태그 내용 전체 복사...] */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px; background-image: url('image_1.png'); background-size: cover; background-attachment: fixed; min-height: 100vh; color: var(--text-color); }
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #4a90e2, #9370db); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.8s ease-out; color: white; text-align: center; pointer-events: none; }
        /* (나머지 원본 CSS는 동일하게 유지) */
    </style>
</head>
<body id="app-body">

<div id="welcome-screen">
    <div class="welcome-content">
        <img src="image_0.png" alt="앱 아이콘" class="welcome-logo">
        <div class="welcome-text">경배와 친구들의<br>당구 세상에 오신걸 환영합니다.<br><br><br><br><br>Created by Ju Kyung Bae</div>
    </div>
</div>

<div class="calendar-card">
    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="monthDisplay" style="font-size:20px; font-weight:900;"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card" id="inputCard">
    <h2 id="selectedDateTitle" style="font-size:17px; margin:0 0 20px 0; font-weight:800;">📅 날짜 확인 중</h2>

    <div style="font-size:13px; font-weight:800; color:var(--sub-text); margin-bottom:8px;">🕹️ 오늘 참여하는 친구 선택</div>
    <table class="player-select-table">
        <tr>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '경배')">경배</div></td>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '원석')">원석</div></td>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '정석')">정석</div></td>
        </tr>
        <tr>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '진웅')">진웅</div></td>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '창한')">창한</div></td>
            <td><div class="player-chip" onclick="togglePlayerSelection(this, '경석')">경석</div></td>
        </tr>
    </table>

    <div class="setup-row">
        <span style="font-size:14px; font-weight:800; color:#555;">경기 인원</span>
        <select id="playerCount" onchange="updateInputFields()">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>

    <button class="lottery-btn" onclick="pickRandomOrder()">🎲 선택 멤버로 초구 추첨</button>

    <div id="inputArea"></div>
    <div class="btn-group">
        <button id="mainBtn" class="save-btn" onclick="saveGame()">순위 저장</button>
        <button class="save-btn btn-cancel" onclick="resetInputs()">취소</button>
    </div>
    <div id="capture-area"><div id="dayGameList"></div></div>
</div>

<div class="card stats-card">
    <h2 style="font-size:16px; margin:5px 0 14px 10px; font-weight:800;">📊 멤버별 누적 전적</h2>
    <table class="stats-table">
        <thead>
            <tr>
                <th style="text-align:left; padding-left:12px;">이름</th>
                <th>참여</th>
                <th style="color:var(--rank1);">1위🥇</th>
                <th style="color:var(--rank2);">2위</th>
                <th style="color:var(--rank3);">3위</th>
                <th style="color:var(--rank4);">4위</th>
                <th style="color:var(--rankL);">꼴찌💀</th>
                <th style="text-align:right; padding-right:12px;">승률</th>
            </tr>
        </thead>
        <tbody id="statsBody"></tbody>
    </table>
    <div id="memberHistoryArea" class="history-area"></div>
</div>

<script>
    /* 기존 스크립트에 아래 변수와 함수만 추가 */
    let selectedPlayersForLottery = [];

    function togglePlayerSelection(el, name) {
        if (selectedPlayersForLottery.includes(name)) {
            selectedPlayersForLottery = selectedPlayersForLottery.filter(p => p !== name);
            el.classList.remove('active');
        } else {
            const limit = parseInt(document.getElementById('playerCount').value);
            if (selectedPlayersForLottery.length >= limit) {
                alert(`인원을 ${limit}명으로 설정했잖아!`); return;
            }
            selectedPlayersForLottery.push(name);
            el.classList.add('active');
        }
    }

    function pickRandomOrder() {
        const limit = parseInt(document.getElementById('playerCount').value);
        if (selectedPlayersForLottery.length !== limit) {
            alert(`참여할 친구 ${limit}명을 먼저 선택해줘!`); return;
        }
        const shuffled = [...selectedPlayersForLottery].sort(() => Math.random() - 0.5);
        alert(`🎲 추첨 결과!\n1번(초구): ${shuffled[0]}\n2번: ${shuffled[1]}${shuffled[2]?` \n3번: ${shuffled[2]}`:''}${shuffled[3]?` \n4번: ${shuffled[3]}`:''}${shuffled[4]?` \n5번: ${shuffled[4]}`:''}\n\n결과가 명단에 자동 입력됐어!`);
        
        // 입력창에 자동 대입
        shuffled.forEach((name, idx) => {
            const select = document.getElementById('rank' + (idx + 1));
            if(select) select.value = name;
        });
    }

    /* 나머지 fetchData, renderStats, saveGame 등 원본 함수 유지 */
</script>
</body>
</html>
