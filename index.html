<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>경배와 친구들 당구</title>
    <style>
        :root { --main: #007bff; --bg: #f4f7f6; --accent: #ff4757; --success: #2ed573; --edit: #f39c12; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 100px; }
        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 달력 스타일 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; border: 1px solid #eee; font-size: 14px; background: white; position: relative; }
        .day.selected { background: var(--main) !important; color: white !important; font-weight: bold; transform: scale(1.05); z-index: 1; }
        .has-record { border: 2.5px solid var(--success) !important; background: #e8f9ee !important; font-weight: bold; }
        
        .setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .input-row { display: flex; align-items: center; margin-bottom: 10px; }
        .input-row label { width: 55px; font-weight: bold; font-size: 13px; color: var(--main); }
        select { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; background: #fff; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .save-btn { background: var(--main); color: white; }
        .edit-mode-btn { background: var(--edit); color: white; }
        
        .game-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 12px; margin-top: 10px; background: #fafafa; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .stats-table th, .stats-table td { padding: 10px 2px; border-bottom: 1px solid #eee; text-align: center; }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; font-weight: bold; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--main); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loadingText">데이터 동기화 중...</div></div>

<div class="card">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
        <button onclick="changeMonth(-1)" style="border:none; background:#eee; border-radius:50%; width:35px; height:35px;">◀</button>
        <b id="monthDisplay" style="font-size:18px;"></b>
        <button onclick="changeMonth(1)" style="border:none; background:#eee; border-radius:50%; width:35px; height:35px;">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card">
    <h3 id="selectedDateTitle" style="margin:0 0 15px 0;">날짜를 선택하세요</h3>
    <div id="editBadge" style="display:none; color:white; background:var(--edit); padding:8px; border-radius:10px; text-align:center; margin-bottom:12px; font-size:13px; font-weight:bold;">✏️ 기존 기록 수정 중</div>
    
    <div class="setup-row">
        <span style="font-weight:bold; font-size:14px;">참여 인원</span>
        <select id="playerCount" onchange="updateInputFields()" style="width:90px; flex:none;">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>
    
    <div id="inputArea"></div>
    <button id="mainBtn" class="btn save-btn" onclick="saveGame()">기록 저장</button>
    
    <div id="dayGameList"></div>
</div>

<div class="card">
    <h3 style="margin-top:0;">📊 누적 전적</h3>
    <table class="stats-table">
        <thead><tr><th>이름</th><th>참여</th><th>1위🥇</th><th>꼴찌💀</th></tr></thead>
        <tbody id="statsBody"></tbody>
    </table>
</div>

<button onclick="startResetProcess()" style="width:100%; color:#999; border:none; background:none; font-size:12px; text-decoration:underline; margin-top:30px; margin-bottom:50px;">모든 데이터 초기화</button>

<script>
    // ⚠️ 여기에 새로 배포한 웹 앱 URL을 넣으세요
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxDAz9PxoUVhF2KAfqVOs2jXR7yS3bz_7HwjOVnIj2z8isr3BL3BKuplE6mBZdJywXV/exec"; 
    const players = ["경배", "원석", "진웅", "창한", "정석"];
    let gameLogs = [], curDate = new Date(), selDate = new Date().toLocaleDateString('sv-SE'), editId = null;

    async function fetchData() {
        toggleLoading(true, "데이터를 불러오는 중...");
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            gameLogs = await res.json();
            render();
        } catch(e) { console.error(e); }
        finally { toggleLoading(false); }
    }

    function render() {
        // 달력 렌더링
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        const y = curDate.getFullYear(), m = curDate.getMonth();
        document.getElementById('monthDisplay').innerText = `${y}년 ${m+1}월`;
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
        
        for(let i=0; i<first; i++) grid.innerHTML += "<div></div>";
        for(let d=1; d<=last; d++) {
            const dstr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSelected = dstr === selDate ? 'selected' : '';
            const hasRecord = gameLogs.some(g => {
                const gDate = typeof g.date === 'string' ? g.date.split('T')[0] : new Date(g.date).toLocaleDateString('sv-SE');
                return gDate === dstr;
            }) ? 'has-record' : '';
            grid.innerHTML += `<div class="day ${isSelected} ${hasRecord}" onclick="selectDate('${dstr}')">${d}</div>`;
        }
        
        // 당일 경기 목록 렌더링
        const list = document.getElementById('dayGameList');
        list.innerHTML = "";
        const dayGames = gameLogs.filter(g => {
            const gDate = typeof g.date === 'string' ? g.date.split('T')[0] : new Date(g.date).toLocaleDateString('sv-SE');
            return gDate === selDate;
        });
        
        if(dayGames.length > 0) list.innerHTML = "<p style='font-size:12px; color:#f39c12; font-weight:bold; margin-top:20px;'>⌵ 오늘의 경기 목록</p>";
        dayGames.forEach((g, i) => {
            list.innerHTML += `<div class="game-item">
                <span style="flex:1; font-size:14px;" onclick="enterEdit('${g.round}', '${g.ranks}')"><b>${i+1}.</b> ${g.ranks.join(' → ')}</span>
                <b onclick="deleteGame('${g.round}')" style="color:red; cursor:pointer; font-size:12px; padding:5px;">삭제</b>
            </div>`;
        });

        // 전적 계산 및 렌더링
        const stats = {};
        players.forEach(p => stats[p] = {p:0, f:0, l:0});
        gameLogs.forEach(g => {
            g.ranks.forEach((n, i) => {
                if(stats[n]) {
                    stats[n].p++;
                    if(i === 0) stats[n].f++;
                    if(i === g.ranks.length - 1) stats[n].l++;
                }
            });
        });
        document.getElementById('statsBody').innerHTML = players.map(p => `
            <tr><td><b>${p}</b></td><td>${stats[p].p}</td><td>${stats[p].f}</td><td style="color:red; font-weight:bold;">${stats[p].l}</td></tr>
        `).join('');
    }

    function selectDate(d) { 
        selDate = d; 
        document.getElementById('selectedDateTitle').innerText = `📅 ${d}`; 
        if(editId) cancelEdit(); 
        render(); 
    }
    
    function updateInputFields(pre = []) {
        const area = document.getElementById('inputArea');
        const count = pre.length > 0 ? pre.length : document.getElementById('playerCount').value;
        if(pre.length > 0) document.getElementById('playerCount').value = count;
        
        area.innerHTML = "";
        for(let i=0; i<count; i++) {
            const label = (i === count - 1) ? "꼴찌💀" : `${i+1}위`;
            area.innerHTML += `
                <div class="input-row">
                    <label>${label}</label>
                    <select id="r${i}">
                        <option value="">선수 선택</option>
                        ${players.map(p => `<option value="${p}" ${pre[i]===p?'selected':''}>${p}</option>`).join('')}
                    </select>
                </div>`;
        }
    }

    async function saveGame() {
        const count = document.getElementById('playerCount').value;
        const ranks = [];
        for(let i=0; i<count; i++) {
            const val = document.getElementById('r'+i).value;
            if(!val) return alert("모든 순위를 선택해주세요.");
            ranks.push(val);
        }
        if(new Set(ranks).size !== ranks.length) return alert("중복된 선수가 있습니다.");

        toggleLoading(true, "기록 저장 중...");
        await fetch(GAS_URL, { 
            method: 'POST', mode: 'no-cors', 
            body: JSON.stringify({ action: editId ? "UPDATE" : "SAVE", date: selDate, ranks, round: editId }) 
        });
        setTimeout(() => { fetchData(); cancelEdit(); }, 2000);
    }

    async function deleteGame(id) {
        if(!confirm("정말 이 기록을 삭제하시겠습니까?")) return;
        toggleLoading(true, "서버에서 삭제 중...");
        await fetch(GAS_URL, { 
            method: 'POST', mode: 'no-cors', 
            body: JSON.stringify({ action: "DELETE", round: String(id) }) 
        });
        setTimeout(fetchData, 2000);
    }

    function enterEdit(id, rstr) {
        editId = id;
        const rArr = rstr.split(',');
        updateInputFields(rArr);
        document.getElementById('editBadge').style.display = 'block';
        const btn = document.getElementById('mainBtn');
        btn.innerText = "경기 기록 수정 완료";
        btn.className = "btn edit-mode-btn";
        window.scrollTo(0, 300);
    }

    function cancelEdit() {
        editId = null;
        document.getElementById('editBadge').style.display = 'none';
        const btn = document.getElementById('mainBtn');
        btn.innerText = "기록 저장";
        btn.className = "btn save-btn";
        updateInputFields();
    }

    // 3단계 초기화 확인 절차
    async function startResetProcess() {
        if(!confirm("⚠️ [1단계] 정말 모든 데이터를 삭제하시겠습니까?")) return;
        if(!confirm("⚠️ [2단계] 전적과 달력 기록이 모두 사라지며 복구할 수 없습니다. 계속할까요?")) return;
        if(!confirm("⚠️ [마지막 확인] 정말로 초기화하시겠습니까?")) return;
        
        toggleLoading(true, "모든 데이터 초기화 중...");
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "RESET" }) });
        setTimeout(() => location.reload(), 2000);
    }

    function changeMonth(v) { curDate.setMonth(curDate.getMonth() + v); render(); }
    function toggleLoading(v, text) { 
        document.getElementById('loadingText').innerText = text || "처리 중...";
        document.getElementById('loading').style.display = v ? 'flex' : 'none'; 
    }
    
    window.onload = () => { selectDate(selDate); fetchData(); };
</script>
</body>
</html>
