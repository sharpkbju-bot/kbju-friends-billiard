<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경배와 친구들 당구 전적</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3256/3256247.png">
  
  <style>
    /* --- 기존 스타일 유지 --- */
    :root { --primary-color: #007bff; --bg-color: #f4f7f6; --text-color: #333; }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: var(--primary-color); margin-bottom: 20px; font-size: 1.5rem; }
    .form-group { margin-bottom: 15px; }
    .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .ranks-input { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .ranks-input input { flex: 1; min-width: 45%; }
    .btn-box { display: flex; gap: 10px; justify-content: flex-end; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: background-color 0.2s; }
    .btn-primary { background-color: var(--primary-color); color: white; }
    .btn-warning { background-color: #ffc107; color: #333; }
    .btn-danger { background-color: #dc3545; color: white; }

    /* --- [수정] 5명이 모두 표시되도록 조정한 목록 스타일 --- */
    #record-list { list-style: none; padding: 0; margin-top: 30px; }
    .record-item { background: #f9f9f9; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #007bff; display: flex; flex-direction: column; }
    .record-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .record-date { font-weight: bold; color: #555; font-size: 14px; }
    
    .record-content { 
      width: 100%; 
      /* 글자 크기를 줄이고 줄 바꿈을 허용하여 5명이 다 보이게 함 */
      font-size: 12px; 
      white-space: normal; 
      word-break: keep-all; 
      line-height: 1.6;
    }

    .record-ranks-list { display: flex; flex-wrap: wrap; list-style: none; padding: 0; margin: 0; gap: 8px; }
    .record-ranks-item { color: #333; font-weight: 500; background: #eee; padding: 2px 6px; border-radius: 4px; }
    .rank-label { color: var(--primary-color); font-weight: bold; margin-right: 3px; font-size: 10px; }

    .record-actions { display: flex; gap: 10px; margin-top: 12px; border-top: 1px solid #eee; padding-top: 8px; }
    .action-btn { font-size: 12px; cursor: pointer; color: #666; text-decoration: underline; border: none; background: none; padding: 0; }
    .action-delete { color: #dc3545; }
  </style>
</head>
<body>

<div class="container">
  <h1>경배와 친구들</h1>

  <div class="form-group">
    <label for="game-date">날짜</label>
    <input type="date" id="game-date" class="form-control">
  </div>
  <div class="form-group">
    <label>순위 기록</label>
    <div class="ranks-input">
      <input type="text" id="rank-1" class="form-control" placeholder="1등">
      <input type="text" id="rank-2" class="form-control" placeholder="2등">
      <input type="text" id="rank-3" class="form-control" placeholder="3등">
      <input type="text" id="rank-4" class="form-control" placeholder="4등">
      <input type="text" id="rank-5" class="form-control" placeholder="5등">
    </div>
  </div>
  <div class="btn-box">
    <input type="hidden" id="edit-round">
    <button id="btn-save" class="btn btn-primary" onclick="saveData()">기록 저장</button>
    <button id="btn-update" class="btn btn-warning" style="display:none;" onclick="updateData()">수정 완료</button>
    <button id="btn-cancel" class="btn btn-danger" style="display:none;" onclick="clearForm()">취소</button>
  </div>

  <ul id="record-list"></ul>
</div>

<script>
  // 🚨 배포 URL을 입력하세요
  const GAS_URL = "https://script.google.com/macros/s/AKfycbz3DvmZ32bGaVq4CSffpXCK6oCJ8V3Sg3Ao6A8qi2POZK0UUGEOMjLIanqhflMybo4k/exec"; 

  async function loadData() {
    try {
      const response = await fetch(GAS_URL);
      const data = await response.json();
      renderRecords(data.reverse());
    } catch (error) {
      console.error("오류:", error);
    }
  }

  function renderRecords(records) {
    const list = document.getElementById('record-list');
    list.innerHTML = "";
    records.forEach(record => {
      const li = document.createElement('li');
      li.className = "record-item";
      
      let ranksHtml = record.ranks.map((name, i) => 
        name ? `<li class="record-ranks-item"><span class="rank-label">${i+1}위</span>${name}</li>` : ""
      ).join("");

      li.innerHTML = `
        <div class="record-header"><span class="record-date">${record.date}</span></div>
        <div class="record-content"><ul class="record-ranks-list">${ranksHtml}</ul></div>
        <div class="record-actions">
          <button class="action-btn" onclick='startEdit(${JSON.stringify(record)})'>수정</button>
          <button class="action-btn action-delete" onclick="deleteGame(${record.round})">삭제</button>
        </div>
      `;
      list.appendChild(li);
    });
  }

  async function saveData() {
    const payload = { action: "SAVE", date: document.getElementById('game-date').value, 
      ranks: [1,2,3,4,5].map(i => document.getElementById(`rank-${i}`).value) };
    await sendPost(payload);
  }

  async function updateData() {
    const payload = { action: "UPDATE", round: document.getElementById('edit-round').value, 
      date: document.getElementById('game-date').value, 
      ranks: [1,2,3,4,5].map(i => document.getElementById(`rank-${i}`).value) };
    await sendPost(payload);
  }

  async function deleteGame(round) {
    if (confirm("삭제하시겠습니까?")) await sendPost({ action: "DELETE", round });
  }

  function startEdit(record) {
    document.getElementById('edit-round').value = record.round;
    document.getElementById('game-date').value = record.date;
    record.ranks.forEach((name, i) => document.getElementById(`rank-${i+1}`).value = name || "");
    document.getElementById('btn-save').style.display = 'none';
    document.getElementById('btn-update').style.display = 'inline-block';
    document.getElementById('btn-cancel').style.display = 'inline-block';
  }

  async function sendPost(payload) {
    await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
    clearForm();
    loadData();
  }

  function clearForm() {
    document.getElementById('game-date').value = "";
    [1,2,3,4,5].forEach(i => document.getElementById(`rank-${i}`).value = "");
    document.getElementById('edit-round').value = "";
    document.getElementById('btn-save').style.display = 'inline-block';
    document.getElementById('btn-update').style.display = 'none';
    document.getElementById('btn-cancel').style.display = 'none';
  }

  loadData();
</script>
</body>
</html>
