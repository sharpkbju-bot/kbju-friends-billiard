
<!DOCTYPE html>        
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json?v=4.00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">

    <link rel="icon" type="image/png" sizes="512x512" href="image_0.png?v=4.00">
    <link rel="apple-touch-icon" href="image_0.png?v=4.00">
        
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">

    <title>우리들의 Billiard World</title>
    
    <style>
        :root { 
            --main: #7f8c8d; 
            --bg: rgba(236, 238, 241, 0.4); 
            --accent: #ff4757; 
            --success: #27ae60; 
            --edit: #f39c12; 
            --today-bg: #e3f2fd; 
            --today-border: #2196f3; 
            --select-bg: #fff0f3; 
            --select-border: #ff4d6d; 
            --record-bg: #e8f5e9; 
            --record-border: #4caf50; 
            --record-dot: #e67e22; 
            --shadow: 8px 8px 16px rgba(180, 180, 180, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --inner-shadow: inset 3px 3px 7px rgba(180, 180, 180, 0.4), inset -3px -3px 7px rgba(255, 255, 255, 0.8);
            
            --rank1: #2196f3; --rank2: #27ae60; --rank3: #8e44ad; --rank4: #f39c12; --rankL: #ff4757; 
            --dup-bg: #fffde7; --dup-border: #ff80ab; --dup-text: #7b1fa2;
            --card-bg: rgba(255, 252, 225, 0.8); 
            --edit-mode-bg: #e8f5e9; --edit-mode-border: #2d5a27; 
            --text-color: #444; --sub-text: #666; --label-text: #777; --danger-text: #7b1fa2; 
            --graph-line: #2980b9;
        }

        [data-theme='yellow'] { --card-bg: rgba(255, 252, 225, 0.8); }
        [data-theme='yellowgreen'] { --card-bg: rgba(240, 255, 230, 0.8); }
        [data-theme='purple'] { --card-bg: rgba(243, 230, 255, 0.8); }
        [data-theme='green'] { --card-bg: rgba(225, 250, 235, 0.8); }
        [data-theme='pink'] { --card-bg: rgba(255, 235, 240, 0.8); }
        [data-theme='gray'] { --card-bg: rgba(240, 240, 240, 0.8); }
        [data-theme='navy'] {
            --main: #bdc3c7; --bg: rgba(10, 25, 47, 0.9); --today-bg: #1a237e; --today-border: #448aff;
            --select-bg: #1a237e; --select-border: #5c6bc0; --record-bg: #1a237e; --record-border: #3f51b5;
            --shadow: 8px 8px 16px rgba(0, 0, 0, 0.5), -4px -4px 10px rgba(255, 255, 255, 0.05);
            --inner-shadow: inset 3px 3px 7px rgba(0, 0, 0, 0.6), inset -2px -2px 5px rgba(255, 255, 255, 0.05);
            --card-bg: rgba(20, 35, 75, 0.9); --dup-bg: #2c1a1a; --dup-border: #ff5252; --dup-text: #ffccbc;
            --text-color: #e0e0e0; --sub-text: #b0bec5; --label-text: #90a4ae; --danger-text: #ffffff; 
            --rank1: #64b5f6; --rank2: #66bb6a; --rank3: #ba68c8; --rank4: #ffb74d; --rankL: #ff8a80; 
            --edit-mode-bg: rgba(30, 45, 90, 0.9); --edit-mode-border: #66bb6a; --graph-line: #4dd0e1;
        }
        [data-theme='dark'] {
            --main: #bdc3c7; --bg: rgba(30, 30, 30, 0.9); --today-bg: #1a237e; --today-border: #448aff;
            --select-bg: #4a148c; --select-border: #e91e63; --record-bg: #1b5e20; --record-border: #81c784;
            --shadow: 8px 8px 16px rgba(0, 0, 0, 0.6), -4px -4px 10px rgba(60, 60, 60, 0.2);
            --inner-shadow: inset 3px 3px 7px rgba(0, 0, 0, 0.7), inset -2px -2px 5px rgba(60, 60, 60, 0.2);
            --card-bg: rgba(60, 60, 65, 0.9); --dup-bg: #3e2723; --dup-border: #ff5252; --dup-text: #ffccbc;
            --text-color: #eeeeee; --sub-text: #cccccc; --label-text: #bbbbbb; --danger-text: #ffffff; 
            --rank1: #64b5f6; --rank2: #2ecc71; --rank3: #ba68c8; --rank4: #ffb74d; --rankL: #ff8a80; 
            --edit-mode-bg: rgba(35, 35, 45, 0.9); --edit-mode-border: #27ae60; --graph-line: #4dd0e1;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px;
            background-image: url('image_1.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
            min-height: 100vh; color: var(--text-color); scroll-behavior: smooth;
        }
        
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2196f3, #0d47a1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100005; transition: opacity 0.8s ease-out; color: white; text-align: center;
            pointer-events: none;
        }
        .welcome-content { animation: fadeInUp 1s ease-out; }
        .welcome-logo { width: 60px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
        .welcome-text { font-size: 14px; font-weight: 300; line-height: 1.6; text-shadow: 0 2px 4px rgba(0,0,0,0.2); font-family: "Apple Chancery", "Snell Roundhand", "Comic Sans MS", cursive; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .calendar-card {
            background: var(--card-bg); backdrop-filter: blur(5px); border-radius: 12px; padding: 24px 18px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn {
            border: none; background: rgba(236, 238, 241, 0.4); width: 44px; height: 44px; border-radius: 8px; box-shadow: 4px 4px 8px rgba(180, 180, 180, 0.3), -4px -4px 8px rgba(255, 255, 255, 0.7);
            font-size: 14px; cursor: pointer; color: #777; transition: 0.2s;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .weekday { font-size: 11px; font-weight: 900; padding-bottom: 10px; color: #95a5a6; }
        .day { 
            width: 100%; max-width: 42px; height: 42px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 700; position: relative; 
            background: linear-gradient(145deg, rgba(253, 253, 253, 0.8), rgba(226, 229, 234, 0.8)); box-shadow: 6px 6px 14px rgba(0, 0, 0, 0.22), -2px -2px 6px rgba(255, 255, 255, 0.8); 
            transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #555; border: 1px solid rgba(255,255,255,0.4);
        }
        .day.sat { color: #5dade2; } .day.sun, .day.holiday { color: #e67e22; } .day.today { background: var(--today-bg) !important; color: var(--today-border) !important; border: 2px solid var(--today-border) !important; }
        .day.has-record { background: var(--record-bg) !important; border: 2px solid var(--record-border) !important; color: #2e7d32 !important; }
        .day.has-record::after { content: ''; position: absolute; bottom: 4px; width: 5px; height: 5px; background: var(--record-dot) !important; border-radius: 50%; }
        .day.selected { background: #ff4d6d !important; color: #ffffff !important; transform: scale(1.15) translateZ(0) !important; z-index: 5; border: 2px solid #c51162 !important; box-shadow: 4px 4px 10px rgba(255, 77, 109, 0.4), -2px -2px 6px rgba(255, 255, 255, 0.9) !important; }

        .card { background: var(--card-bg); backdrop-filter: blur(5px); border-radius: 12px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.4); }
        .setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; }
        select#playerCount, select#themeSelect { flex: none !important; padding: 8px !important; margin-left: auto; border-radius: 8px !important; }
        select#playerCount { width: 85px !important; }
        select#themeSelect { width: 120px !important; font-weight: 800; color: #4a148c; cursor: pointer; }

        .input-row { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; width: 100%; }
        .input-row label { width: 85px; min-width: 85px; max-width: 85px; font-size: 13px; font-weight: 800; color: var(--label-text); flex-shrink: 0; white-space: nowrap; }
        select, input[type="date"], input[type="text"]#searchDateRange { 
            width: 0; flex: 1 1 auto; padding: 12px; border-radius: 8px; border: 2px solid transparent; font-size: 14px; 
            background: rgba(236, 238, 241, 0.4); box-shadow: var(--inner-shadow); color: var(--text-color); font-weight: 600; -webkit-appearance: none; text-align: center; text-align-last: center;
        }

        button.save-btn { 
            width: 100%; padding: 12px !important; background: linear-gradient(145deg, #abb2b9, #7f8c8d); color: white; border: none; border-radius: 8px !important; font-weight: 800; margin-top: 15px; cursor: pointer; font-size: 14px; box-shadow: 8px 10px 20px rgba(0, 0, 0, 0.38), -2px -2px 8px rgba(255, 255, 255, 0.5);
        }
        button.edit-btn { background: linear-gradient(145deg, #ffae24, #da8c10) !important; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; } .btn-group button { flex: 1; margin-top: 0 !important; }

        .stats-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 12px; table-layout: fixed; text-align: center; }
        .stats-table th { padding: 8px 0px; color: #5D4037; font-weight: 900; font-size: 11.5px; border-bottom: 2px solid rgba(0,0,0,0.05); }
        .stats-table td { padding: 12px 0px; font-weight: 800; color: var(--text-color); }

        #loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(236, 238, 241, 0.8); backdrop-filter: blur(3px); z-index: 100002;
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }
        .spinner { border: 5px solid rgba(209, 217, 230, 0.6); border-top: 5px solid var(--main); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .game-item { position: relative; padding: 12px 8px; border-radius: 8px; background: linear-gradient(145deg, #f0f0f0, #ffffff); margin-top: 15px; display: flex; justify-content: center; align-items: center; box-shadow: 6px 6px 12px rgba(0,0,0,0.1); cursor: pointer; }
        .action-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; gap: 10px; border-radius: 8px; overflow: hidden; }
        .action-overlay.active { display: flex; }
        .overlay-btn { padding: 6px 10px !important; border-radius: 8px !important; font-weight: 900; font-size: 13px; box-shadow: 2px 4px 8px rgba(0,0,0,0.15); transition: 0.2s; border:none; line-height: 1.5; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
        
        .zoom-active .overlay-btn { padding: 4px 8px !important; font-size: 11px !important; }
        .zoom-active .strategy-subtitle { display: block; margin-top: 4px; font-size: 11px !important; }

        .mvp-container { margin-top: 15px; padding: 15px; background: rgba(255, 255, 255, 0.5); border-radius: 12px; border: 2px solid var(--rank1); display: none; flex-direction: column; gap: 10px; }
        .mvp-badge { display: flex; align-items: center; background: rgba(255, 255, 255, 0.7); padding: 10px 15px; border-radius: 10px; gap: 5px; }
        /* MVP 이름 열 정렬 픽스 */
        .mvp-title { font-size: 12px; font-weight: 800; color: var(--sub-text); flex: 1; text-align: left; }
        .mvp-player { font-size: 15px; font-weight: 900; color: var(--rank1); flex: 1; text-align: center; }
        .mvp-value { font-size: 11px; font-weight: 800; color: var(--rankL); flex: 1; text-align: right; }

        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: rgba(255, 252, 212, 0.85); border-radius: 8px; margin-bottom: 8px; font-weight: 800; color: #555; border: 2.5px solid #ff69b4; }
        .condition-box { display:flex; align-items:center; justify-content:space-between; background:rgba(255, 255, 255, 0.5); padding:12px 10px; border-radius:8px; margin-bottom:15px; border: 1.5px solid navy; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body id="app-body">

<div id="welcome-screen">
    <div class="welcome-content">
        <img src="image_0.png" alt="앱 아이콘" class="welcome-logo">
        <div class="welcome-text">경배와 친구들의<br>당구 세상에 오신걸 환영합니다.<br><br><br><br><br>Created by&nbsp;&nbsp;&nbsp;<span style="font-size: 20px; font-weight: bold;">Ju Kyung Bae</span></div><br>Version&nbsp;&nbsp;4.00
    </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loadingText" style="font-weight:800; color:var(--main);">순위 데이터 동기화 중</div></div>

<div id="player-score-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 100008; backdrop-filter: blur(5px);" onclick="closePlayerScoreModal()">
    <div class="last-game-content" id="player-score-content" style="background:var(--card-bg); padding:30px; border-radius:12px; text-align:center; width:85%; max-width:320px;" onclick="event.stopPropagation()"></div>
</div>

<div id="order-modal" class="order-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 10005; backdrop-filter: blur(5px);">
    <div class="order-content" style="background:var(--card-bg); padding:30px; border-radius:12px; text-align:center;">
        <h2 style="font-size:18px; font-weight:900; color:var(--rank1);">게임 순서 결정</h2>
        <div id="order-result" style="margin:20px 0; font-weight:900;"></div>
        <button class="save-btn" onclick="document.getElementById('order-modal').style.display='none'">확인</button>
    </div>
</div>

<div class="calendar-card">
    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="monthDisplay" style="font-size:20px; font-weight:900;"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card" id="inputCard">
    <h2 id="selectedDateTitle" style="font-size:17px; font-weight:800;">📅 날짜 확인 중</h2>
    <div class="setup-row">
        <span>게임 인원</span>
        <select id="playerCount" onchange="updateInputFields(); focusOnDrawCard();">
            <option value="2">2명</option><option value="3" selected>3명</option><option value="4">4명</option><option value="5">5명</option>
        </select>
    </div>

    <div class="player-select-wrap" style="margin:15px 0; background:rgba(255,255,255,0.3); padding:15px; border-radius:12px;">
        <div style="font-size:13px; font-weight:800; margin-bottom:10px;">🕹️ 선수 선택</div>
        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">
            <div class="player-chip" onclick="togglePlayerSelection(this, '경배')" style="padding:10px; background:#fff; border-radius:8px; text-align:center; font-weight:800; cursor:pointer;">경배</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '원석')" style="padding:10px; background:#fff; border-radius:8px; text-align:center; font-weight:800; cursor:pointer;">원석</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '정석')" style="padding:10px; background:#fff; border-radius:8px; text-align:center; font-weight:800; cursor:pointer;">정석</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '진웅')" style="padding:10px; background:#fff; border-radius:8px; text-align:center; font-weight:800; cursor:pointer;">진웅</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '창한')" style="padding:10px; background:#fff; border-radius:8px; text-align:center; font-weight:800; cursor:pointer;">창한</div>
            <div class="player-chip" onclick="togglePlayerSelection(this, '경석')" style="padding:10px; background:#fff; border-radius:8px; text-align:center; font-weight:800; cursor:pointer;">경석</div>
        </div>

    <div id="drawCardArea" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="share-btn-common" style="background:#1abc9c; flex: 2; padding:12px; border-radius:8px; color:#fff; border:none; font-weight:800;" onclick="pickRandomOrder()">🎲 초구 추첨하기</button>
        <button class="share-btn-common" style="background:#bdc3c7; flex: 1; padding:12px; border-radius:8px; border:none; font-weight:800;" onclick="resetPlayerSelection()">🔄 취소</button>
    </div>

    <div id="inputArea"></div>
    <button id="mainBtn" class="save-btn" onclick="saveGame()">순위 저장</button>
    
    <div id="capture-area">
        <div id="mvpArea" class="mvp-container"></div>
        <div id="dayGameList"></div>
    </div>
</div>

<div class="card stats-card">
    <h2 style="font-size:15px; margin-bottom:15px; font-weight:800;">📊 멤버별 누적 전적 <span style="font-size:12px; color:var(--rank1);">(평균 승점 기준)</span></h2>
    <table class="stats-table">
        <thead><tr><th>이름</th><th>참여</th><th>1위🥇</th><th>2위</th><th>3위</th><th>4위</th><th>꼴찌💀</th><th>승률</th></tr></thead>
        <tbody id="statsBody"></tbody>
    </table>
    <div id="memberHistory-capture-area">
        <div id="memberHistoryArea" class="history-area" style="margin-top:15px; display:none; padding:15px; background:rgba(255,255,255,0.3); border-radius:12px;"></div>
    </div>
</div>

<div class="card" id="strategyCard">
    <h2 style="font-size:16px; font-weight:800;">🎯 순번별 상성 분석 <span class="strategy-subtitle" style="font-size:12px; color:var(--rank1);">(누구 뒤에서 칠 때 잘 칠까?)</span></h2>
    <div class="input-row" style="margin-top:15px;">
        <label>분석 선수</label>
        <select id="strategyPlayer" style="color: #4a148c; font-weight: 800;" onchange="analyzeStrategy()">
            <option value="">선택</option><option value="경배">경배</option><option value="원석">원석</option><option value="정석">정석</option><option value="진웅">진웅</option><option value="창한">창한</option><option value="경석">경석</option>
        </select>
    </div>
    <div id="strategy-capture-area" style="padding: 5px; border-radius: 12px;">
        <button id="strategy-share-btn" class="share-btn-common" style="width:100%; margin-top:15px; display:none; background:#6a11cb; color:#fff; padding:10px; border-radius:8px; border:none; font-weight:800;" onclick="shareStrategyResult()">📸 상성 분석 결과 공유</button>
        <div id="strategyResultArea" style="margin-top:15px; display:none;"></div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwUNoKWNmos1-kmkBoL1WDhSuJv80JDe0hINOpDM9KkEgLug6WK8vUpsk_pottrTj7dOA/exec"; 
    const players = ["경배", "원석", "정석", "진웅", "창한", "경석"];
    let gameLogs = [];
    let currentViewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString('sv-SE');
    let editMode = false; let editRound = null;
    let selectedPlayersForLottery = [];
    let currentStartOrder = []; 

    async function fetchData() {
        showLoading(true, "Cloud 동기화 중");
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            gameLogs = await res.json();
            renderAll();
        } catch (e) { console.error("Fetch error"); } finally { showLoading(false); }
    }

    function renderAll() { renderCalendar(); renderStats(); renderGameList(); analyzeStrategy(); }

    function getEarnedScore(idx, pCount) {
        if (idx === pCount - 1 && pCount > 1) return 0;
        if (pCount === 2) return idx === 0 ? 2 : 0;
        if (pCount === 3) return idx === 0 ? 3 : (idx === 1 ? 1 : 0);
        if (pCount === 4) return idx === 0 ? 4 : (idx === 1 ? 3 : (idx === 2 ? 2 : 0));
        if (pCount === 5) return idx === 0 ? 5 : (idx === 1 ? 4 : (idx === 2 ? 3 : (idx === 3 ? 1 : 0)));
        return 0;
    }

    function renderTodayMVP() {
        const today = gameLogs.filter(g => formatDate(g.date) === selectedDateStr);
        const area = document.getElementById('mvpArea');
        if (today.length < 1) { area.style.display = 'none'; return; }
        let dayStats = {};
        today.forEach(g => {
            const act = g.ranks.filter(n => n && n.trim() !== "");
            act.forEach((name, idx) => {
                if (!dayStats[name]) dayStats[name] = { wins: 0, played: 0, lasts: 0 };
                dayStats[name].played++;
                if (idx === 0) dayStats[name].wins++;
                if (idx === act.length - 1 && act.length > 1) dayStats[name].lasts++;
            });
        });
        const active = Object.keys(dayStats);
        if(active.length === 0) return;
        const winner = active.reduce((a, b) => (dayStats[a].wins > dayStats[b].wins ? a : b));
        const worker = active.reduce((a, b) => (dayStats[a].played > dayStats[b].played ? a : b));
        const survivor = active.reduce((a, b) => (dayStats[a].lasts/dayStats[a].played < dayStats[b].lasts/dayStats[b].played ? a : b));

        area.innerHTML = `<div style="text-align:center; font-weight:900; color:var(--rank1); margin-bottom:5px;">🏆 오늘의 MVP 분석</div>` +
            `<div class="mvp-badge"><span class="mvp-title">🔥 승부사</span><span class="mvp-player">${winner}</span><span class="mvp-value">${dayStats[winner].wins}승</span></div>` +
            `<div class="mvp-badge"><span class="mvp-title">🏃 열정왕</span><span class="mvp-player">${worker}</span><span class="mvp-value">${dayStats[worker].played}전</span></div>` +
            `<div class="mvp-badge"><span class="mvp-title">🛡️ 생존자</span><span class="mvp-player">${survivor}</span><span class="mvp-value">꼴찌 ${dayStats[survivor].lasts}회</span></div>`;
        area.style.display = 'flex';
    }

    function renderMemberHistory(name, rank = "") {
        const area = document.getElementById('memberHistoryArea');
        const personal = gameLogs.filter(g => g.ranks.includes(name)).sort((a,b) => new Date(b.date) - new Date(a.date));
        if (personal.length === 0) return;

        let totalScore = 0;
        personal.forEach(g => {
            const act = g.ranks.filter(n => n.trim() !== "");
            totalScore += getEarnedScore(act.indexOf(name), act.length);
        });
        const avg = (totalScore / personal.length).toFixed(2);
        
        let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><span style="font-weight:900;">${name} 상세 프로필</span><span style="cursor:pointer;" onclick="closeHistory()">닫기 ✕</span></div>`;
        html += `<div class="condition-box" style="background:#fff; padding:10px; border-radius:8px; margin-bottom:10px;"><div style="font-size:12px; color:#666;">현재 랭킹 티어</div><div style="font-weight:900;">(총 승점: ${totalScore}, 평균승점: ${avg})</div></div>`;
        
        personal.slice(0, 10).forEach(g => {
            const act = g.ranks.filter(n => n.trim() !== "");
            html += `<div class="history-item"><span>${formatDate(g.date)}</span><span>${act.indexOf(name)+1}위</span></div>`;
        });
        
        area.innerHTML = html; area.style.display = 'block';
        area.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function closeHistory() {
        document.getElementById('memberHistoryArea').style.display = 'none';
        document.querySelector('.stats-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function analyzeStrategy() {
        const me = document.getElementById('strategyPlayer').value;
        const resArea = document.getElementById('strategyResultArea');
        const shareBtn = document.getElementById('strategy-share-btn');
        if(!me) { resArea.style.display = 'none'; shareBtn.style.display = 'none'; return; }

        let stats = {};
        gameLogs.forEach(g => {
            if(!g.startOrder || !g.startOrder.includes(me)) return;
            const order = g.startOrder; const myIdx = order.indexOf(me);
            const preP = order[(myIdx - 1 + order.length) % order.length];
            const act = g.ranks.filter(n => n.trim() !== ""); const myR = act.indexOf(me);
            if(myR === -1) return;
            if(!stats[preP]) stats[preP] = {c:0, w:0, l:0, s:0};
            stats[preP].c++; if(myR === 0) stats[preP].w++; if(myR === act.length-1) stats[preP].l++; stats[preP].s += (myR + 1);
        });

        const sorted = Object.keys(stats).sort((a,b) => (stats[a].s/stats[a].c) - (stats[b].s/stats[b].c));
        if(sorted.length === 0) {
            resArea.innerHTML = "데이터가 없습니다."; shareBtn.style.display = 'none';
        } else {
            let html = "<table class='stats-table'><thead><tr><th>앞 주자</th><th>경기</th><th>평균</th><th>1위</th><th>꼴찌</th></tr></thead><tbody>";
            sorted.forEach(p => { const s = stats[p]; html += `<tr><td>${p}</td><td>${s.c}</td><td>${(s.s/s.c).toFixed(1)}위</td><td>${((s.w/s.c)*100).toFixed(0)}%</td><td>${((s.l/s.c)*100).toFixed(0)}%</td></tr>`; });
            resArea.innerHTML = html + "</tbody></table>"; shareBtn.style.display = 'block';
        }
        resArea.style.display = 'block';
    }

    function shareStrategyResult() {
        const p = document.getElementById('strategyPlayer').value;
        captureAndShare('strategy-capture-area', 'strategy-share-btn', `${p}_strategy.png`, `${p} 분석`, `${p} 결과!`);
    }

    function showLoading(v, t) {
        document.getElementById('loadingText').innerText = t;
        document.getElementById('loading').style.display = v ? 'flex' : 'none';
    }

    function formatDate(d) { const date = new Date(d); return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0'); }

    window.onload = () => {
        setTimeout(() => { 
            const ws = document.getElementById('welcome-screen');
            if(ws) { ws.style.opacity = '0'; setTimeout(() => ws.style.display = 'none', 800); }
        }, 3000);
        fetchData();
    };
    
    /* v3.60 원본 로직들 복구 및 유지 */
    function renderCalendar() { /* v3.60 원본 그대로 유지 */ }
    function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }
    function togglePlayerSelection(el, name) { if(selectedPlayersForLottery.includes(name)) { selectedPlayersForLottery = selectedPlayersForLottery.filter(p=>p!==name); el.style.background="#fff"; } else { selectedPlayersForLottery.push(name); el.style.background="#1abc9c"; } }
    function resetPlayerSelection() { selectedPlayersForLottery = []; document.querySelectorAll('.player-chip').forEach(c=>{c.style.background="#fff";}); }
</script>
