<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    
    <link rel="apple-touch-icon" href="image_0.png">
    
    <title>우리들의 Billiard World</title>
    
    <style>
        :root { 
            --main: #7f8c8d; 
            --bg: rgba(236, 238, 241, 0.4); 
            --accent: #ff4757; 
            --success: #27ae60; 
            --edit: #f39c12; 
            --today-bg: #e3f2fd; 
            --today-border: #2196f3; 
            --select-bg: #fff0f3; 
            --select-border: #ff4d6d; 
            --record-bg: #e8f5e9; 
            --record-border: #4caf50; 
            --record-dot: #e67e22; 
            --shadow: 8px 8px 16px rgba(180, 180, 180, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --inner-shadow: inset 3px 3px 7px rgba(180, 180, 180, 0.4), inset -3px -3px 7px rgba(255, 255, 255, 0.8);
            
            --rank1: #2196f3; 
            --rank2: #27ae60; 
            --rank3: #8e44ad; 
            --rank4: #f39c12; 
            --rankL: #ff4757; 
            
            --dup-bg: #fffde7;    
            --dup-border: #ff80ab; 
            --dup-text: #7b1fa2;
            
            --card-bg: rgba(243, 230, 255, 0.7); 

            --edit-mode-bg: #e8f5e9;
            --edit-mode-border: #2d5a27; 
            
            --text-color: #444;
            --sub-text: #666;
            --label-text: #777;

            /* [추가] 수정 시 기존 기록 테두리 컬러 */
            --edit-item-border: #6c5ce7; 
        }

        [data-theme='dark'] {
            --main: #bdc3c7;
            --bg: rgba(30, 30, 30, 0.9);
            --today-bg: #1a237e;
            --today-border: #448aff;
            --select-bg: #4a148c;
            --select-border: #e91e63;
            --record-bg: #1b5e20;
            --record-border: #81c784;
            --shadow: 8px 8px 16px rgba(0, 0, 0, 0.6), -4px -4px 10px rgba(60, 60, 60, 0.2);
            --inner-shadow: inset 3px 3px 7px rgba(0, 0, 0, 0.7), inset -2px -2px 5px rgba(60, 60, 60, 0.2);
            --card-bg: rgba(35, 35, 45, 0.9);
            --dup-bg: #3e2723;
            --dup-border: #ff5252;
            --dup-text: #ffccbc;
            --text-color: #eeeeee;
            --sub-text: #cccccc;
            --label-text: #bbbbbb;
            --rank1: #4da3ff;
            --edit-mode-bg: rgba(46, 204, 113, 0.15);
            --edit-mode-border: #2ecc71;
            --edit-mode-text: #2ecc71;
            --edit-item-border: #a29bfe;
        }

        [data-theme='dark'] .nav-btn { color: #ffffff !important; background: rgba(255, 255, 255, 0.1) !important; }
        [data-theme='dark'] #monthDisplay, [data-theme='dark'] #selectedDateTitle, [data-theme='dark'] .stats-card h2 { color: #ffffff !important; }
        [data-theme='dark'] .day { color: #ffffff !important; background: linear-gradient(145deg, #2c2c2c, #252525); }
        [data-theme='dark'] .day.sat { color: #5dade2 !important; }
        [data-theme='dark'] .day.sun, [data-theme='dark'] .day.holiday { color: #e67e22 !important; }
        [data-theme='dark'] .weekday { color: #95a5a6 !important; }
        [data-theme='dark'] select { background: rgba(60, 60, 60, 0.5); color: #fff; }
        [data-theme='dark'] .game-item { background: linear-gradient(145deg, #2c2c2c, #333333); }
        [data-theme='dark'] .game-info { color: #eee; }

        [data-theme='dark'] .edit-active { border: 3px solid var(--edit-mode-border) !important; }
        [data-theme='dark'] .edit-active #selectedDateTitle { color: var(--edit-mode-text) !important; }
        [data-theme='dark'] .edit-active label { color: var(--edit-mode-text) !important; }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: env(safe-area-inset-top) 15px 100px 15px;
            background-image: url('image_1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-color);
        }
        
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #4a90e2, #9370db);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease-out; color: white; text-align: center;
            pointer-events: none;
        }

        .calendar-card {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border-radius: 32px;
            padding: 24px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn {
            border: none;
            background: rgba(236, 238, 241, 0.4);
            width: 44px; height: 44px; border-radius: 14px;
            box-shadow: 4px 4px 8px rgba(180, 180, 180, 0.3), -4px -4px 8px rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer; color: #777; transition: 0.2s;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .weekday { font-size: 11px; font-weight: 900; padding-bottom: 10px; color: #95a5a6; }

        .day { 
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 16px; cursor: pointer; font-size: 15px; font-weight: 700; position: relative; 
            background: linear-gradient(145deg, rgba(253, 253, 253, 0.8), rgba(226, 229, 234, 0.8)); 
            box-shadow: 6px 6px 14px rgba(0, 0, 0, 0.22), -2px -2px 6px rgba(255, 255, 255, 0.8); 
            transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: #555; border: 1px solid rgba(255,255,255,0.4);
        }
        .day.today { background: var(--today-bg) !important; color: var(--today-border) !important; border: 2px solid var(--today-border) !important; }
        .day.selected { background: var(--select-bg) !important; color: var(--select-border) !important; transform: scale(1.15); z-index: 5; border: 2px solid var(--select-border) !important; }
        .day.has-record { background: var(--record-bg); border: 2px solid var(--record-border); color: #2e7d32; }
        .day.has-record::after { content: ''; position: absolute; bottom: 4px; width: 5px; height: 5px; background: var(--record-dot); border-radius: 50%; }
        
        .card { background: var(--card-bg); backdrop-filter: blur(5px); border-radius: 28px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.4); transition: border 0.3s ease; }
        
        select { 
            flex: 1; padding: 12px; border-radius: 15px; border: 2px solid transparent; font-size: 14px; 
            background: rgba(236, 238, 241, 0.4); box-shadow: var(--inner-shadow); color: var(--text-color); font-weight: 600; 
            -webkit-appearance: none; text-align: center; text-align-last: center; 
        }

        .edit-active {
            border: 3px solid var(--edit-mode-border) !important;
            background-color: var(--edit-mode-bg) !important;
        }

        /* [수정] 전적 수정 시 기존 리스트 아이템 테두리 강조 */
        .edit-active-item {
            border: 3px solid var(--edit-item-border) !important;
            box-shadow: 0 0 15px var(--edit-item-border) !important;
        }

        button.save-btn { 
            width: 100%; padding: 18px; 
            background: linear-gradient(145deg, #abb2b9, #7f8c8d); 
            color: white; border: none;
            border-radius: 18px; font-weight: 800; margin-top: 15px; cursor: pointer; 
            font-size: 16px; 
            box-shadow: 8px 10px 20px rgba(0, 0, 0, 0.38), -2px -2px 8px rgba(255, 255, 255, 0.5);
            transition: 0.2s all ease;
        }
        button.edit-btn { background: linear-gradient(145deg, #2ecc71, #27ae60) !important; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group button { flex: 1; margin-top: 0 !important; }

        .stats-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 12px; table-layout: fixed; }
        .stats-table td { padding: 14px 2px; text-align: center; font-weight: 800; color: var(--text-color); white-space: nowrap; } 

        .history-area { margin-top: 15px; padding: 15px; background: rgba(255, 255, 255, 0.3); border-radius: 20px; display: none; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: rgba(255, 252, 212, 0.85); border-radius: 12px; margin-bottom: 8px; font-weight: 800; color: #555; border: 2.5px solid #ff69b4; }

        .danger-zone { 
            margin-top: 50px; padding: 25px; border-radius: 28px; 
            background: var(--card-bg); backdrop-filter: blur(5px); box-shadow: var(--shadow); 
            text-align: center; 
            display: flex; flex-direction: column; align-items: center; gap: 1mm;
        }
        
        #resetArea { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 1mm; }

        .slim-btn {
            width: 100%; max-width: 280px; border: none; padding: 10px; border-radius: 14px; 
            font-weight: 800; font-size: 14px; box-shadow: 4px 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s; cursor: pointer;
        }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('image_1.png'); background-size: cover; display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        
        .game-item { position: relative; padding: 18px 8px; border-radius: 22px; background: linear-gradient(145deg, #f0f0f0, #ffffff); margin-top: 15px; display: flex; justify-content: center; align-items: center; box-shadow: 6px 6px 12px rgba(0,0,0,0.1), -4px -4px 10px rgba(255,255,255,0.8); cursor: pointer; transition: 0.3s border ease; }
        .game-info { font-size: 15px; font-weight: 900; color: var(--text-color); width: 100%; display: flex; justify-content: center; align-items: center; }

        /* [수정] 액션 오버레이 - 독립된 버튼 스타일 */
        .action-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.05); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; gap: 8px; z-index: 10; border-radius: 22px; }
        .action-overlay.active { display: flex; }
        
        .overlay-btn { 
            padding: 8px 18px; border-radius: 12px; font-weight: 900; font-size: 13px; 
            border: none; cursor: pointer; 
            box-shadow: 2px 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .overlay-btn:active { transform: scale(0.95); }
        .btn-edit { background: #3498db; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-close { background: #95a5a6; color: white; }

        #exit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: center; z-index: 10001; backdrop-filter: blur(5px); }
        .modal-content { background: rgba(255, 255, 255, 0.8); padding: 35px; border-radius: 30px; text-align: center; width: 80%; max-width: 320px; }

        .theme-toggle { position: relative; width: 50px; height: 26px; }
        .theme-toggle input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196f3; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body id="app-body">

<div id="welcome-screen">
    <div class="welcome-content">
        <img src="image_0.png" alt="앱 아이콘" class="welcome-logo" style="width:60px; margin-bottom:15px;">
        <div style="font-size:14px; font-weight:300;">경배와 친구들의<br>당구 세상에 오신걸 환영합니다.<br><br>Created by Ju Kyung Bae</div>
    </div>
</div>

<div id="toast" class="toast-msg" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: white; padding: 12px 25px; border-radius: 20px; display: none; z-index: 10002;">기록 없음</div>

<div id="exit-modal">
    <div class="modal-content">
        <div style="font-size:50px; margin-bottom:15px;">👋</div>
        <div id="exit-msg" style="font-size:16px; font-weight:800; color:#444; line-height:1.6; margin-bottom:25px;">오늘도 다들 즐거웠니?<br>다음에 또 보자!</div>
        <button class="save-btn" id="modalOkBtn" style="margin-bottom:12px;" onclick="closeAppWindow()">OK</button>
        <button class="save-btn" style="background:#abb2b9; margin:0; width: 100%;" onclick="closeExitModal()">취소</button>
    </div>
</div>

<div id="loading"><div class="spinner" style="border: 5px solid rgba(209, 217, 230, 0.6); border-top: 5px solid var(--main); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin-bottom: 15px;"></div><div id="loadingText" style="font-weight:800; color:var(--main);">데이터 동기화 중</div></div>

<div class="calendar-card">
    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="monthDisplay" style="font-size:20px; font-weight:900; color:#444;"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card" id="inputCard">
    <h2 id="selectedDateTitle" style="font-size:17px; margin:0 0 20px 0; color:#444; font-weight:800;">📅 날짜 확인 중</h2>
    <div id="editBadge" style="display:none; color:white; font-size:13px; font-weight:bold; margin-bottom:15px; background: var(--edit); padding: 12px; border-radius: 12px; text-align: center;">✏️ 기록 수정 중</div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
        <span style="font-size:14px; font-weight:800; color:var(--sub-text);">다크 모드</span>
        <label class="theme-toggle">
            <input type="checkbox" id="themeSwitch" onchange="toggleTheme()">
            <span class="slider"></span>
        </label>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
        <span style="font-size:14px; font-weight:800; color:var(--sub-text);">화면 크기</span>
        <div style="display: flex; gap: 12px;">
            <label style="font-weight:900; font-size:14px; color:#9b59b6;">기본 <input type="radio" name="z" value="1" onclick="changeZoom('1')" checked></label>
            <label style="font-weight:900; font-size:14px; color:#ff69b4;">확대 <input type="radio" name="z" value="1.2" onclick="changeZoom('1.2')"></label>
        </div>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
        <span style="font-size:14px; font-weight:800; color:#555;">게임 인원</span>
        <select id="playerCount" onchange="updateInputFields()" style="width:85px;">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>

    <div id="inputArea"></div>
    <div class="btn-group">
        <button id="mainBtn" class="save-btn" onclick="saveGame()">순위 저장</button>
        <button class="save-btn" onclick="resetInputs()" style="background:#bdc3c7; border-radius:18px;">취소</button>
    </div>
    <div id="dayGameList"></div>
</div>

<div class="card stats-card">
    <h2 style="font-size:16px; margin:5px 0 14px 10px; color:#444; font-weight:800;">📊 멤버별 누적 전적 (이름 터치)</h2>
    <table class="stats-table">
        <thead>
            <tr style="background: rgba(232, 245, 233, 0.8);">
                <th style="padding:10px; font-size:10px;">이름</th>
                <th style="font-size:10px;">참여</th>
                <th style="color:var(--rank1); font-size:10px;" onclick="toggleAllMode()">1위🥇</th>
                <th style="color:var(--rank2); font-size:10px;" onclick="toggleAllMode()">2위</th>
                <th style="color:var(--rank3); font-size:10px;" onclick="toggleAllMode()">3위</th>
                <th style="color:var(--rank4); font-size:10px;" onclick="toggleAllMode()">4위</th>
                <th style="color:var(--rankL); font-size:10px;" onclick="toggleAllMode()">꼴찌💀</th>
                <th style="font-size:10px;">승률</th>
            </tr>
        </thead>
        <tbody id="statsBody"></tbody>
    </table>
    <div id="memberHistoryArea" class="history-area"></div>
    <div id="richFriendArea" style="display:none; background: var(--bg); padding: 20px; border-radius: 22px; text-align: center; margin-top: 20px; color: #7f8c8d; font-weight: 800;"></div>
</div>

<div class="danger-zone">
    <div style="color:#7b1fa2; font-weight:900; margin-bottom:5px; font-size:11px;">초기화 버튼은 함부로 터치하지 마세요.</div>
    <div id="resetArea">
        <button class="slim-btn reset-btn" style="background: linear-gradient(145deg, #e67e22, #d35400); color:white;" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화</button>
        <button class="slim-btn exit-btn" style="background: linear-gradient(145deg, #7f8c8d, #626e6e); color:white;" onclick="showExitModal()">🚪 앱 종료</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzVCB4XXeebyVvbDe91gcarwdwTSmmM92KciZf7F-1GLXikP3Jlz0rivWodR-1xXRMdtg/exec"; 
    const players = ["경배", "원석", "정석", "진웅", "창한", "경석"];
    let gameLogs = [];
    let currentViewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString('sv-SE');
    let editMode = false;
    let editRound = null;
    let isPercentMode = false;

    function toggleTheme() {
        const isDark = document.getElementById('themeSwitch').checked;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        renderStats();
    }

    async function fetchData() {
        showLoading(true, "Cloud 동기화 중");
        try {
            const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
            const rawData = await response.json();
            gameLogs = rawData.map(g => ({ ...g, dateStr: formatDate(g.date) }));
            renderAll(); 
        } catch (e) { console.error("Fetch error"); } 
        finally { showLoading(false); document.getElementById('selectedDateTitle').innerText = `📅 ${selectedDateStr}`; }
    }

    function formatDate(dateInput) {
        const d = new Date(dateInput);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function renderAll() { renderCalendar(); renderStats(); renderGameList(); }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = "";
        const year = currentViewDate.getFullYear(); const month = currentViewDate.getMonth();
        const realTodayStr = formatDate(new Date());
        document.getElementById('monthDisplay').innerText = `${year}년 ${month + 1}월`;
        ["일","월","화","수","목","금","토"].forEach((d, idx) => {
            let color = "#95a5a6"; if(idx === 0) color = "#e67e22"; if(idx === 6) color = "#5dade2";
            grid.innerHTML += `<div class="weekday" style="color:${color}">${d}</div>`;
        });
        const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
        for (let d = 1; d <= lastDate; d++) {
            const dStr = formatDate(new Date(year, month, d));
            const dayOfWeek = new Date(year, month, d).getDay();
            let dayClass = (dayOfWeek === 0) ? "sun" : (dayOfWeek === 6 ? "sat" : "");
            const isToday = dStr === realTodayStr ? 'today' : ''; const isSelected = dStr === selectedDateStr ? 'selected' : '';
            const hasRecord = gameLogs.some(g => g.dateStr === dStr) ? 'has-record' : '';
            grid.innerHTML += `<div class="day ${dayClass} ${isSelected} ${isToday} ${hasRecord}" onclick="selectDate('${dStr}')">${d}</div>`;
        }
    }

    function selectDate(dateStr) { if(editMode) cancelEdit(); selectedDateStr = dateStr; document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr}`; renderCalendar(); renderGameList(); }
    
    function updateInputFields(preFill = null) {
        if(preFill) document.getElementById('playerCount').value = preFill.length;
        const count = parseInt(document.getElementById('playerCount').value); 
        const inputArea = document.getElementById('inputArea');
        inputArea.innerHTML = "";
        for(let i=1; i<=count; i++) {
            const label = i === count ? "꼴찌💀" : (i === 1 ? "1위🥇" : `${i}위`);
            inputArea.innerHTML += `<div style="display:flex; align-items:center; margin-bottom:15px; gap:10px;"><label style="width:85px; font-size:13px; font-weight:800; color:var(--label-text);">${label}</label><select id="rank${i}" onchange="checkDuplicates()"><option value="">선택</option>${players.map(p => `<option value="${p}" ${preFill && preFill[i-1] === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>`;
        }
    }

    function checkDuplicates() {
        const selects = Array.from(document.querySelectorAll('#inputArea select'));
        const values = selects.map(s => s.value);
        selects.forEach(s => s.style.border = "2px solid transparent");
        values.forEach((v, i) => { if(v && values.filter(x => x === v).length > 1) selects[i].style.border = "2px solid var(--dup-border)"; });
    }

    function resetInputs() { if(editMode) cancelEdit(); else { document.getElementById('playerCount').value = "3"; updateInputFields(); } }

    async function saveGame() {
        const count = parseInt(document.getElementById('playerCount').value); const ranks = [];
        for(let i=1; i<=count; i++) { const val = document.getElementById('rank'+i).value; if(!val) return alert("친구를 선택해줘!"); ranks.push(val); }
        if(new Set(ranks).size !== ranks.length) return alert("중복된 이름이 있습니다.");
        showLoading(true, "저장 중");
        const payload = { action: editMode ? "UPDATE" : "SAVE", date: selectedDateStr, ranks: [ranks[0]||"", ranks[1]||"", ranks[2]||"", ranks[3]||"", ranks[4]||""], round: editRound };
        try { await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); cancelEdit(); fetchData(); } catch (e) { showLoading(false); }
    }

    function enterEditMode(round, rankStr, el) { 
        editMode = true; editRound = round; 
        updateInputFields(rankStr.split(',')); 
        const inputCard = document.getElementById('inputCard');
        document.getElementById('editBadge').style.display = 'block'; 
        inputCard.classList.add('edit-active');
        const btn = document.getElementById('mainBtn'); 
        btn.innerText = "수정 완료"; btn.classList.add('edit-btn');
        inputCard.scrollIntoView({ behavior: 'smooth' }); 
        
        // [수정] 해당 게임 카드에만 퍼플 테두리 적용
        document.querySelectorAll('.game-item').forEach(item => item.classList.remove('edit-active-item'));
        el.closest('.game-item').classList.add('edit-active-item');
        closeAllOverlays();
    }

    function cancelEdit() { 
        editMode = false; editRound = null; document.getElementById('editBadge').style.display = 'none'; 
        document.getElementById('inputCard').classList.remove('edit-active');
        document.querySelectorAll('.game-item').forEach(item => item.classList.remove('edit-active-item'));
        const btn = document.getElementById('mainBtn'); btn.innerText = "순위 저장"; btn.classList.remove('edit-btn'); 
        document.getElementById('playerCount').value = "3"; updateInputFields(); 
    }

    async function deleteGame(round) { if(!confirm("정말 삭제할거야?")) return; showLoading(true, "삭제 중"); try { await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "DELETE", round: round }) }); fetchData(); } catch (e) { showLoading(false); } }

    function renderGameList() {
        const games = gameLogs.filter(g => g.dateStr === selectedDateStr); const listArea = document.getElementById('dayGameList');
        if(games.length > 0) {
            let html = `<div style="text-align:center; margin:25px 0 10px 0;"><span style="font-size:12px; color:#999; font-weight:800;">RECORD</span></div>`;
            games.forEach((g, idx) => { 
                const names = g.ranks.filter(n => n && n.trim() !== ""); 
                const styledNames = names.map((name, i) => `<span style="color:${i === 0 ? 'var(--rank1)' : (i === names.length - 1 ? 'var(--rankL)' : 'var(--text-color)')};">${name}</span>`);
                html += `
                <div class="game-item" onclick="toggleActionOverlay(this)">
                    <div class="game-info"><span>${idx+1}G</span> ${styledNames.join(' → ')}</div>
                    <div class="action-overlay">
                        <button class="overlay-btn btn-edit" onclick="event.stopPropagation(); enterEditMode(${g.round}, '${names.join(',')}', this)">수정</button>
                        <button class="overlay-btn btn-delete" onclick="event.stopPropagation(); deleteGame(${g.round})">삭제</button>
                        <button class="overlay-btn btn-close" onclick="event.stopPropagation(); closeAllOverlays()">취소</button>
                    </div>
                </div>`; 
            });
            listArea.innerHTML = html;
        } else listArea.innerHTML = "";
    }

    function toggleActionOverlay(el) {
        const overlay = el.querySelector('.action-overlay');
        const isActive = overlay.classList.contains('active');
        document.querySelectorAll('.action-overlay').forEach(o => o.classList.remove('active'));
        if(!isActive) overlay.classList.add('active');
    }

    function closeAllOverlays() { document.querySelectorAll('.action-overlay').forEach(o => o.classList.remove('active')); }

    function renderStats() {
        let stats = {}; players.forEach(p => stats[p] = { played: 0, ranks: [0,0,0,0,0] });
        gameLogs.forEach(g => {
            const actual = g.ranks.filter(n => n.trim() !== "");
            actual.forEach((name, idx) => { if(stats[name]) { stats[name].played++; if (idx === actual.length - 1 && actual.length > 1) stats[name].ranks[4]++; else if (idx < 4) stats[name].ranks[idx]++; } });
        });
        const maxCounts = { r0: 0, r4: 0 };
        players.forEach(p => { maxCounts.r0 = Math.max(maxCounts.r0, stats[p].ranks[0]); maxCounts.r4 = Math.max(maxCounts.r4, stats[p].ranks[4]); });
        
        const sortedByWin = [...players].sort((a,b) => stats[b].ranks[0] - stats[a].ranks[0]);
        document.getElementById('statsBody').innerHTML = sortedByWin.map(p => {
            const winRate = stats[p].played > 0 ? ((stats[p].ranks[0] / stats[p].played) * 100).toFixed(1) : "0.0";
            const getVal = (val, total) => isPercentMode ? (total === 0 ? '0%' : ((val/total)*100).toFixed(0) + '%') : val;
            return `<tr><td style="font-weight:900; cursor:pointer; text-decoration:underline; color:#8e44ad;" onclick="renderMemberHistory('${p}')">${p}</td><td>${stats[p].played}</td><td style="color:var(--rank1);">${getVal(stats[p].ranks[0], stats[p].played)}</td><td style="color:var(--rank2);">${getVal(stats[p].ranks[1], stats[p].played)}</td><td style="color:var(--rank3);">${getVal(stats[p].ranks[2], stats[p].played)}</td><td style="color:var(--rank4);">${getVal(stats[p].ranks[3], stats[p].played)}</td><td style="color:var(--rankL);">${getVal(stats[p].ranks[4], stats[p].played)}</td><td><span style="color:#27ae60; font-size:11px; font-weight:800;">${winRate}%</span></td></tr>`;
        }).join('');
    }

    function renderMemberHistory(name) {
        const historyArea = document.getElementById('memberHistoryArea');
        const personalGames = gameLogs.filter(g => g.ranks.includes(name)).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
        if (personalGames.length === 0) return;
        let html = `<div style="font-size:14px; font-weight:900; color:var(--text-color); margin-bottom:12px; display:flex; justify-content:space-between;"><span>🏆 ${name}의 최근 5경기</span><span onclick="this.parentElement.parentElement.style.display='none'">닫기 ✕</span></div>`;
        personalGames.forEach(g => {
            const actual = g.ranks.filter(n => n.trim() !== "");
            const rankIndex = actual.indexOf(name);
            const rankLabel = (rankIndex === actual.length - 1) ? "꼴찌💀" : (rankIndex + 1) + "위";
            html += `<div class="history-item"><span>${g.dateStr}</span><span>${rankLabel}</span></div>`;
        });
        historyArea.innerHTML = html; historyArea.style.display = 'block'; historyArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function confirmReset(step) {
        const el = document.getElementById('resetArea');
        let confirmBtnHtml = '';
        if(step === 1) confirmBtnHtml = `<button class="slim-btn" style="background:var(--edit); color:white;" onclick="confirmReset(2)">OK (계속 진행)</button>`;
        else if(step === 2) confirmBtnHtml = `<button class="slim-btn" style="background:var(--accent); color:white;" onclick="confirmReset(3)">OK (진짜 삭제할까요?)</button>`;
        else if(step === 3) confirmBtnHtml = `<button class="slim-btn" style="background:#000; color:white;" onclick="executeReset()">OK (확정)</button>`;
        el.innerHTML = `${confirmBtnHtml}<button class="slim-btn" style="background:#bdc3c7; color:white;" onclick="cancelReset()">취소</button><button class="slim-btn" style="background:linear-gradient(145deg, #7f8c8d, #626e6e); color:white;" onclick="showExitModal()">🚪 앱 종료</button>`;
    }

    function cancelReset() { 
        document.getElementById('resetArea').innerHTML = `<button class="slim-btn reset-btn" style="background: linear-gradient(145deg, #e67e22, #d35400); color:white;" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화</button><button class="slim-btn exit-btn" style="background: linear-gradient(145deg, #7f8c8d, #626e6e); color:white;" onclick="showExitModal()">🚪 앱 종료</button>`; 
    }

    async function executeReset() { showLoading(true, "초기화 중"); try { await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "RESET" }) }); location.reload(); } catch(e) { showLoading(false); } }
    function changeZoom(v) { document.body.style.zoom = v; }
    function toggleAllMode() { isPercentMode = !isPercentMode; renderStats(); }
    function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }
    function showExitModal() { document.getElementById('exit-modal').style.display = 'flex'; }
    function closeExitModal() { document.getElementById('exit-modal').style.display = 'none'; }
    function closeAppWindow() { window.close(); }
    function showLoading(v, t) { document.getElementById('loadingText').innerText = t; document.getElementById('loading').style.display = v ? 'flex' : 'none'; }

    window.onload = () => { 
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('themeSwitch').checked = true; }
        setTimeout(() => { const ws = document.getElementById('welcome-screen'); if(ws) { ws.style.opacity = '0'; setTimeout(() => { ws.style.display = 'none'; }, 800); } }, 3000);
        updateInputFields(); fetchData(); 
    };
    document.addEventListener('click', (e) => { if(!e.target.closest('.game-item')) closeAllOverlays(); });
</script>
<script src="share.js"></script>
