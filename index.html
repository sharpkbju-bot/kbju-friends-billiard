<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경배와 친구들 당구 전적</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3256/3256247.png">
  
  <style>
    :root {
      --primary-color: #007bff;
      --bg-color: #f4f7f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: var(--primary-color);
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    /* 입력 영역 */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 25px;
    }

    input.form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    .rank-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* 버튼 스타일 */
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 5px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-save { background: var(--primary-color); color: white; }
    .btn-update { background: #ffc107; color: #333; }
    .btn-cancel { background: #6c757d; color: white; }

    /* 리스트 영역 - 핵심 수정 부분 */
    #record-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .record-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 12px;
      position: relative;
    }

    .record-date {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    /* 5명이 모두 보이도록 글자 크기 축소 및 줄바꿈 허용 */
    .player-row {
      display: flex;
      flex-wrap: wrap; /* 공간 부족 시 다음 줄로 */
      gap: 6px;
      font-size: 13px; /* 글자 크기 작게 조절 */
      font-weight: 500;
      color: #333;
      line-height: 1.4;
    }

    .player-tag {
      background: #f0f4f8;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .rank-num {
      color: var(--primary-color);
      font-weight: bold;
      margin-right: 2px;
      font-size: 11px;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 10px;
      border-top: 1px dotted #eee;
      padding-top: 8px;
    }

    .action-link {
      font-size: 13px;
      color: #666;
      text-decoration: none;
      cursor: pointer;
    }

    .action-delete { color: #dc3545; }
  </style>
</head>
<body>

<div class="container">
  <h1>경배와 친구들 🎱</h1>

  <div class="input-section">
    <input type="date" id="game-date" class="form-control">
    <div class="rank-grid">
      <input type="text" id="r1" class="form-control" placeholder="1등">
      <input type="text" id="r2" class="form-control" placeholder="2등">
      <input type="text" id="r3" class="form-control" placeholder="3등">
      <input type="text" id="r4" class="form-control" placeholder="4등">
      <input type="text" id="r5" class="form-control" placeholder="5등">
    </div>
    
    <input type="hidden" id="edit-round-id">
    
    <div class="btn-group">
      <button id="btn-main" class="btn btn-save" onclick="handleSave()">기록 저장</button>
      <button id="btn-cancel" class="btn btn-cancel" onclick="resetForm()" style="display:none;">취소</button>
    </div>
  </div>

  <div id="record-list">
    </div>
</div>

<script>
  // 🚨 본인의 Google Apps Script 배포 URL을 입력하세요
  const API_URL = "https://script.google.com/macros/s/AKfycbz3DvmZ32bGaVq4CSffpXCK6oCJ8V3Sg3Ao6A8qi2POZK0UUGEOMjLIanqhflMybo4k/exec";

  // 데이터 불러오기
  async function fetchRecords() {
    const listDiv = document.getElementById('record-list');
    listDiv.innerHTML = "<p style='text-align:center;'>데이터 로딩 중...</p>";
    
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      renderRecords(data.reverse()); // 최신순으로 정렬
    } catch (e) {
      listDiv.innerHTML = "<p>데이터를 불러오지 못했습니다.</p>";
    }
  }

  // 목록 그리기
  function renderRecords(records) {
    const listDiv = document.getElementById('record-list');
    listDiv.innerHTML = "";

    records.forEach(item => {
      const card = document.createElement('div');
      card.className = "record-card";
      
      // 순위 텍스트 생성
      const playersHtml = item.ranks
        .map((name, idx) => name ? `<span class="player-tag"><span class="rank-num">${idx+1}위</span>${name}</span>` : "")
        .join("");

      card.innerHTML = `
        <div class="record-date">${item.date}</div>
        <div class="player-row">${playersHtml}</div>
        <div class="card-actions">
          <span class="action-link" onclick="startEdit(${JSON.stringify(item).replace(/"/g, '&quot;')})">수정</span>
          <span class="action-link action-delete" onclick="handleDelete(${item.round})">삭제</span>
        </div>
      `;
      listDiv.appendChild(card);
    });
  }

  // 저장 및 수정 통합 핸들러
  async function handleSave() {
    const date = document.getElementById('game-date').value;
    const round = document.getElementById('edit-round-id').value;
    const ranks = [
      document.getElementById('r1').value,
      document.getElementById('r2').value,
      document.getElementById('r3').value,
      document.getElementById('r4').value,
      document.getElementById('r5').value
    ];

    if(!date || !ranks[0]) return alert("날짜와 1등은 필수입니다!");

    const action = round ? "UPDATE" : "SAVE";
    const payload = { action, date, ranks, round: parseInt(round) };

    await sendData(payload);
  }

  // 삭제 핸들러
  async function handleDelete(round) {
    if(!confirm("정말 삭제하시겠습니까?")) return;
    await sendData({ action: "DELETE", round });
  }

  // 수정 시작
  function startEdit(item) {
    document.getElementById('game-date').value = item.date;
    document.getElementById('r1').value = item.ranks[0] || "";
    document.getElementById('r2').value = item.ranks[1] || "";
    document.getElementById('r3').value = item.ranks[2] || "";
    document.getElementById('r4').value = item.ranks[3] || "";
    document.getElementById('r5').value = item.ranks[4] || "";
    document.getElementById('edit-round-id').value = item.round;

    document.getElementById('btn-main').textContent = "수정 완료";
    document.getElementById('btn-main').className = "btn btn-update";
    document.getElementById('btn-cancel').style.display = "block";
    window.scrollTo(0,0);
  }

  // 폼 초기화
  function resetForm() {
    document.getElementById('game-date').value = "";
    for(let i=1; i<=5; i++) document.getElementById('r'+i).value = "";
    document.getElementById('edit-round-id').value = "";
    document.getElementById('btn-main').textContent = "기록 저장";
    document.getElementById('btn-main').className = "btn btn-save";
    document.getElementById('btn-cancel').style.display = "none";
  }

  // 서버 통신
  async function sendData(payload) {
    try {
      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      resetForm();
      fetchRecords();
    } catch (e) {
      alert("오류가 발생했습니다.");
    }
  }

  fetchRecords();
</script>

</body>
</html>
