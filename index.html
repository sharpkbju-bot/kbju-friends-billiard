<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    
    <link rel="apple-touch-icon" href="image_0.png">
    
    <title>우리들의 Billiard World</title>
    
    <style>
        :root { 
            --main: #7f8c8d; 
            --bg: rgba(236, 238, 241, 0.4); 
            --accent: #ff4757; 
            --success: #27ae60; 
            --edit: #f39c12; 
            --today-bg: #e3f2fd; 
            --today-border: #2196f3; 
            --select-bg: #fff0f3; 
            --select-border: #ff4d6d; 
            --record-bg: #e8f5e9; 
            --record-border: #4caf50; 
            --record-dot: #e67e22; 
            --shadow: 8px 8px 16px rgba(180, 180, 180, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --inner-shadow: inset 3px 3px 7px rgba(180, 180, 180, 0.4), inset -3px -3px 7px rgba(255, 255, 255, 0.8);
            
            --rank1: #2196f3; 
            --rank2: #27ae60; 
            --rank3: #8e44ad; 
            --rank4: #f39c12; 
            --rankL: #ff4757; 
            
            --dup-bg: #fffde7;    
            --dup-border: #ff80ab; 
            --dup-text: #7b1fa2;
            
            --card-bg: rgba(243, 230, 255, 0.7); 
        }

        /* 전역 터치 하이라이트 제거 */
        * { -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: env(safe-area-inset-top) 15px 100px 15px;
            background-image: url('image_1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            color: #444;
            transition: zoom 0.3s ease;
        }
        
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #4a90e2, #9370db);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease-out; color: white; text-align: center;
            pointer-events: none;
        }
        .welcome-content { animation: fadeInUp 1s ease-out; }
        .welcome-logo { width: 60px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
        .welcome-text { font-size: 14px; font-weight: 300; line-height: 1.6; text-shadow: 0 2px 4px rgba(0,0,0,0.2); font-family: "Apple Chancery", "Snell Roundhand", "Comic Sans MS", cursive; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .calendar-card {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border-radius: 32px;
            padding: 24px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn {
            border: none;
            background: rgba(236, 238, 241, 0.4);
            width: 44px; height: 44px; border-radius: 14px;
            box-shadow: 4px 4px 8px rgba(180, 180, 180, 0.3), -4px -4px 8px rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer; color: #777; transition: 0.2s;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .weekday { font-size: 11px; font-weight: 900; padding-bottom: 10px; color: #95a5a6; }

        .day { 
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 16px; cursor: pointer; font-size: 15px; font-weight: 700; position: relative; 
            background: linear-gradient(145deg, rgba(253, 253, 253, 0.8), rgba(226, 229, 234, 0.8)); 
            box-shadow: 6px 6px 14px rgba(0, 0, 0, 0.22), -2px -2px 6px rgba(255, 255, 255, 0.8); 
            transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: #555; border: 1px solid rgba(255,255,255,0.4);
        }
        .day.sat { color: #5dade2; } 
        .day.sun, .day.holiday { color: #e67e22; } 
        .day.today { background: var(--today-bg) !important; color: var(--today-border) !important; border: 2px solid var(--today-border) !important; }
        .day.selected { background: var(--select-bg) !important; color: var(--select-border) !important; transform: scale(1.15); z-index: 5; border: 2px solid var(--select-border) !important; }
        .day.has-record { background: var(--record-bg); border: 2px solid var(--record-border); color: #2e7d32; }
        .day.has-record::after { content: ''; position: absolute; bottom: 4px; width: 5px; height: 5px; background: var(--record-dot); border-radius: 50%; }
        
        .card { background: var(--card-bg); backdrop-filter: blur(5px); border-radius: 28px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.4); }
        .setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.04); }
        
        select#playerCount { flex: none !important; width: 85px !important; padding: 8px !important; margin-left: auto; }
        .input-row { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }
        .input-row label { width: 55px; font-size: 13px; font-weight: 800; color: #777; flex-shrink: 0; }
        
        select { 
            flex: 1; padding: 12px; border-radius: 15px; border: 2px solid transparent; font-size: 14px; 
            background: rgba(236, 238, 241, 0.4); box-shadow: var(--inner-shadow); color: #444; font-weight: 600; 
            -webkit-appearance: none; text-align: center; text-align-last: center; 
        }

        select.duplicate-error { background: var(--dup-bg) !important; border: 2px solid var(--dup-border) !important; color: var(--dup-text) !important; }

        button.save-btn { 
            width: 100%; padding: 18px; 
            background: linear-gradient(145deg, #abb2b9, #7f8c8d); 
            color: white; border: none;
            border-radius: 18px; font-weight: 800; margin-top: 15px; cursor: pointer; 
            font-size: 16px; 
            box-shadow: 8px 10px 20px rgba(0, 0, 0, 0.38), -2px -2px 8px rgba(255, 255, 255, 0.5);
            transition: 0.2s all ease;
        }
        button.save-btn:active {
            transform: scale(0.97);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2), inset 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        button.edit-btn { 
            background: linear-gradient(145deg, #ffae24, #da8c10) !important; 
            border: none !important; 
        }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group button { flex: 1; margin-top: 0 !important; }
        
        .btn-cancel { 
            background: #bdc3c7 !important; color: white !important; 
            border: none !important; 
        }

        .stats-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 10px; table-layout: fixed; }
        .stats-table th { padding: 12px 1px; color: #888; border-bottom: 1px solid #ddd; font-weight: 800; letter-spacing: -0.5px; }
        .stats-table td { padding: 14px 1px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.02); font-weight: 700; }
        
        .danger-zone { margin-top: 50px; padding: 25px; border-radius: 28px; background: var(--card-bg); backdrop-filter: blur(5px); box-shadow: var(--shadow); text-align: center; }
        .reset-btn { width: 100%; background: linear-gradient(145deg, #e67e22, #d35400); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; margin-bottom: 8px; box-shadow: 8px 10px 20px rgba(0, 0, 0, 0.4), -2px -2px 8px rgba(255, 255, 255, 0.6); }
        .cancel-btn { width: 100%; background: #bdc3c7; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; }
        .exit-btn { width: 100%; background: linear-gradient(145deg, #7f8c8d, #626e6e); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 800; font-size: 16px; box-shadow: 8px 10px 20px rgba(0, 0, 0, 0.4), -2px -2px 8px rgba(255, 255, 255, 0.6); }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('image_1.png'); background-size: cover; display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        #loading::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(236, 238, 241, 0.8); backdrop-filter: blur(3px); z-index: -1; }
        
        .spinner { border: 5px solid rgba(209, 217, 230, 0.6); border-top: 5px solid var(--main); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .game-item { padding: 15px 10px; border-radius: 18px; background: rgba(236, 238, 241, 0.4); margin-top: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--inner-shadow); }
        .game-info { font-size: 11px; font-weight: 800; color: #555; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .game-btns { display: flex; gap: 8px; flex-shrink: 0; font-size: 11px; font-weight: bold; }
        .game-btns span { padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.05); background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(240,240,240,0.8) 100%); }
        #exit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: center; z-index: 10001; backdrop-filter: blur(5px); }
        .modal-content { background: rgba(255, 255, 255, 0.8); padding: 35px; border-radius: 30px; text-align: center; width: 80%; max-width: 320px; box-shadow: 15px 15px 40px rgba(0,0,0,0.1); }

        /* [수정] 라디오 버튼 스타일: 글자 크기 17px, 날짜 높이에 맞춤 */
        .zoom-wrap { display: flex; gap: 12px; font-size: 17px; font-weight: 800; color: #444; align-items: center; }
        .zoom-wrap label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .zoom-wrap input { width: 18px; height: 18px; margin: 0; cursor: pointer; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-content">
        <img src="image_0.png" alt="앱 아이콘" class="welcome-logo">
        <div class="welcome-text">경배와 친구들의<br>당구 세상에 오신걸 환영합니다.<br><br><br><br><br>Created by<br>Ju Kyung Bae</div>
    </div>
</div>

<div id="exit-modal">
    <div class="modal-content">
        <div style="font-size:50px; margin-bottom:15px;">👋</div>
        <div id="exit-msg" style="font-size:16px; font-weight:800; color:#444; line-height:1.6; margin-bottom:25px;">오늘도 다들 즐거웠니?<br>다음에 또 보자!</div>
        <button class="save-btn" id="modalOkBtn" style="margin-bottom:12px;" onclick="closeAppWindow()">OK</button>
        <button class="save-btn" style="background:#abb2b9; margin:0; width: 100%;" onclick="closeExitModal()">취소</button>
    </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loadingText" style="font-weight:800; color:var(--main);">순위 데이터 동기화 중</div></div>

<div class="calendar-card">
    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="monthDisplay" style="font-size:20px; font-weight:900; color:#444; letter-spacing:-1px;"></span>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="selectedDateTitle" style="font-size:17px; margin:0; color:#444; font-weight:800;">📅 날짜 확인 중</h2>
        <div class="zoom-wrap">
            <label><input type="radio" name="z" value="1" ${currentZoom==='1'?'checked':''} onclick="changeZoom('1')"> 기본</label>
            <label><input type="radio" name="z" value="1.2" ${currentZoom==='1.2'?'checked':''} onclick="changeZoom('1.2')"> 120%</label>
        </div>
    </div>

    <div id="editBadge" style="display:none; color:white; font-size:13px; font-weight:bold; margin-bottom:15px; background: var(--edit); padding: 12px; border-radius: 12px; text-align: center;">✏️ 기록 수정 중</div>

    <div class="setup-row">
        <span style="font-size:14px; font-weight:800; color:#666;">게임 인원</span>
        <select id="playerCount" onchange="updateInputFields()">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>
    <div id="inputArea"></div>
    <div class="btn-group">
        <button id="mainBtn" class="save-btn" onclick="saveGame()">순위 저장</button>
        <button class="save-btn btn-cancel" onclick="resetInputs()">취소</button>
    </div>
    <div id="dayGameList"></div>
</div>

<div class="card">
    <h2 style="font-size:16px; margin:0 0 14px 0; color:#444; font-weight:800;">📊 멤버별 누적 전적</h2>
    <table class="stats-table">
        <thead>
            <tr>
                <th style="width:16%">이름</th>
                <th>참여</th>
                <th style="color:var(--rank1); white-space:nowrap; vertical-align:middle;">1위<span style="font-size:12px; margin-left:1px; display:inline-block; vertical-align:middle;">🥇</span></th>
                <th style="color:var(--rank2)">2위</th>
                <th style="color:var(--rank3)">3위</th>
                <th style="color:var(--rank4)">4위</th>
                <th style="color:var(--rankL); white-space:nowrap; vertical-align:middle;">꼴찌<span style="font-size:12px; margin-left:1px; display:inline-block; vertical-align:middle;">💀</span></th>
                <th style="width:16%">승률</th>
            </tr>
        </thead>
        <tbody id="statsBody"></tbody>
    </table>
    <div id="richFriendArea" style="display:none; background: var(--bg); padding: 20px; border-radius: 22px; text-align: center; box-shadow: var(--inner-shadow); margin-top: 20px; color: #7f8c8d; font-weight: 800;"></div>
</div>

<div class="danger-zone">
    <div style="color:#7b1fa2; font-weight:900; margin-bottom:15px; font-size:12px;">초기화 버튼은 함부로 터치하지 마세요.</div>
    <div id="resetSteps">
        <button class="reset-btn" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화 (복구 불가)</button>
    </div>
    <button id="exitBtn" class="exit-btn" onclick="showExitModal()">🚪 앱 종료</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzVCB4XXeebyVvbDe91gcarwdwTSmmM92KciZf7F-1GLXikP3Jlz0rivWodR-1xXRMdtg/exec"; 
    const players = ["경배", "원석", "정석", "진웅", "창한"];
    let gameLogs = [];
    let currentViewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString('sv-SE');
    let editMode = false;
    let editRound = null;
    let currentZoom = "1";

    function formatDate(dateInput) {
        const d = new Date(dateInput);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    async function fetchData() {
        if(!GAS_URL || GAS_URL.includes("URL_입력")) return;
        showLoading(true, "Cloud 동기화 중");
        try {
            const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
            const rawData = await response.json();
            gameLogs = rawData.map(g => ({ ...g, dateStr: formatDate(g.date) }));
            renderAll(); 
        } catch (e) { console.error("Fetch error"); } 
        finally { 
            showLoading(false); 
            document.getElementById('selectedDateTitle').innerText = `📅 ${selectedDateStr}`;
        }
    }

    function renderAll() { renderCalendar(); renderStats(); renderGameList(); }

    function isHoliday(year, month, day) {
        const dStr = `${month + 1}-${day}`;
        const fixedHolidays = ["1-1", "3-1", "5-5", "6-6", "7-17", "8-15", "10-3", "10-9", "12-25"];
        const variable2026 = ["2-16", "2-17", "2-18", "2-19", "3-2", "5-24", "5-25", "6-3", "8-17", "9-24", "9-25", "9-26", "10-5"];
        return fixedHolidays.includes(dStr) || (year === 2026 && variable2026.includes(dStr));
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = "";
        const year = currentViewDate.getFullYear(); const month = currentViewDate.getMonth();
        const realTodayStr = formatDate(new Date());
        document.getElementById('monthDisplay').innerText = `${year}년 ${month + 1}월`;
        ["일","월","화","수","목","금","토"].forEach((d, idx) => {
            let color = "#95a5a6"; if(idx === 0) color = "#e67e22"; if(idx === 6) color = "#5dade2";
            grid.innerHTML += `<div class="weekday" style="color:${color}">${d}</div>`;
        });
        const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
        for (let d = 1; d <= lastDate; d++) {
            const dStr = formatDate(new Date(year, month, d)); const dayOfWeek = new Date(year, month, d).getDay();
            let dayClass = (dayOfWeek === 0 || isHoliday(year, month, d)) ? "sun holiday" : (dayOfWeek === 6 ? "sat" : "");
            const isToday = dStr === realTodayStr ? 'today' : ''; const isSelected = dStr === selectedDateStr ? 'selected' : '';
            const hasRecord = gameLogs.some(g => g.dateStr === dStr) ? 'has-record' : '';
            grid.innerHTML += `<div class="day ${dayClass} ${isSelected} ${isToday} ${hasRecord}" onclick="selectDate('${dStr}')">${d}</div>`;
        }
    }

    function selectDate(dateStr) { if(editMode) cancelEdit(); selectedDateStr = dateStr; document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr}`; renderCalendar(); renderGameList(); }
    function checkDuplicates() {
        const selects = Array.from(document.querySelectorAll('#inputArea select')); const values = selects.map(s => s.value);
        selects.forEach(s => s.classList.remove('duplicate-error'));
        values.forEach((v, i) => { if(v && values.filter(x => x === v).length > 1) selects[i].classList.add('duplicate-error'); });
    }
    function updateInputFields(preFill = null) {
        if(preFill) document.getElementById('playerCount').value = preFill.length;
        const count = parseInt(document.getElementById('playerCount').value); let html = '';
        for(let i=1; i<=count; i++) {
            const label = i === count ? "꼴찌💀" : `${i}위`;
            html += `<div class="input-row"><label>${label}</label><select id="rank${i}" onchange="checkDuplicates()"><option value="">선택</option>${players.map(p => `<option value="${p}" ${preFill && preFill[i-1] === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>`;
        }
        document.getElementById('inputArea').innerHTML = html; if(preFill) checkDuplicates();
    }
    function resetInputs() { if(editMode) cancelEdit(); else { document.getElementById('playerCount').value = "3"; updateInputFields(); } }
    async function saveGame() {
        const todayStr = formatDate(new Date()); if(selectedDateStr > todayStr) return alert("미래에서 온거야? 오늘이 며칠인지 확인해!");
        const count = parseInt(document.getElementById('playerCount').value); const ranks = [];
        for(let i=1; i<=count; i++) { const val = document.getElementById('rank'+i).value; if(!val) return alert("친구를 선택해줄래?"); ranks.push(val); }
        if(new Set(ranks).size !== ranks.length) return alert("누가 쌍둥인겨? 잘 선택혀!(중복)");
        showLoading(true, "저장 중");
        const payload = { action: editMode ? "UPDATE" : "SAVE", date: selectedDateStr, ranks: [ranks[0]||"", ranks[1]||"", ranks[2]||"", ranks[3]||"", ranks[4]||""], round: editRound };
        try { await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); setTimeout(() => { fetchData(); alert("저장 완료 ✨"); cancelEdit(); }, 1200); } catch (e) { alert("오류 발생!"); showLoading(false); }
    }
    function confirmReset(step) {
        const el = document.getElementById('resetSteps');
        if(step === 1) el.innerHTML = `<div style="font-weight:bold; color:var(--accent); margin-bottom:10px;">[1단계] 데이터를 지울까요?</div><button class="reset-btn" style="background:var(--edit)" onclick="confirmReset(2)">OK</button><button class="cancel-btn" onclick="cancelReset()">NO</button>`;
        else if(step === 2) el.innerHTML = `<div style="font-weight:bold; color:var(--accent); margin-bottom:10px;">[2단계] 복구 불가입니다! 계속할까요?</div><button class="reset-btn" style="background:#e67e22" onclick="confirmReset(3)">OK</button><button class="cancel-btn" onclick="cancelReset()">NO</button>`;
        else if(step === 3) el.innerHTML = `<button class="reset-btn" style="background:var(--accent); font-size:16px;" onclick="executeReset()">[최종 확인] 🔥 마지막. 모두 삭제합니다.</button><button class="cancel-btn" onclick="cancelReset()">아냐. 경배한테 혼난다.(취소)</button>`;
    }
    function cancelReset() { document.getElementById('resetSteps').innerHTML = `<button class="reset-btn" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화 (복구 불가)</button>`; }
    async function executeReset() { showLoading(true, "초기화 중"); try { await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "RESET" }) }); location.reload(); } catch(e) { showLoading(false); } }
    function renderStats() {
        let stats = {}; players.forEach(p => stats[p] = { played: 0, ranks: [0,0,0,0,0] });
        gameLogs.forEach(g => {
            const actual = g.ranks.filter(n => n.trim() !== "");
            actual.forEach((name, idx) => { if(stats[name]) { stats[name].played++; if (idx === actual.length - 1 && actual.length > 1) stats[name].ranks[4]++; else if (idx < 4) stats[name].ranks[idx]++; } });
        });
        const sortedByWin = [...players].sort((a,b) => stats[b].ranks[0] - stats[a].ranks[0]);
        const maxCounts = { played: 0, r0: 0, r1: 0, r2: 0, r3: 0, r4: 0 };
        players.forEach(p => {
            maxCounts.played = Math.max(maxCounts.played, stats[p].played); maxCounts.r0 = Math.max(maxCounts.r0, stats[p].ranks[0]);
            maxCounts.r1 = Math.max(maxCounts.r1, stats[p].ranks[1]); maxCounts.r2 = Math.max(maxCounts.r2, stats[p].ranks[2]);
            maxCounts.r3 = Math.max(maxCounts.r3, stats[p].ranks[3]); maxCounts.r4 = Math.max(maxCounts.r4, stats[p].ranks[4]);
        });
        const bodyHtml = sortedByWin.map(p => {
            let nameStyle = "font-weight:900; letter-spacing:-0.5px;"; const winRate = stats[p].played > 0 ? ((stats[p].ranks[0] / stats[p].played) * 100).toFixed(1) : "0.0";
            if(stats[p].ranks[0] === maxCounts.r0 && maxCounts.r0 > 0) nameStyle += `color:var(--rank1);`; else if(stats[p].ranks[4] === maxCounts.r4 && maxCounts.r4 > 0) nameStyle += `color:var(--rankL);`;
            const b = (val, max) => (val === max && max > 0) ? `style="font-weight:900; font-size:14px;"` : "";
            return `<tr><td style="${nameStyle}">${p}</td><td ${b(stats[p].played, maxCounts.played)}>${stats[p].played}</td><td style="${stats[p].ranks[0] === maxCounts.r0 && maxCounts.r0 > 0 ? 'color:var(--rank1); font-weight:900; font-size:14px;' : ''}">${stats[p].ranks[0]}</td><td style="color:var(--rank2); ${stats[p].ranks[1] === maxCounts.r1 && maxCounts.r1 > 0 ? 'font-weight:900; font-size:14px;' : ''}">${stats[p].ranks[1]}</td><td style="color:var(--rank3); ${stats[p].ranks[2] === maxCounts.r2 && maxCounts.r2 > 0 ? 'font-weight:900; font-size:14px;' : ''}">${stats[p].ranks[2]}</td><td style="color:var(--rank4); ${stats[p].ranks[3] === maxCounts.r3 && maxCounts.r3 > 0 ? 'font-weight:900; font-size:14px;' : ''}">${stats[p].ranks[3]}</td><td style="color:var(--rankL); ${stats[p].ranks[4] === maxCounts.r4 && maxCounts.r4 > 0 ? 'font-weight:900; font-size:14px;' : ''}">${stats[p].ranks[4]}</td><td style="font-size:12.5px; color:#006400; font-weight:900;">${winRate}%</td></tr>`;
        }).join('');
        document.getElementById('statsBody').innerHTML = bodyHtml || players.map(p => `<tr><td>${p}</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0.0%</td></tr>`).join('');
        const richFriend = document.getElementById('richFriendArea');
        if(maxCounts.r4 > 0) { const losers = players.filter(p => stats[p].ranks[4] === maxCounts.r4); richFriend.style.display = 'block'; richFriend.innerHTML = `💸 야! 또 나냐? 다들 카드까봐!<br><span style="font-size:17px; color:var(--rankL); font-weight:900;">${losers.join(', ')} (${maxCounts.r4}회)</span>`; } else richFriend.style.display = 'none';
    }

    function changeZoom(v) { currentZoom = v; document.body.style.zoom = v; }

    function renderGameList() {
        const games = gameLogs.filter(g => g.dateStr === selectedDateStr); const listArea = document.getElementById('dayGameList');
        if(games.length > 0) {
            let html = `<div style="text-align:center; margin:28px 0 10px 0;">
                <span style="font-size:14px; color:#7f8c8d; font-weight:800;">GAME RECORD</span>
            </div>`;
            games.forEach((g, idx) => { const names = g.ranks.filter(n => n && n.trim() !== ""); html += `<div class="game-item"><div class="game-info"><span>${idx+1}G</span> ${names.join('→')}</div><div class="game-btns"><span style="color:var(--edit)" onclick="enterEditMode(${g.round}, '${names.join(',')}')">수정</span><span style="color:var(--success)" onclick="deleteGame(event, ${g.round})">삭제</span></div></div>`; });
            listArea.innerHTML = html;
        } else listArea.innerHTML = "";
    }
    function enterEditMode(round, rankStr) { editMode = true; editRound = round; updateInputFields(rankStr.split(',')); document.getElementById('editBadge').style.display = 'block'; const btn = document.getElementById('mainBtn'); btn.innerText = "수정 완료"; btn.classList.add('edit-btn'); }
    function cancelEdit() { editMode = false; editRound = null; document.getElementById('editBadge').style.display = 'none'; const btn = document.getElementById('mainBtn'); btn.innerText = "순위 저장"; btn.classList.remove('edit-btn'); document.getElementById('playerCount').value = "3"; updateInputFields(); }
    async function deleteGame(e, round) { e.stopPropagation(); if(!confirm("정말 삭제할거야?")) return; showLoading(true, "삭제 중"); try { await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "DELETE", round: round }) }); setTimeout(() => fetchData(), 1200); } catch (e) { showLoading(false); } }
    function showExitModal() { document.getElementById('exit-modal').style.display = 'flex'; }
    function closeExitModal() { document.getElementById('exit-modal').style.display = 'none'; }
    
    function closeAppWindow() { 
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if(isIOS) {
            closeExitModal();
        } else {
            if (window.history.length > 1) window.history.back(); 
            window.close(); 
            setTimeout(() => { window.location.href = "intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.HOME;end"; }, 100); 
        }
    }

    function showLoading(v, t) { document.getElementById('loadingText').innerText = t; document.getElementById('loading').style.display = v ? 'flex' : 'none'; }
    function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }

    window.onload = () => { 
        setTimeout(() => { 
            const ws = document.getElementById('welcome-screen');
            if(ws) { ws.style.opacity = '0'; setTimeout(() => { ws.style.display = 'none'; }, 800); }
        }, 3500);

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if(isIOS) {
            document.getElementById('exitBtn').innerText = "📱 홈 화면으로";
            document.getElementById('exit-msg').innerHTML = "아이폰은 시스템 정책상<br>직접 쓸어올려서 종료해야 해!<br>다음에 또 보자!";
            document.getElementById('modalOkBtn').innerText = "확인";
        }
        updateInputFields(); 
        renderStats(); 
        fetchData(); 
    };
</script>
</body>
</html>
