<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3256/3256247.png">
    
    <title>우리들의 Billiard World</title>
    
    <style>
        :root { 
            --main: #4a90e2; 
            --bg: #f0f3f7; 
            --accent: #ff4757; 
            --success: #2ed573; 
            --edit: #f39c12; 
            --today: #ffc0cb; 
            --exit-purple: #9370db;
            --shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --inner-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            --btn-shadow: 4px 4px 10px #b8c2d1, -4px -4px 10px #ffffff;
        }

        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            padding: env(safe-area-inset-top) 15px 100px 15px;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(74, 144, 226, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(147, 112, 219, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #444;
        }
        
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #4a90e2, #9370db);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease-out; color: white; text-align: center;
        }
        .welcome-content { animation: fadeInUp 1s ease-out; }
        .welcome-logo { font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
        .welcome-text { font-size: 20px; font-weight: bold; line-height: 1.5; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: #f0f3f7; border-radius: 28px; padding: 22px; 
            box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.4);
        }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; margin-top: 15px; }
        .day { 
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 14px; cursor: pointer; font-size: 14px; position: relative; 
            background: #f0f3f7; box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff; 
            transition: 0.2s; color: #333; border: 1.5px solid transparent;
        }
        
        .day.sat { color: #4a90e2; } 
        .day.sun, .day.holiday { color: #ff6b6b; } 
        .day.today { background: var(--today) !important; color: #d0006e !important; font-weight: bold; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1); }
        .day.selected { background: var(--main) !important; color: white !important; font-weight: bold; transform: scale(1.1); z-index: 5; box-shadow: 0 5px 15px rgba(74,144,226,0.4); }
        
        .has-record { background: #e8f5e9 !important; border: 1.5px solid var(--success) !important; }
        .has-record::after { 
            content: ''; position: absolute; bottom: 5px; width: 5px; height: 5px; 
            background: var(--success); border-radius: 50%; box-shadow: 0 0 3px var(--success);
        }
        
        .setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .input-row { display: flex; align-items: center; margin-bottom: 15px; }
        .input-row label { width: 60px; font-size: 13px; font-weight: 800; color: #555; }
        
        select { 
            flex: 1; padding: 14px; border-radius: 15px; border: none; font-size: 15px; 
            background: #f0f3f7; box-shadow: var(--inner-shadow);
            color: #333; font-weight: 600; transition: all 0.3s; 
            -webkit-appearance: none; text-align: center; text-align-last: center;
        }
        select:focus { outline: none; box-shadow: inset 2px 2px 5px #b8c2d1, inset -2px -2px 5px #ffffff; }

        .duplicate-error { 
            box-shadow: inset 4px 4px 8px #fbcbc4, inset -4px -4px 8px #ffffff !important;
            border: 2px solid var(--accent) !important;
            color: var(--accent) !important;
        }
        
        button.save-btn { 
            width: 100%; padding: 18px; 
            background: linear-gradient(145deg, #53a0f5, #4282cb); 
            color: white; border: none; border-radius: 18px; 
            font-weight: 800; margin-top: 15px; cursor: pointer; font-size: 16px; 
            box-shadow: 6px 6px 12px #c2cbd8, -4px -4px 10px #ffffff; 
            border-top: 1px solid rgba(255,255,255,0.3);
            transition: 0.2s;
        }
        button.edit-btn { background: linear-gradient(145deg, #ffae24, #da8c10) !important; }
        button:active { transform: scale(0.97); box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); }

        .stats-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .stats-table th { padding: 12px 5px; color: #888; border-bottom: 1px solid #ddd; }
        .stats-table td { padding: 14px 5px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.03); font-weight: 600; }
        
        .danger-zone { margin-top: 50px; padding: 25px; border-radius: 28px; background: #f0f3f7; box-shadow: var(--shadow); text-align: center; }
        
        .reset-btn { 
            width: 100%; background: linear-gradient(145deg, #ff5e6c, #e6404e); 
            color: white; border: none; padding: 16px; border-radius: 15px; 
            font-weight: bold; margin-bottom: 15px; 
            box-shadow: 4px 4px 10px #d1d9e6, -2px -2px 8px #ffffff;
            border-top: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; 
        }
        
        .exit-btn {
            width: 100%; background: linear-gradient(145deg, #a586e6, #8162c8); 
            color: white; border: none; padding: 18px; border-radius: 18px;
            font-weight: 800; font-size: 16px; cursor: pointer; 
            box-shadow: 6px 6px 12px #d1d9e6, -4px -4px 10px #ffffff;
            border-top: 1px solid rgba(255,255,255,0.3);
            text-shadow: 0 2px 3px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(240,243,247,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .spinner { border: 5px solid #d1d9e6; border-top: 5px solid var(--main); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .game-item { padding: 15px 10px; border-radius: 18px; background: #f0f3f7; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--inner-shadow); }
        .game-info { font-size: 11px; font-weight: 800; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin-right: 5px; }
        .game-btns { display: flex; gap: 8px; flex-shrink: 0; font-size: 11px; font-weight: bold; }
        
        .rich-msg { background: #f0f3f7; padding: 20px; border-radius: 22px; text-align: center; box-shadow: var(--inner-shadow); margin-top: 20px; color: #856404; font-weight: 800; }

        #exit-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 10001; backdrop-filter: blur(5px);
        }
        .modal-content { background: #f0f3f7; padding: 35px; border-radius: 30px; text-align: center; width: 80%; max-width: 320px; box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-content">
        <div class="welcome-logo">🎱</div>
        <div class="welcome-text">경배와 친구들의<br>당구 세계에 오신걸 환영합니다.<br><br>Create by 주경배</div>
    </div>
</div>

<div id="exit-modal">
    <div class="modal-content">
        <div style="font-size:50px; margin-bottom:15px;">👋</div>
        <div id="exit-message" style="font-size:16px; font-weight:800; color:#333; line-height:1.6; margin-bottom:25px;">
            오늘도 다들 즐거웠니?<br>다음에 또 보자!
        </div>
        <button id="final-exit-btn" class="save-btn" style="background:linear-gradient(135deg, #9370db, #8a2be2); margin-bottom:12px; box-shadow:none;" onclick="closeAppWindow()">OK</button>
        <button class="save-btn" style="background:#abb2b9; box-shadow:none; margin:0;" onclick="closeExitModal()">취소</button>
    </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loadingText" style="font-weight:800; color:var(--main);">순위 데이터 동기화 중. 기둘려!</div></div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; font-weight:800;">
        <button onclick="changeMonth(-1)" style="border:none; background:#f0f3f7; width:40px; height:40px; border-radius:50%; box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff; font-size:14px;">◀</button>
        <span id="monthDisplay" style="font-size:19px; color:#444;"></span>
        <button onclick="changeMonth(1)" style="border:none; background:#f0f3f7; width:40px; height:40px; border-radius:50%; box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff; font-size:14px;">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card">
    <h2 id="selectedDateTitle" style="font-size:18px; margin:0 0 20px 0; color:#333; font-weight:800;">📅 날짜 확인 중</h2>
    <div id="editBadge" style="display:none; color:white; font-size:13px; font-weight:bold; margin-bottom:15px; background: var(--edit); padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(243,156,18,0.3);">✏️ 기록 수정 중</div>
    
    <div class="setup-row">
        <span style="font-size:15px; font-weight:800; color:#555;">게임 인원</span>
        <select id="playerCount" style="flex:none; width:100px; box-shadow: var(--inner-shadow);" onchange="updateInputFields()">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>
    
    <div id="inputArea"></div>
    <button id="mainBtn" class="save-btn" onclick="saveGame()">순위 저장</button>
    
    <div id="dayGameList"></div>
</div>

<div class="card">
    <h2 style="font-size:18px; margin:0 0 15px 0; color:#333; font-weight:800;">📊 멤버별 누적 전적</h2>
    <table class="stats-table">
        <thead>
            <tr><th>이름</th><th>참여</th><th>1위🥇</th><th>2위</th><th>3위</th><th>4위</th><th style="color:red;">꼴찌💀</th></tr>
        </thead>
        <tbody id="statsBody"></tbody>
    </table>
    <div id="richFriendArea" class="rich-msg" style="display:none;"></div>
</div>

<div class="danger-zone">
    <div style="color:var(--exit-purple); font-weight:900; margin-bottom:15px; font-size:16px; letter-spacing:1px;">초기화 버튼은 함부로 터치하지 마세요.</div>
    <div id="resetSteps">
        <button class="reset-btn" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화 (복구 불가)</button>
    </div>
    <button class="exit-btn" onclick="showExitModal()">🚪 앱 종료</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby-S6Kc8ugrHsMtdYbx1UzJTqpJ60ZqBv0oznCCDuilyi6e6stfnIqUVCBwMhVqBNLGCg/exec"; 
    const players = ["경배", "원석", "정석", "진웅", "창한"];
    
    let gameLogs = [];
    let currentViewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString('sv-SE');
    let editMode = false;
    let editRound = null;

    function formatDate(dateInput) {
        const d = new Date(dateInput);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function isHoliday(date) {
        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        const d = date.getDate();
        const ymd = `${y}-${m}-${d}`;
        const fixedHolidays = ["1-1", "3-1", "5-5", "6-6", "7-17", "8-15", "10-1", "10-3", "10-9", "12-25"];
        if (fixedHolidays.includes(`${m}-${d}`)) return true;
        const variableHolidays = ["2026-2-16", "2026-2-17", "2026-2-18", "2026-5-24", "2026-5-25", "2026-9-24", "2026-9-25", "2026-9-26"];
        return variableHolidays.includes(ymd);
    }

    async function fetchData() {
        renderAll(); 
        if(!GAS_URL || GAS_URL.includes("URL_입력")) {
            document.getElementById('selectedDateTitle').innerText = `📅 ${selectedDateStr}`;
            return;
        }
        showLoading(true, "Cloud data 동기화 중");
        try {
            const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
            const rawData = await response.json();
            gameLogs = rawData.map(g => ({ ...g, dateStr: formatDate(g.date) }));
            renderAll();
        } catch (e) { console.error("Fetch error"); } 
        finally {
            showLoading(false);
            document.getElementById('selectedDateTitle').innerText = `📅 ${selectedDateStr}`;
        }
    }

    function renderAll() {
        renderCalendar();
        renderStats();
        renderGameList();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        const realTodayStr = formatDate(new Date());
        document.getElementById('monthDisplay').innerText = `${year}년 ${month + 1}월`;
        
        ["일","월","화","수","목","금","토"].forEach((d, idx) => {
            let color = "#aaa";
            if(idx === 0) color = "#ff6b6b";
            if(idx === 6) color = "#4a90e2";
            grid.innerHTML += `<div style="font-size:12px; font-weight:800; color:${color}; padding-bottom:5px;">${d}</div>`;
        });

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
        
        for (let d = 1; d <= lastDate; d++) {
            const dateObj = new Date(year, month, d);
            const dStr = formatDate(dateObj);
            const dayOfWeek = dateObj.getDay();
            let dayClass = "";
            if (dayOfWeek === 0 || isHoliday(dateObj)) dayClass = "sun";
            else if (dayOfWeek === 6) dayClass = "sat";
            const isSelected = dStr === selectedDateStr ? 'selected' : '';
            const isToday = dStr === realTodayStr ? 'today' : '';
            const hasRecord = gameLogs.some(g => g.dateStr === dStr) ? 'has-record' : '';
            grid.innerHTML += `<div class="day ${dayClass} ${isSelected} ${isToday} ${hasRecord}" onclick="selectDate('${dStr}')">${d}</div>`;
        }
    }

    function selectDate(dateStr) {
        if(editMode) cancelEdit();
        selectedDateStr = dateStr;
        document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr}`;
        renderAll();
    }

    function renderGameList() {
        const games = gameLogs.filter(g => g.dateStr === selectedDateStr);
        const listArea = document.getElementById('dayGameList');
        if(games.length > 0) {
            let html = `<p style="font-size:15px; color:#00B9FF; font-weight:800; margin:28px 0 10px 0; text-align:center;">GAME RECORD</p>`;
            games.forEach((g, idx) => {
                const names = g.ranks.filter(n => n && n.trim() !== "");
                html += `
                <div class="game-item" onclick="enterEditMode(${g.round}, '${names.join(',')}')">
                    <div class="game-info">
                        <span style="color:var(--main); margin-right:4px;">${idx+1}G</span> 
                        ${names.join('→')}
                    </div>
                    <div class="game-btns">
                        <span style="color:var(--edit); cursor:pointer;">수정</span>
                        <span style="color:var(--success); cursor:pointer;" onclick="deleteGame(event, ${g.round})">삭제</span>
                    </div>
                </div>`;
            });
            listArea.innerHTML = html;
        } else { listArea.innerHTML = ""; }
    }

    async function saveGame() {
        const count = parseInt(document.getElementById('playerCount').value);
        const ranks = [];
        for(let i=1; i<=count; i++) {
            const val = document.getElementById('rank'+i).value;
            if(!val) return alert("친구를 선택해줄래?");
            ranks.push(val);
        }
        if(new Set(ranks).size !== ranks.length) return alert("누가 쌍둥이여? 잘 선택혀!(중복)");
        showLoading(true, "기록 저장 중");
        const payload = { action: editMode ? "UPDATE" : "SAVE", date: selectedDateStr, ranks: [ranks[0]||"", ranks[1]||"", ranks[2]||"", ranks[3]||"", ranks[4]||""], round: editRound };
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            setTimeout(() => { fetchData(); alert("저장 완료 ✨"); cancelEdit(); }, 1200);
        } catch (e) { alert("오류 발생!"); showLoading(false); }
    }

    function updateInputFields(preFill = null) {
        if(preFill) document.getElementById('playerCount').value = preFill.length;
        const count = parseInt(document.getElementById('playerCount').value);
        let html = '';
        for(let i=1; i<=count; i++) {
            const label = i === count ? "꼴찌💀" : `${i}위`;
            html += `<div class="input-row"><label>${label}</label><select id="rank${i}" onchange="checkDuplicates()"><option value="">친구 선택</option>${players.map(p => `<option value="${p}" ${preFill && preFill[i-1] === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>`;
        }
        document.getElementById('inputArea').innerHTML = html;
        if(preFill) checkDuplicates();
    }

    function checkDuplicates() {
        const selects = Array.from(document.querySelectorAll('#inputArea select'));
        const values = selects.map(s => s.value);
        selects.forEach(s => s.classList.remove('duplicate-error'));
        values.forEach((v, i) => { if(v && values.filter(x => x === v).length > 1) selects[i].classList.add('duplicate-error'); });
    }

    function enterEditMode(round, rankStr) {
        editMode = true; editRound = round;
        updateInputFields(rankStr.split(','));
        document.getElementById('editBadge').style.display = 'block';
        const btn = document.getElementById('mainBtn');
        btn.innerText = "수정 완료"; btn.classList.add('edit-btn');
        window.scrollTo({ top: 200, behavior: 'smooth' });
    }

    function cancelEdit() {
        editMode = false; editRound = null;
        document.getElementById('editBadge').style.display = 'none';
        const btn = document.getElementById('mainBtn');
        btn.innerText = "순위 저장"; btn.classList.remove('edit-btn');
        updateInputFields();
    }

    async function deleteGame(e, round) {
        e.stopPropagation();
        if(!confirm("정말 삭제할거야?")) return;
        showLoading(true, "기록 삭제 중");
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "DELETE", round: round }) });
            setTimeout(() => { fetchData(); alert("삭제 완료 🗑️"); }, 1200);
        } catch (e) { showLoading(false); }
    }

    function renderStats() {
        let stats = {};
        players.forEach(p => stats[p] = { played: 0, ranks: [0,0,0,0,0] });
        gameLogs.forEach(g => {
            const actual = g.ranks.filter(n => n.trim() !== "");
            actual.forEach((name, idx) => {
                if(stats[name]) {
                    stats[name].played++;
                    if (idx === actual.length - 1 && actual.length > 1) stats[name].ranks[4]++;
                    else if (idx < 4) stats[name].ranks[idx]++;
                }
            });
        });

        let maxFirst = Math.max(...players.map(p => stats[p].ranks[0]));
        let maxLast = Math.max(...players.map(p => stats[p].ranks[4]));

        const sorted = [...players].sort((a,b) => stats[b].ranks[0] - stats[a].ranks[0]);
        
        document.getElementById('statsBody').innerHTML = sorted.map(p => {
            let nameStyle = "";
            if (maxFirst > 0 && stats[p].ranks[0] === maxFirst) nameStyle = "color:var(--main);";
            if (maxLast > 0 && stats[p].ranks[4] === maxLast) nameStyle = "color:var(--accent);";
            
            return `<tr><td style="${nameStyle} font-weight:800;">${p}</td><td>${stats[p].played}</td><td>${stats[p].ranks[0]}</td><td>${stats[p].ranks[1]}</td><td>${stats[p].ranks[2]}</td><td>${stats[p].ranks[3]}</td><td style="color:red;">${stats[p].ranks[4]}회</td></tr>`;
        }).join('');
        
        const rich = document.getElementById('richFriendArea');
        if(maxLast > 0) {
            const losers = players.filter(p => stats[p].ranks[4] === maxLast);
            // [수정] 오늘의 물주 표시 방식 변경: 이름1, 이름2 (n회)
            const loserNames = losers.join(', ');
            rich.style.display = 'block';
            rich.innerHTML = `💸 야! 또 나냐? 다들 카드까봐!<br><span style="font-size:20px; color:var(--accent); font-weight:900;">${loserNames} (${maxLast}회)</span>`;
        } else {
            rich.style.display = 'none';
        }
    }

    function confirmReset(step) {
        const el = document.getElementById('resetSteps');
        if(step === 1) el.innerHTML = `<div style="color:red; font-weight:bold; margin-bottom:10px;">[1단계] 정말 삭제할 거야?</div><button class="reset-btn" style="background:linear-gradient(145deg, #f39c12, #d68910);" onclick="confirmReset(2)">응, 진짜 삭제할래</button><button class="save-btn" style="margin-top:5px; margin-bottom:25px; background:linear-gradient(145deg, #888, #666); box-shadow:none;" onclick="cancelReset()">취소</button>`;
        else if(step === 2) el.innerHTML = `<div style="color:red; font-weight:bold; margin-bottom:10px;">[2단계] 진짜 복구 안 된다니까?</div><button class="reset-btn" style="background:linear-gradient(145deg, #e67e22, #ca6f1e);" onclick="confirmReset(3)">알았어, 마지막 확인!</button><button class="save-btn" style="margin-top:5px; margin-bottom:25px; background:linear-gradient(145deg, #888, #666); box-shadow:none;" onclick="cancelReset()">취소</button>`;
        else if(step === 3) el.innerHTML = `<div style="color:red; font-weight:bold; margin-bottom:10px;">[최종 확인] 지금 즉시 삭제합니다.</div><button class="reset-btn" onclick="executeReset()">🔥 데이터 즉시 삭제</button><button class="save-btn" style="margin-top:5px; margin-bottom:25px; background:linear-gradient(145deg, #888, #666); box-shadow:none;" onclick="cancelReset()">취소</button>`;
    }

    function cancelReset() { document.getElementById('resetSteps').innerHTML = `<button class="reset-btn" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화 (복구 불가)</button>`; }

    async function executeReset() {
        showLoading(true, "기록 초기화 중");
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "RESET" }) });
        location.reload();
    }

    function showExitModal() { document.getElementById('exit-modal').style.display = 'flex'; }
    function closeExitModal() { document.getElementById('exit-modal').style.display = 'none'; }
    function closeAppWindow() { window.close(); setTimeout(() => { document.getElementById('exit-message').innerHTML = "탭을 직접 닫아주세요!"; }, 500); }

    function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }
    function showLoading(v, t) { document.getElementById('loadingText').innerText = t; document.getElementById('loading').style.display = v ? 'flex' : 'none'; }

    window.onload = () => { updateInputFields(); fetchData(); setTimeout(() => { document.getElementById('welcome-screen').style.opacity = '0'; setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 800); }, 2000); };
</script>
</body>
</html>
