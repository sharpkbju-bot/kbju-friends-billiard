<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3256/3256247.png">
    
    <title>경배와 친구들 당구</title>
    
    <style>
        :root { --main: #007bff; --bg: #f4f7f6; --accent: #ff4757; --success: #2ed573; --edit: #f39c12; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px; }
        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 10px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; font-size: 14px; background: #fff; border: 1px solid #f0f0f0; }
        .day.selected { background: var(--main) !important; color: white !important; font-weight: bold; transform: scale(1.05); }
        .has-record { border: 2.5px solid var(--success) !important; font-weight: bold; background: #e8f9ee !important; }
        .setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .input-row { display: flex; align-items: center; margin-bottom: 10px; }
        .input-row label { width: 55px; font-size: 13px; font-weight: bold; color: var(--main); }
        select { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; }
        button.save-btn { width: 100%; padding: 16px; background: var(--main); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button.edit-btn { background: var(--edit) !important; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .stats-table th, .stats-table td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #eee; }
        .game-item { padding: 14px; border: 1px solid #eee; margin-top: 10px; border-radius: 15px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
        .reset-btn { width: 100%; background: #ff4757; color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; margin-top: 50px; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
    </style>
</head>
<body>

<div id="loading"><div id="loadingText">데이터 동기화 중...</div></div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button onclick="changeMonth(-1)">◀</button>
        <span id="monthDisplay" style="font-weight:bold; font-size:18px;"></span>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card">
    <h2 id="selectedDateTitle" style="font-size:17px; margin-bottom:15px;">📅 날짜 선택</h2>
    <div id="editBadge" style="display:none; color:white; background:var(--edit); padding:8px; border-radius:8px; text-align:center; margin-bottom:10px;">✏️ 수정 모드</div>
    <div class="setup-row">
        <span>인원 수</span>
        <select id="playerCount" onchange="updateInputFields()" style="width:80px;">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>
    <div id="inputArea"></div>
    <button id="mainBtn" class="save-btn" onclick="saveGame()">기록 저장</button>
    <div id="dayGameList"></div>
</div>

<div class="card">
    <h2 style="font-size:17px; margin-bottom:10px;">📊 멤버별 누적 전적</h2>
    <table class="stats-table">
        <thead><tr><th>이름</th><th>참여</th><th>1위</th><th>꼴찌💀</th></tr></thead>
        <tbody id="statsBody"></tbody>
    </table>
</div>

<button class="reset-btn" onclick="startResetProcess()">⚠️ 전체 데이터 초기화</button>

<script>
    // ⚠️ 아래 URL을 본인의 '새 배포' URL로 반드시 교체하세요!
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwZsAJukOpLca3jxYSPeEM98bNqCeoQIGLtvPWOnGP0/dev"; 
    const players = ["경배", "원석", "진웅", "창한", "정석"];
    
    let gameLogs = [];
    let currentViewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString('sv-SE');
    let editMode = false;
    let editRound = null;

    async function fetchData() {
        showLoading(true, "불러오는 중...");
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            gameLogs = await res.json();
            renderAll();
        } catch (e) { console.error(e); }
        finally { showLoading(false); }
    }

    function renderAll() {
        renderCalendar();
        renderStats();
        renderGameList();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('monthDisplay').innerText = `${year}년 ${month+1}월`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
        for (let d = 1; d <= lastDate; d++) {
            const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSelected = dStr === selectedDateStr ? 'selected' : '';
            const hasRecord = gameLogs.some(g => g.date.split('T')[0] === dStr) ? 'has-record' : '';
            grid.innerHTML += `<div class="day ${isSelected} ${hasRecord}" onclick="selectDate('${dStr}')">${d}</div>`;
        }
    }

    function selectDate(d) {
        selectedDateStr = d;
        document.getElementById('selectedDateTitle').innerText = `📅 ${d}`;
        if(editMode) cancelEdit();
        renderAll();
    }

    function renderGameList() {
        const listArea = document.getElementById('dayGameList');
        const dayGames = gameLogs.filter(g => g.date.split('T')[0] === selectedDateStr);
        listArea.innerHTML = dayGames.length ? "<p style='font-size:12px; color:#666; margin-top:15px;'>목록 (수정/삭제 가능)</p>" : "";
        dayGames.forEach((g, i) => {
            listArea.innerHTML += `
            <div class="game-item">
                <span onclick="enterEditMode('${g.round}', '${g.ranks.join(',')}')">${i+1}. ${g.ranks.join(' → ')}</span>
                <button onclick="deleteGame('${g.round}')" style="color:red; border:none; background:none; font-weight:bold;">삭제</button>
            </div>`;
        });
    }

    async function saveGame() {
        const count = document.getElementById('playerCount').value;
        const ranks = [];
        for(let i=1; i<=count; i++) {
            const v = document.getElementById('rank'+i).value;
            if(!v) return alert("선수를 모두 선택하세요.");
            ranks.push(v);
        }
        showLoading(true, "저장 중...");
        await fetch(GAS_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: editMode ? "UPDATE" : "SAVE", date: selectedDateStr, ranks, round: editRound })
        });
        setTimeout(() => { fetchData(); cancelEdit(); }, 2000);
    }

    async function deleteGame(round) {
        if(!confirm("정말 삭제할까요?")) return;
        showLoading(true, "삭제 중...");
        await fetch(GAS_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: "DELETE", round: String(round) })
        });
        setTimeout(fetchData, 2000);
    }

    function renderStats() {
        let stats = {};
        players.forEach(p => stats[p] = { played: 0, first: 0, last: 0 });
        gameLogs.forEach(g => {
            g.ranks.forEach((name, i) => {
                if(stats[name]) {
                    stats[name].played++;
                    if(i === 0) stats[name].first++;
                    if(i === g.ranks.length - 1) stats[name].last++;
                }
            });
        });
        document.getElementById('statsBody').innerHTML = players.map(p => `
            <tr><td>${p}</td><td>${stats[p].played}</td><td>${stats[p].first}</td><td style="color:red;">${stats[p].last}</td></tr>
        `).join('');
    }

    function updateInputFields(pre = null) {
        const count = pre ? pre.length : document.getElementById('playerCount').value;
        const area = document.getElementById('inputArea');
        area.innerHTML = "";
        for(let i=1; i<=count; i++) {
            area.innerHTML += `<div class="input-row"><label>${i}위</label><select id="rank${i}"><option value="">선택</option>${players.map(p => `<option value="${p}" ${pre && pre[i-1]===p ? 'selected':''}>${p}</option>`).join('')}</select></div>`;
        }
    }

    function enterEditMode(r, rStr) {
        editMode = true; editRound = r;
        document.getElementById('editBadge').style.display = 'block';
        document.getElementById('mainBtn').innerText = "수정 완료";
        document.getElementById('mainBtn').classList.add('edit-btn');
        updateInputFields(rStr.split(','));
    }

    function cancelEdit() {
        editMode = false; editRound = null;
        document.getElementById('editBadge').style.display = 'none';
        document.getElementById('mainBtn').innerText = "기록 저장";
        document.getElementById('mainBtn').classList.remove('edit-btn');
        updateInputFields();
    }

    function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }
    function showLoading(v, t) { document.getElementById('loadingText').innerText = t; document.getElementById('loading').style.display = v ? 'flex' : 'none'; }
    window.onload = () => { updateInputFields(); fetchData(); };
</script>
</body>
</html>
