<!DOCTYPE html>        
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json?v=4.00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">

    <link rel="icon" type="image/png" sizes="512x512" href="image_0.png?v=4.00">
    <link rel="apple-touch-icon" href="image_0.png?v=4.00">
        
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">

    <title>우리들의 Billiard World</title>
    
    <style>
        /* v3.60의 모든 스타일(CSS)을 그대로 유지합니다. (생략) */
        :root { --main: #7f8c8d; --bg: rgba(236, 238, 241, 0.4); --accent: #ff4757; --success: #27ae60; --edit: #f39c12; --today-bg: #e3f2fd; --today-border: #2196f3; --select-bg: #fff0f3; --select-border: #ff4d6d; --record-bg: #e8f5e9; --record-border: #4caf50; --record-dot: #e67e22; --shadow: 8px 8px 16px rgba(180, 180, 180, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8); --inner-shadow: inset 3px 3px 7px rgba(180, 180, 180, 0.4), inset -3px -3px 7px rgba(255, 255, 255, 0.8); --rank1: #2196f3; --rank2: #27ae60; --rank3: #8e44ad; --rank4: #f39c12; --rankL: #ff4757; --dup-bg: #fffde7; --dup-border: #ff80ab; --dup-text: #7b1fa2; --card-bg: rgba(255, 252, 225, 0.8); --edit-mode-bg: #e8f5e9; --edit-mode-border: #2d5a27; --text-color: #444; --sub-text: #666; --label-text: #777; --danger-text: #7b1fa2; --graph-line: #2980b9; }
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px; background-image: url('image_1.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; min-height: 100vh; color: var(--text-color); }
        .card { background: var(--card-bg); backdrop-filter: blur(5px); border-radius: 12px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.4); }
        select, input { padding: 12px; border-radius: 8px; border: none; background: rgba(236, 238, 241, 0.4); color: var(--text-color); font-weight: 600; width: 100%; box-shadow: var(--inner-shadow); }
        button.save-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(145deg, #abb2b9, #7f8c8d); color: white; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .stats-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 13px; text-align: center; }
        .stats-table td { background: rgba(255, 255, 255, 0.4); padding: 12px 5px; border-radius: 8px; font-weight: 800; }
        /* [중략: v3.60의 스타일은 그대로 유지하시고 아래 바디 부분만 신규 기능을 추가합니다] */
    </style>
</head>
<body>
    <div id="welcome-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#2196f3;z-index:10000;display:flex;justify-content:center;align-items:center;color:white;transition:0.8s;"><b>경배와 친구들 v4.00</b></div>

    <div class="card calendar-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <span id="monthDisplay" style="font-weight:900;"></span>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div id="calendarGrid" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px;"></div>
    </div>

    <div class="card" id="inputCard">
        <h2 id="selectedDateTitle" style="font-size:16px;">📅 날짜 확인 중</h2>
        <div id="editBadge" style="display:none; background:orange; color:white; padding:5px; border-radius:5px; margin-bottom:10px;">수정 중</div>
        
        <div class="setup-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span>게임 인원</span>
            <select id="playerCount" onchange="updateInputFields()" style="width:100px;">
                <option value="2">2명</option>
                <option value="3" selected>3명</option>
                <option value="4">4명</option>
                <option value="5">5명</option>
            </select>
        </div>

        <div id="drawArea" style="margin-bottom:20px;">
            <button class="save-btn" style="background:#1abc9c;" onclick="pickRandomOrder()">🎲 초구 추첨</button>
        </div>

        <div id="inputArea"></div>
        <button id="mainBtn" class="save-btn" onclick="saveGame()">순위 저장</button>
    </div>

    <div class="card" id="strategyCard">
        <h2 style="font-size:16px; font-weight:800; margin-bottom:15px;">🎯 순번별 상성 분석</h2>
        <div style="margin-bottom:10px;">분석 선수 선택</div>
        <select id="strategyPlayer" onchange="analyzeStrategy()">
            <option value="">선택</option>
            <option value="경배">경배</option>
            <option value="원석">원석</option>
            <option value="정석">정석</option>
            <option value="진웅">진웅</option>
            <option value="창한">창한</option>
            <option value="경석">경석</option>
        </select>
        <div id="strategyResult" style="margin-top:15px; display:none;"></div>
    </div>

    <div class="card">
        <h2 style="font-size:15px; font-weight:800; margin-bottom:15px;">📊 누적 전적</h2>
        <table class="stats-table">
            <thead><tr><th>이름</th><th>참여</th><th>1위</th><th>꼴찌</th><th>승률</th></tr></thead>
            <tbody id="statsBody"></tbody>
        </table>
    </div>

    <div id="dayGameList"></div>

<script>
    // [중요] 새로운 GAS 배포 URL로 교체하세요
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxiMb5roodj7iA7FXuWeX8tJVHfoTJxA7q5C6If_bAasBgePkG-eJ5FAZgGKmetk2A8ww/exec";

    let gameLogs = [];
    let selectedDateStr = new Date().toLocaleDateString('sv-SE');
    let currentStartOrder = [];
    let editMode = false;
    let editRound = null;

    async function fetchData() {
        try {
            const res = await fetch(GAS_URL + "?t=" + Date.now());
            gameLogs = await res.json();
            renderAll();
        } catch (e) { console.error("Data Fetch Error"); }
    }

    function renderAll() {
        renderCalendar();
        renderStats();
        renderGameList();
        analyzeStrategy();
    }

    function pickRandomOrder() {
        const pCount = parseInt(document.getElementById('playerCount').value);
        const all = ["경배", "원석", "정석", "진웅", "창한", "경석"];
        // 실제로는 참여 선수 선택 기능이 v3.60에 있었으므로 이를 활용하거나 랜덤으로 섞음
        let shuffled = all.sort(() => Math.random() - 0.5).slice(0, pCount);
        currentStartOrder = [...shuffled];
        alert("순서 결정: " + currentStartOrder.join(" -> "));
        
        for(let i=0; i<pCount; i++) {
            const sel = document.getElementById('rank'+(i+1));
            if(sel) sel.value = currentStartOrder[i];
        }
    }

    async function saveGame() {
        const pCount = parseInt(document.getElementById('playerCount').value);
        let ranks = [];
        for(let i=1; i<=pCount; i++) {
            const v = document.getElementById('rank'+i).value;
            if(!v) return alert("모든 순위를 선택하세요.");
            ranks.push(v);
        }

        const payload = {
            action: editMode ? "UPDATE" : "SAVE",
            date: selectedDateStr,
            ranks: ranks,
            round: editRound,
            startOrder: currentStartOrder.length > 0 ? currentStartOrder : null
        };

        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            editMode = false; editRound = null; currentStartOrder = [];
            document.getElementById('editBadge').style.display = 'none';
            await fetchData();
        } catch(e) { alert("저장 실패"); }
    }

    function analyzeStrategy() {
        const me = document.getElementById('strategyPlayer').value;
        const resArea = document.getElementById('strategyResult');
        if(!me) { resArea.style.display = 'none'; return; }

        let stats = {};
        gameLogs.forEach(g => {
            if(!g.startOrder || !g.startOrder.includes(me)) return;
            const order = g.startOrder;
            const myIdx = order.indexOf(me);
            const preP = order[(myIdx - 1 + order.length) % order.length];
            
            const myRank = g.ranks.indexOf(me);
            if(myRank === -1) return;

            if(!stats[preP]) stats[preP] = {c:0, w:0, l:0, s:0};
            stats[preP].c++;
            if(myRank === 0) stats[preP].w++;
            if(myRank === g.ranks.filter(n=>n!=="").length-1) stats[preP].l++;
            stats[preP].s += (myRank + 1);
        });

        const sorted = Object.keys(stats).sort((a,b) => (stats[a].s/stats[a].c) - (stats[b].s/stats[b].c));
        if(sorted.length === 0) {
            resArea.innerHTML = "<div style='padding:10px;'>기록된 초구 데이터가 없습니다.</div>";
        } else {
            let html = "<table class='stats-table'><thead><tr><th>앞 주자</th><th>평균</th><th>1위</th><th>꼴찌</th></tr></thead>";
            sorted.forEach(p => {
                const s = stats[p];
                html += `<tr><td>${p}</td><td>${(s.s/s.c).toFixed(1)}위</td><td>${((s.w/s.c)*100).toFixed(0)}%</td><td>${((s.l/s.c)*100).toFixed(0)}%</td></tr>`;
            });
            resArea.innerHTML = html + "</table>";
        }
        resArea.style.display = 'block';
    }

    function renderStats() {
        // 기존 v3.60 누적 전적 테이블 렌더링 코드 (동일 유지)
        let sBody = document.getElementById('statsBody');
        sBody.innerHTML = "";
        // ... (v3.60 로직)
    }

    function updateInputFields() {
        const cnt = parseInt(document.getElementById('playerCount').value);
        const area = document.getElementById('inputArea');
        let html = "";
        for(let i=1; i<=cnt; i++) {
            html += `<div class="input-row"><label>${i}위</label><select id="rank${i}"><option value="">선택</option><option value="경배">경배</option><option value="원석">원석</option><option value="정석">정석</option><option value="진웅">진웅</option><option value="창한">창한</option><option value="경석">경석</option></select></div>`;
        }
        area.innerHTML = html;
    }

    // [중략: changeMonth, renderCalendar 등 v3.60 로직 그대로 유지]
    
    window.onload = () => {
        setTimeout(() => { document.getElementById('welcome-screen').style.opacity = '0'; }, 2000);
        updateInputFields();
        fetchData();
    };
</script>
</body>
</html>
