<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3256/3256247.png">
    
    <title>경배와 친구들 당구</title>
    
    <style>
        :root { --main: #007bff; --bg: #f4f7f6; --accent: #ff4757; --success: #2ed573; --edit: #f39c12; --today: #ffc0cb; --exit-purple: #9370db; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px; }
        
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #007bff, #00c6ff);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease-out; color: white; text-align: center;
        }
        .welcome-content { animation: fadeInUp 1s ease-out; }
        .welcome-logo { font-size: 60px; margin-bottom: 20px; }
        .welcome-text { font-size: 20px; font-weight: bold; line-height: 1.5; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 20px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 10px; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; font-size: 14px; position: relative; background: #fff; border: 1px solid #f0f0f0; transition: 0.2s; color: #333; }
        
        .day.sat { color: #5dade2; } 
        .day.sun, .day.holiday { color: #f1948a; } 

        .day.today { background: var(--today) !important; color: #d0006e !important; font-weight: bold; }
        .day.selected { background: var(--main) !important; color: white !important; font-weight: bold; border: 2px solid #0056b3; z-index: 1; transform: scale(1.05); }
        .has-record { background: #e8f9ee !important; border: 2.5px solid var(--success) !important; font-weight: bold; color: #155724; }
        .has-record::after { content: ''; position: absolute; bottom: 4px; width: 6px; height: 6px; background: var(--success); border-radius: 50%; }
        
        .setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
        .input-row { display: flex; align-items: center; margin-bottom: 10px; }
        .input-row label { width: 55px; font-size: 13px; font-weight: bold; color: var(--main); }
        
        select { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; background: #fff; appearance: none; text-align: center; text-align-last: center; transition: all 0.3s; }
        select.duplicate-error { border: 3px solid var(--accent); background-color: #fff0f0; color: var(--accent); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        button.save-btn { width: 100%; padding: 16px; background: var(--main); color: white; border: none; border-radius: 15px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; box-shadow: 0 4px 12px rgba(0,123,255,0.3); }
        button.edit-btn { background: var(--edit) !important; box-shadow: 0 4px 12px rgba(243,156,18,0.3); }
        button:active { transform: scale(0.97); opacity: 0.9; }

        .stats-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .stats-table th { padding: 10px 5px; border-bottom: 2px solid #eee; background: #fdfdfd; color: #666; }
        .stats-table td { padding: 12px 5px; text-align: center; border-bottom: 1px solid #f1f1f1; }
        
        .danger-zone { margin-top: 50px; padding: 25px; border: 2px dashed #ff4757; border-radius: 25px; background: #fff5f5; text-align: center; }
        .reset-btn { width: 100%; background: #ff4757; color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 12px rgba(255,71,87,0.4); margin-bottom: 15px; }
        
        .exit-btn {
            width: 100%; background: linear-gradient(135deg, #9370db, #8a2be2); color: white; border: 3px solid #800080; padding: 16px; border-radius: 15px;
            font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 6px 15px rgba(147, 112, 219, 0.4); text-shadow: 0 2px 3px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .exit-btn:active { transform: translateY(2px) scale(0.98); }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; font-weight: bold; color: var(--main); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--main); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .game-item { padding: 12px 8px; border: 1px solid #eee; margin-top: 10px; border-radius: 15px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .game-info { flex: 1; min-width: 0; padding-right: 5px; white-space: nowrap; overflow: hidden; text-overflow: clip; font-size: 11.5px; letter-spacing: -0.5px; line-height: 1.4; }
        /* 버튼 영역 복구 */
        .game-btns { display: flex; gap: 8px; flex-shrink: 0; }
        
        .rich-msg { background: #fff3cd; padding: 15px; border-radius: 18px; text-align: center; font-size: 14px; color: #856404; font-weight: bold; margin-top: 15px; border: 2px solid #ffeeba; }

        #exit-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            display: none; justify-content: center; align-items: center; z-index: 10001; opacity: 0; transition: opacity 0.3s;
        }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-content">
        <div class="welcome-logo">🎱</div>
        <div class="welcome-text">경배와 친구들의<br>당구 세계에 오신걸 환영합니다.</div>
    </div>
</div>

<div id="exit-modal">
    <div class="modal-content">
        <div class="modal-icon" style="font-size:50px; margin-bottom:15px;">👋</div>
        <div id="exit-message" class="modal-text" style="font-size:16px; font-weight:bold; color:#333; line-height:1.6; margin-bottom:20px;">
            즐거운 시간 되셨나요?<br>앱을 종료하시겠습니까?
        </div>
        <button id="final-exit-btn" class="save-btn" style="background:linear-gradient(135deg, #9370db, #8a2be2); box-shadow:none; margin-bottom:10px;" onclick="closeAppWindow()">알겠어!</button>
        <button class="save-btn" style="background:#666; box-shadow:none; margin:0;" onclick="closeExitModal()">취소</button>
    </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loadingText">데이터 로딩 중. 기둘려!</div></div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; font-weight:bold;">
        <button onclick="changeMonth(-1)" style="border:none; background:#eee; width:35px; height:35px; border-radius:50%; font-size:14px;">◀</button>
        <span id="monthDisplay" style="font-size:18px;"></span>
        <button onclick="changeMonth(1)" style="border:none; background:#eee; width:35px; height:35px; border-radius:50%; font-size:14px;">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card">
    <h2 id="selectedDateTitle" style="font-size:17px; margin:0 0 15px 0; color:#333;">📅 날짜 로딩 중!</h2>
    <div id="editBadge" style="display:none; color:white; font-size:13px; font-weight:bold; margin-bottom:12px; background: var(--edit); padding: 10px; border-radius: 10px; text-align: center;">✏️ 기존 기록 수정 중</div>
    
    <div class="setup-row">
        <span style="font-size:14px; font-weight:bold;">게임 인원</span>
        <select id="playerCount" style="flex:none; width:90px;" onchange="updateInputFields()">
            <option value="2">2명</option>
            <option value="3" selected>3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
        </select>
    </div>
    
    <div id="inputArea"></div>
    <button id="mainBtn" class="save-btn" onclick="saveGame()">기록 저장</button>
    
    <div id="dayGameList"></div>
</div>

<div class="card">
    <h2 style="font-size:17px; margin:0 0 10px 0; color:#333;">📊 멤버별 누적 전적</h2>
    <table class="stats-table">
        <thead>
            <tr><th>이름</th><th>참여</th><th>1위🥇</th><th>2위</th><th>3위</th><th>4위</th><th style="color:red;">꼴찌💀</th></tr>
        </thead>
        <tbody id="statsBody"></tbody>
    </table>
    <div id="richFriendArea" class="rich-msg" style="display:none;"></div>
</div>

<div class="danger-zone">
    <div style="color:#9400d3; font-weight:900; margin-bottom:12px; font-size:16px;">[위험 구역]</div>
    <div id="resetSteps">
        <button class="reset-btn" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화 (복구 불가)</button>
    </div>
    <button class="exit-btn" onclick="showExitModal()">🚪 앱 종료</button>
    <div style="font-size:12px; color:#808000; margin-top:12px; line-height:1.4;">이 버튼들은 매우 신중하게 결정해 주세요.</div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby-S6Kc8ugrHsMtdYbx1UzJTqpJ60ZqBv0oznCCDuilyi6e6stfnIqUVCBwMhVqBNLGCg/exec"; 
    const players = ["경배", "원석", "진웅", "창한", "정석"];
    
    let gameLogs = [];
    let currentViewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString('sv-SE');
    let editMode = false;
    let editRound = null;

    function formatDate(dateInput) {
        const d = new Date(dateInput);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function isHoliday(date) {
        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        const d = date.getDate();
        const md = `${m}-${d}`;
        const ymd = `${y}-${m}-${d}`;
        const fixedHolidays = ["1-1", "3-1", "5-5", "6-6", "7-17", "8-15", "10-1", "10-3", "10-9", "12-25"];
        if (fixedHolidays.includes(md)) return true;
        const variableHolidays = [
            "2024-2-9", "2024-2-10", "2024-2-11", "2024-2-12", "2024-5-6", "2024-5-15", "2024-9-16", "2024-9-17", "2024-9-18",
            "2025-1-28", "2025-1-29", "2025-1-30", "2025-3-3", "2025-5-5", "2025-5-6", "2025-10-6", "2025-10-7", "2025-10-8",
            "2026-2-16", "2026-2-17", "2026-2-18", "2026-5-24", "2026-5-25", "2026-9-24", "2026-9-25", "2026-9-26"
        ];
        return variableHolidays.includes(ymd);
    }

    async function fetchData() {
        renderAll(); 
        if(!GAS_URL || GAS_URL.includes("URL_입력")) {
            document.getElementById('selectedDateTitle').innerText = `📅 ${selectedDateStr}`;
            return;
        }
        showLoading(true, "클라우드 데이터 동기화 중");
        try {
            const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
            if(!response.ok) throw new Error();
            const rawData = await response.json();
            gameLogs = rawData.map(g => ({ ...g, dateStr: formatDate(g.date) }));
            renderAll();
        } catch (e) { console.error("Data fetch error"); } 
        finally {
            showLoading(false);
            document.getElementById('selectedDateTitle').innerText = `📅 ${selectedDateStr}`;
        }
    }

    function renderAll() {
        renderCalendar();
        renderStats();
        renderGameList();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        if(!grid) return;
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        const realTodayStr = formatDate(new Date());
        document.getElementById('monthDisplay').innerText = `${year}년 ${month + 1}월`;
        
        ["일","월","화","수","목","금","토"].forEach((d, idx) => {
            let colorStyle = "color:#aaa;";
            if(idx === 0) colorStyle = "color:#f1948a;";
            if(idx === 6) colorStyle = "color:#5dade2;";
            grid.innerHTML += `<div style="font-size:12px;${colorStyle}padding-bottom:5px;">${d}</div>`;
        });

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
        
        for (let d = 1; d <= lastDate; d++) {
            const dateObj = new Date(year, month, d);
            const dStr = formatDate(dateObj);
            const dayOfWeek = dateObj.getDay();
            let dayClass = "";
            if (dayOfWeek === 0) dayClass = "sun";
            else if (dayOfWeek === 6) dayClass = "sat";
            if (isHoliday(dateObj)) dayClass = "holiday";
            const isSelected = dStr === selectedDateStr ? 'selected' : '';
            const isToday = dStr === realTodayStr ? 'today' : '';
            const hasRecord = gameLogs.some(g => g.dateStr === dStr) ? 'has-record' : '';
            grid.innerHTML += `<div class="day ${dayClass} ${isSelected} ${isToday} ${hasRecord}" onclick="selectDate('${dStr}')">${d}</div>`;
        }
    }

    function selectDate(dateStr) {
        if(editMode) cancelEdit();
        selectedDateStr = dateStr;
        document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr}`;
        renderAll();
    }

    /* -----------------------------------------------------------------
       [복구] 게임 리스트 렌더링 함수 (수정/삭제 버튼 포함)
       ----------------------------------------------------------------- */
    function renderGameList() {
        const games = gameLogs.filter(g => g.dateStr === selectedDateStr);
        const listArea = document.getElementById('dayGameList');
        if(games.length > 0) {
            let html = `<p style="font-size:12px; color:var(--edit); font-weight:bold; margin:20px 0 8px 0;">⌵ 이 날의 게임 (수정하려면 터치)</p>`;
            games.forEach((g, idx) => {
                const names = g.ranks.filter(n => n && n.trim() !== "");
                // 버튼 영역과 클릭 이벤트들을 다시 살렸습니다.
                html += `
                <div class="game-item" onclick="enterEditMode(${g.round}, '${names.join(',')}')">
                    <div class="game-info">
                        <small style="color:#FF00FF;">${idx+1}G:</small> 
                        <span style="font-weight:600;">${names.join('→')}</span>
                    </div>
                    <div class="game-btns">
                        <div style="color:var(--edit); font-size:12px; font-weight:bold;">수정</div>
                        <div style="color:#3CB371; font-size:12px; font-weight:bold;" onclick="deleteGame(event, ${g.round})">삭제</div>
                    </div>
                </div>`;
            });
            listArea.innerHTML = html;
        } else { listArea.innerHTML = ""; }
    }

    async function saveGame() {
        const count = parseInt(document.getElementById('playerCount').value);
        const ranks = [];
        for(let i=1; i<=count; i++) {
            const el = document.getElementById('rank'+i);
            if(!el || !el.value) return alert("선수를 모두 지정해 주세요!");
            ranks.push(el.value);
        }
        if(new Set(ranks).size !== ranks.length) return alert("❌ 중복된 선수가 있습니다!");
        showLoading(true, "기록 저장 중");
        const finalRanks = [ranks[0] || "", ranks[1] || "", ranks[2] || "", ranks[3] || "", ranks[4] || ""];
        const payload = { action: editMode ? "UPDATE" : "SAVE", date: selectedDateStr, ranks: finalRanks, round: editRound };
        try {
            await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
            setTimeout(async () => { await fetchData(); alert("성공적으로 저장되었습니다! ✅"); cancelEdit(); }, 1500);
        } catch (e) { alert("연결 오류가 발생했습니다."); showLoading(false); }
    }

    function checkDuplicates() {
        const count = parseInt(document.getElementById('playerCount').value);
        const values = []; const selects = [];
        for(let i=1; i<=count; i++) {
            const el = document.getElementById('rank'+i);
            if(el) { selects.push(el); values.push(el.value); }
        }
        selects.forEach(s => s.classList.remove('duplicate-error'));
        values.forEach((val, idx) => { if (val && values.filter(v => v === val).length > 1) { selects[idx].classList.add('duplicate-error'); } });
    }

    function updateInputFields(preFillData = null) {
        if(preFillData) document.getElementById('playerCount').value = preFillData.length;
        const count = parseInt(document.getElementById('playerCount').value);
        const area = document.getElementById('inputArea');
        let html = '';
        for(let i=1; i<=count; i++) {
            const label = i === count ? "꼴찌💀" : `${i}위`;
            html += `<div class="input-row"><label>${label}</label><select id="rank${i}" onchange="checkDuplicates()"><option value="">선수 선택</option>${players.map(p => `<option value="${p}" ${preFillData && preFillData[i-1] === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>`;
        }
        area.innerHTML = html;
        if(preFillData) checkDuplicates();
    }

    function enterEditMode(round, rankStr) {
        editMode = true; editRound = round;
        const currentRanks = rankStr.split(',');
        updateInputFields(currentRanks);
        document.getElementById('editBadge').style.display = 'block';
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.innerText = "게임 기록 수정 완료";
        mainBtn.classList.add('edit-btn');
        window.scrollTo({ top: 200, behavior: 'smooth' });
    }

    function cancelEdit() {
        editMode = false; editRound = null;
        document.getElementById('editBadge').style.display = 'none';
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.innerText = "기록 저장";
        mainBtn.classList.remove('edit-btn');
        updateInputFields();
    }

    /* -----------------------------------------------------------------
       [복구] 게임 삭제 함수
       ----------------------------------------------------------------- */
    async function deleteGame(event, round) {
        event.stopPropagation(); // 부모 클릭(수정 모드 진입) 차단
        if (!confirm("이 게임를 정말 삭제하시겠습니까?")) return;
        showLoading(true, "기록 삭제 중");
        try {
            await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: "DELETE", round: round }) });
            setTimeout(async () => { await fetchData(); alert("삭제되었습니다! 🗑️"); cancelEdit(); }, 1500);
        } catch (e) { alert("연결 오류가 발생했습니다."); showLoading(false); }
    }

    function renderStats() {
        let stats = {};
        players.forEach(p => stats[p] = { played: 0, ranks: [0,0,0,0,0] });
        gameLogs.forEach(g => {
            const actual = g.ranks.filter(n => n && n.trim() !== "");
            const lastIdx = actual.length - 1;
            actual.forEach((name, idx) => {
                if(stats[name]) {
                    stats[name].played++;
                    if (idx === lastIdx && actual.length > 1) stats[name].ranks[4]++; 
                    else if (idx < 4) stats[name].ranks[idx]++;
                }
            });
        });
        let maxFirst = 0, maxLast = 0;
        players.forEach(p => { if (stats[p].ranks[0] > maxFirst) maxFirst = stats[p].ranks[0]; if (stats[p].ranks[4] > maxLast) maxLast = stats[p].ranks[4]; });
        const sortedPlayers = [...players].sort((a,b) => stats[b].ranks[0] - stats[a].ranks[0]);
        document.getElementById('statsBody').innerHTML = sortedPlayers.map(p => {
            let nameStyle = "font-weight:bold;";
            if (maxFirst > 0 && stats[p].ranks[0] === maxFirst) nameStyle += "color:blue;";
            if (maxLast > 0 && stats[p].ranks[4] === maxLast) nameStyle += "color:red;";
            return `<tr><td><span style="${nameStyle}">${p}</span></td><td>${stats[p].played}</td><td>${stats[p].ranks[0]}</td><td>${stats[p].ranks[1]}</td><td>${stats[p].ranks[2]}</td><td>${stats[p].ranks[3]}</td><td style="color:red; font-weight:bold;">${stats[p].ranks[4]}</td></tr>`;
        }).join('');
        const richArea = document.getElementById('richFriendArea');
        if (maxLast > 0) {
            const losers = players.filter(p => stats[p].ranks[4] === maxLast);
            richArea.style.display = 'block';
            richArea.innerHTML = `💸 이판도 나? 다들 카드까봐! (최고 꼴찌 ${maxLast}회)<br><span style="font-size:20px; color:var(--accent);">${losers.join(', ')}</span>`;
        } else { richArea.style.display = 'none'; }
    }

    function confirmReset(step) {
        const container = document.getElementById('resetSteps');
        if (step === 1) container.innerHTML = `<div style="color:red; font-weight:bold; margin-bottom:10px;">[1단계] 정말 삭제할 거야?</div><button class="reset-btn" style="background:#f39c12;" onclick="confirmReset(2)">응, 진짜 삭제할래</button><button class="save-btn" style="margin-top:10px; background:#666;" onclick="cancelReset()">취소</button>`;
        else if (step === 2) container.innerHTML = `<div style="color:red; font-weight:bold; margin-bottom:10px;">[2단계] 진짜 복구 안 된다니까?</div><button class="reset-btn" style="background:#e67e22;" onclick="confirmReset(3)">알았어, 마지막 확인!</button><button class="save-btn" style="margin-top:10px; background:#666;" onclick="cancelReset()">취소</button>`;
        else if (step === 3) container.innerHTML = `<div style="color:red; font-weight:bold; margin-bottom:10px;">[최종 확인] 지금 즉시 삭제합니다.</div><button class="reset-btn" onclick="executeReset()">🔥 데이터 즉시 삭제 (복구 불가)</button><button class="save-btn" style="margin-top:10px; background:#666;" onclick="cancelReset()">취소</button>`;
    }

    function cancelReset() { document.getElementById('resetSteps').innerHTML = `<button class="reset-btn" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화 (복구 불가)</button>`; }

    async function executeReset() {
        showLoading(true, "서버 데이터를 비우는 중");
        try { await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: "RESET" }) }); alert("초기화가 완료되었습니다."); location.reload(); }
        catch (e) { alert("초기화 중 오류가 발생했습니다."); showLoading(false); cancelReset(); }
    }

    function showExitModal() {
        const modal = document.getElementById('exit-modal');
        modal.style.display = 'flex';
        requestAnimationFrame(() => modal.style.opacity = '1');
    }

    function closeExitModal() {
        const modal = document.getElementById('exit-modal');
        modal.style.opacity = '0';
        setTimeout(() => modal.style.display = 'none', 300);
    }

    function closeAppWindow() {
        window.close();
        setTimeout(() => {
            if (!window.closed) {
                document.getElementById('exit-message').innerHTML = "보안상 창을 자동으로 닫을 수 없습니다.<br><span style='color:red;'>브라우저 탭을 직접 닫아주세요!</span>";
                document.getElementById('final-exit-btn').style.display = "none";
            }
        }, 500);
    }

    function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }
    function showLoading(v, text = "처리 중") { document.getElementById('loadingText').innerText = text; document.getElementById('loading').style.display = v ? 'flex' : 'none'; }

    window.onload = () => { 
        updateInputFields(); 
        fetchData(); 
        setTimeout(() => {
            const welcome = document.getElementById('welcome-screen');
            if(welcome) {
                welcome.style.opacity = '0';
                setTimeout(() => welcome.style.display = 'none', 800);
            }
        }, 2000);
    };
</script>
</body>
</html>
