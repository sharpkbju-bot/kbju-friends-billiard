<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>경배와 친구들</title>
    <style>
        :root { --main: #007bff; --bg: #f4f7f6; --success: #2ed573; --edit: #f39c12; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 50px; }
        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; border: 1px solid #eee; font-size: 14px; background: white; }
        .day.selected { background: var(--main) !important; color: white !important; font-weight: bold; }
        .has-record { border: 2px solid var(--success) !important; background: #e8f9ee !important; }
        .setup-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .input-row { display: flex; align-items: center; margin-bottom: 8px; }
        .input-row label { width: 50px; font-weight: bold; font-size: 13px; color: var(--main); }
        select { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; background: #fff; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .save-btn { background: var(--main); color: white; }
        .edit-mode-btn { background: var(--edit); color: white; }
        .game-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 12px; margin-top: 10px; background: #fafafa; font-size: 14px; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .stats-table th, .stats-table td { padding: 8px 2px; border-bottom: 1px solid #eee; text-align: center; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading">동기화 중...</div>

<div class="card">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
        <button onclick="changeMonth(-1)">◀</button>
        <b id="monthDisplay"></b>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="card">
    <h3 id="selectedDateTitle" style="margin:0 0 15px 0;">날짜 선택</h3>
    <div id="editModeIndicator" style="display:none; background:var(--edit); color:white; padding:10px; border-radius:10px; margin-bottom:10px; text-align:center; font-size:13px;">✏️ 수정 중 (취소하려면 날짜 다시 클릭)</div>
    <div class="setup-row">
        <b>인원</b>
        <select id="playerCount" onchange="updateInputFields()" style="width:80px;">
            <option value="2">2명</option><option value="3" selected>3명</option><option value="4">4명</option><option value="5">5명</option>
        </select>
    </div>
    <div id="inputArea"></div>
    <button id="mainBtn" class="btn save-btn" onclick="saveGame()">기록 저장</button>
    <div id="dayGameList"></div>
</div>

<div class="card">
    <h3 style="margin-top:0;">📊 누적 전적</h3>
    <table class="stats-table">
        <thead><tr><th>이름</th><th>참여</th><th>1위</th><th>2위</th><th>3위</th><th>4위</th><th>5위</th></tr></thead>
        <tbody id="statsBody"></tbody>
    </table>
</div>

<button onclick="startResetProcess()" style="width:100%; color:#ccc; border:none; background:none; font-size:11px; margin-top:20px;">전체 초기화</button>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzb2IGqIZy7_PdVdNeftnlzVOkzi5fghGAWV5zVdQ3ZqopgxxgjLXgIUgqoGVbUrtk9/exec"; 
    const players = ["경배", "원석", "진웅", "창한", "정석"];
    let gameLogs = [], curDate = new Date(), selDate = new Date().toISOString().split('T')[0], editId = null;

    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
            gameLogs = await res.json();
            render();
        } catch(e) { console.error(e); }
        document.getElementById('loading').style.display = 'none';
    }

    function render() {
        // 달력
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        const y = curDate.getFullYear(), m = curDate.getMonth();
        document.getElementById('monthDisplay').innerText = `${y}년 ${m+1}월`;
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += "<div></div>";
        for(let d=1; d<=last; d++) {
            const dstr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const cls = `day ${dstr===selDate?'selected':''} ${gameLogs.some(g=>g.date===dstr)?'has-record':''}`;
            grid.innerHTML += `<div class="${cls}" onclick="selectDate('${dstr}')">${d}</div>`;
        }
        
        // 당일 목록
        const list = document.getElementById('dayGameList');
        list.innerHTML = "";
        gameLogs.filter(g => g.date === selDate).forEach((g, i) => {
            list.innerHTML += `<div class="game-item">
                <span style="flex:1" onclick="enterEdit('${g.round}', '${g.ranks}')">${i+1}. ${g.ranks.join(' → ')}</span>
                <b onclick="deleteGame('${g.round}')" style="color:red; cursor:pointer;">삭제</b>
            </div>`;
        });

        // 전적 (모든 순위 표시)
        const stats = {};
        players.forEach(p => stats[p] = {p:0, r:[0,0,0,0,0]});
        gameLogs.forEach(g => {
            g.ranks.forEach((n, i) => {
                if(stats[n]) { stats[n].p++; stats[n].r[i]++; }
            });
        });
        document.getElementById('statsBody').innerHTML = players.map(p => `
            <tr><td><b>${p}</b></td><td>${stats[p].p}</td>
            <td>${stats[p].r[0]}</td><td>${stats[p].r[1]}</td><td>${stats[p].r[2]}</td><td>${stats[p].r[3]}</td><td>${stats[p].r[4]}</td></tr>
        `).join('');
    }

    function selectDate(d) { selDate = d; document.getElementById('selectedDateTitle').innerText = `📅 ${d}`; cancelEdit(); render(); }
    
    function updateInputFields(pre = []) {
        const area = document.getElementById('inputArea');
        const count = pre.length > 0 ? pre.length : document.getElementById('playerCount').value;
        if(pre.length > 0) document.getElementById('playerCount').value = count;
        area.innerHTML = "";
        for(let i=0; i<count; i++) {
            area.innerHTML += `<div class="input-row"><label>${i+1}위</label><select id="r${i}"><option value="">선택</option>${players.map(p=>`<option value="${p}" ${pre[i]===p?'selected':''}>${p}</option>`).join('')}</select></div>`;
        }
    }

    async function saveGame() {
        const ranks = [];
        const count = document.getElementById('playerCount').value;
        for(let i=0; i<count; i++) {
            const v = document.getElementById('r'+i).value;
            if(!v) return alert("순위를 모두 선택하세요.");
            ranks.push(v);
        }
        document.getElementById('loading').style.display = 'flex';
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: editId?"UPDATE":"SAVE", date: selDate, ranks, round: editId }) });
        setTimeout(() => { fetchData(); cancelEdit(); }, 2000);
    }

    async function deleteGame(id) {
        if(!confirm("삭제할까요?")) return;
        document.getElementById('loading').style.display = 'flex';
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "DELETE", round: id }) });
        setTimeout(fetchData, 2000);
    }

    function enterEdit(id, rstr) {
        editId = id; updateInputFields(rstr.split(','));
        document.getElementById('editModeIndicator').style.display = 'block';
        const btn = document.getElementById('mainBtn');
        btn.innerText = "수정 완료"; btn.className = "btn edit-mode-btn";
    }

    function cancelEdit() {
        editId = null; document.getElementById('editModeIndicator').style.display = 'none';
        const btn = document.getElementById('mainBtn');
        btn.innerText = "기록 저장"; btn.className = "btn save-btn";
        updateInputFields();
    }

    async function startResetProcess() {
        if(confirm("정말 초기화할까요?") && confirm("진짜 다 지웁니다?") && confirm("마지막 확인입니다.")) {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "RESET" }) });
            location.reload();
        }
    }

    function changeMonth(v) { curDate.setMonth(curDate.getMonth() + v); render(); }
    window.onload = () => { selectDate(selDate); fetchData(); };
</script>
</body>
</html>
