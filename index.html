<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    
    <link rel="apple-touch-icon" href="image_0.png">
    
    <title>우리들의 Billiard World</title>
    
    <style>
        :root { 
            --main: #7f8c8d; 
            --bg: rgba(236, 238, 241, 0.4); 
            --accent: #ff4757; 
            --success: #27ae60; 
            --edit: #f39c12; 
            --today-bg: #e3f2fd; 
            --today-border: #2196f3; 
            --select-bg: #fff0f3; 
            --select-border: #ff4d6d; 
            --record-bg: #e8f5e9; 
            --record-border: #4caf50; 
            --record-dot: #e67e22; 
            --shadow: 8px 8px 16px rgba(180, 180, 180, 0.4), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --inner-shadow: inset 3px 3px 7px rgba(180, 180, 180, 0.4), inset -3px -3px 7px rgba(255, 255, 255, 0.8);
            
            --rank1: #2196f3; 
            --rank2: #27ae60; 
            --rank3: #8e44ad; 
            --rank4: #f39c12; 
            --rankL: #ff4757; 
            
            --dup-bg: #fffde7;    
            --dup-border: #ff80ab; 
            --dup-text: #7b1fa2;
            
            --card-bg: rgba(243, 230, 255, 0.7); 

            --edit-mode-bg: #e8f5e9;
            --edit-mode-border: #2d5a27; 
            
            --text-color: #444;
            --sub-text: #666;
            --label-text: #777;
        }

        [data-theme='dark'] {
            --main: #bdc3c7;
            --bg: rgba(30, 30, 30, 0.9);
            --today-bg: #1a237e;
            --today-border: #448aff;
            --select-bg: #4a148c;
            --select-border: #e91e63;
            --record-bg: #1b5e20;
            --record-border: #81c784;
            --shadow: 8px 8px 16px rgba(0, 0, 0, 0.6), -4px -4px 10px rgba(60, 60, 60, 0.2);
            --inner-shadow: inset 3px 3px 7px rgba(0, 0, 0, 0.7), inset -2px -2px 5px rgba(60, 60, 60, 0.2);
            --card-bg: rgba(35, 35, 45, 0.9);
            --dup-bg: #3e2723;
            --dup-border: #ff5252;
            --dup-text: #ffccbc;
            --text-color: #eeeeee;
            --sub-text: #cccccc;
            --label-text: #bbbbbb;
            --rank1: #4da3ff;
            --edit-mode-bg: rgba(60, 60, 60, 0.8);
            --edit-mode-text: #27ae60;
        }

        /* [수정] 다크모드 달력 화살표 컬러 고정 */
        [data-theme='dark'] .nav-btn { color: #ffffff !important; background: rgba(80, 80, 80, 0.6) !important; }
        [data-theme='dark'] #monthDisplay, [data-theme='dark'] #selectedDateTitle { color: #ffffff !important; }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: env(safe-area-inset-top) 15px 100px 15px;
            background-image: url('image_1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* ... 기존 스타일(calendar-card, day, card 등) 동일하게 유지 ... */
        .calendar-card { background: var(--card-bg); backdrop-filter: blur(5px); border-radius: 32px; padding: 24px 18px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid rgba(255, 255, 255, 0.6); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { border: none; background: rgba(236, 238, 241, 0.4); width: 44px; height: 44px; border-radius: 14px; box-shadow: 4px 4px 8px rgba(180, 180, 180, 0.3), -4px -4px 8px rgba(255, 255, 255, 0.7); font-size: 14px; cursor: pointer; color: #777; transition: 0.2s; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .weekday { font-size: 11px; font-weight: 900; padding-bottom: 10px; color: #95a5a6; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; font-size: 15px; font-weight: 700; position: relative; background: linear-gradient(145deg, rgba(253, 253, 253, 0.8), rgba(226, 229, 234, 0.8)); box-shadow: 6px 6px 14px rgba(0, 0, 0, 0.22), -2px -2px 6px rgba(255, 255, 255, 0.8); transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #555; border: 1px solid rgba(255,255,255,0.4); }
        .day.sat { color: #5dade2; } 
        .day.sun, .day.holiday { color: #e67e22; } 
        .day.today { background: var(--today-bg) !important; color: var(--today-border) !important; border: 2px solid var(--today-border) !important; }
        .day.selected { background: var(--select-bg) !important; color: var(--select-border) !important; transform: scale(1.15); z-index: 5; border: 2px solid var(--select-border) !important; }
        .day.has-record { background: var(--record-bg); border: 2px solid var(--record-border); color: #2e7d32; }
        .day.has-record::after { content: ''; position: absolute; bottom: 4px; width: 5px; height: 5px; background: var(--record-dot); border-radius: 50%; }

        /* [수정] 초기화 버튼 영역 레이아웃 확보 */
        .danger-zone { margin-top: 50px; padding: 25px; border-radius: 28px; background: var(--card-bg); backdrop-filter: blur(5px); box-shadow: var(--shadow); text-align: center; }
        #resetSteps { display: flex; flex-direction: column; gap: 10px; min-height: 48px; margin-bottom: 12px; }
        .reset-btn { width: 100%; background: linear-gradient(145deg, #e67e22, #d35400); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .exit-btn { width: 100%; background: linear-gradient(145deg, #7f8c8d, #626e6e); color: white; border: none; padding: 16px; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; }

        /* ... 나머지 스타일은 기존 파일 내용과 동일 ... */
    </style>
</head>
<body id="app-body">
    <div class="danger-zone">
        <div style="color:#7b1fa2; font-weight:900; margin-bottom:15px; font-size:12px;">초기화 버튼은 함부로 터치하지 마세요.</div>
        <div id="resetSteps">
            <button class="reset-btn" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화 (복구 불가)</button>
        </div>
        <button id="exitBtn" class="exit-btn" onclick="showExitModal()">🚪 앱 종료</button>
    </div>

<script>
    /* ... JavaScript 로직 (GAS_URL, players, fetchData 등) 원본 복구 ... */

    // [수정] 초기화 단계별 버튼 출력 로직 (레이아웃 간섭 제거)
    function confirmReset(step) {
        const el = document.getElementById('resetSteps');
        if(step === 1) {
            el.innerHTML = `
                <button class="reset-btn" style="background:var(--edit); margin-bottom:5px;" onclick="confirmReset(2)">[1단계] 정말 초기화할까요?</button>
                <button class="save-btn btn-cancel" style="margin:0; width:100%; height:50px; border-radius:18px; border:none; font-weight:800;" onclick="cancelReset()">취소</button>
            `;
        } else if(step === 2) {
            el.innerHTML = `
                <button class="reset-btn" style="background:var(--accent); margin-bottom:5px;" onclick="confirmReset(3)">[2단계] 데이터가 모두 삭제됩니다.</button>
                <button class="save-btn btn-cancel" style="margin:0; width:100%; height:50px; border-radius:18px; border:none; font-weight:800;" onclick="cancelReset()">취소</button>
            `;
        } else if(step === 3) {
            el.innerHTML = `
                <button class="reset-btn" style="background:#000; color:#fff; margin-bottom:5px;" onclick="executeReset()">[최종 확인] 복구 불가! OK</button>
                <button class="save-btn btn-cancel" style="margin:0; width:100%; height:50px; border-radius:18px; border:none; font-weight:800;" onclick="cancelReset()">취소</button>
            `;
        }
    }

    function cancelReset() {
        document.getElementById('resetSteps').innerHTML = `<button class="reset-btn" onclick="confirmReset(1)">⚠️ 모든 데이터 초기화 (복구 불가)</button>`;
    }

    // [복구] window.onload - 아이폰 전용 로직 포함
    window.onload = () => { 
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeSwitch').checked = true;
        }
        setTimeout(() => { 
            const ws = document.getElementById('welcome-screen');
            if(ws) { ws.style.opacity = '0'; setTimeout(() => { ws.style.display = 'none'; }, 800); }
        }, 3000);

        // 아이폰 종료 로직 (중요)
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if(isIOS) {
            document.getElementById('exitBtn').innerText = "📱 Return Home";
            document.getElementById('exit-msg').innerHTML = "SWIPE UP<br>다음에 또 보자!";
            document.getElementById('modalOkBtn').innerText = "확인";
        }
        updateInputFields(); 
        fetchData(); 
    };

    /* ... 나머지 함수들 (renderCalendar, saveGame 등) 원본 복구 ... */
</script>
</body>
</html>
