<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="경배와 친구들">
    <link rel="apple-touch-icon" href="image_0.png">
    
    <title>우리들의 Billiard World</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    
    <style>
        :root { 
            --main: #7f8c8d; 
            --bg: rgba(236, 238, 241, 0.4); 
            --accent: #ff4757; 
            --success: #27ae60; 
            --edit: #f39c12; 
            --today-bg: #e3f2fd; 
            --today-border: #2196f3; 
            --select-bg: #fff0f3; 
            --select-border: #ff4d6d; 
            --record-bg: #e8f5e9; 
            --record-border: #4caf50; 
            --shadow: 8px 8px 16px rgba(0,0,0,0.1), -8px -8px 16px rgba(255,255,255,0.8);
            --inner-shadow: inset 4px 4px 8px rgba(0,0,0,0.05), inset -4px -4px 8px rgba(255,255,255,0.8);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .card { 
            background: var(--bg); 
            padding: 25px; 
            border-radius: 30px; 
            box-shadow: var(--shadow); 
            width: 100%; 
            max-width: 450px; 
            margin-bottom: 25px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            box-sizing: border-box; /* 패딩으로 인한 너비 변화 방지 */
        }

        /* [확대 모드 대응] 버튼 그룹 레이아웃 수정 */
        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
            justify-content: space-between;
        }

        .button-group button {
            flex: 1; /* 두 버튼의 너비를 동일하게 유지 */
            white-space: nowrap; /* 텍스트 줄바꿈 방지 */
            padding: 15px 5px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* [확대 모드 대응] 입력창 텍스트 중앙 정렬 유지 */
        .search-input-group {
            background: rgba(255,255,255,0.6);
            border-radius: 15px;
            box-shadow: var(--inner-shadow);
            padding: 0 15px;
            display: flex;
            align-items: center;
            height: 50px;
        }

        .search-input-group input {
            background: none;
            border: none;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            color: #2d3436;
            outline: none;
            text-align: center;
            line-height: 50px; /* 세로 중앙 정렬 보정 */
        }

        /* 기존 스타일 그대로 유지 */
        .zoom-wrap { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 450px; }
        .player-chip { background: white; padding: 12px; border-radius: 15px; text-align: center; font-weight: 600; box-shadow: var(--shadow); cursor: pointer; }
        .player-chip.selected { background: var(--select-bg); border: 2px solid var(--select-border); color: var(--select-border); }
        
        #draw-btn { background: #00b894; color: white; }
        #reset-select-btn { background: #bdc3c7; color: #2d3436; }
    </style>
</head>
<body>

    <div class="zoom-wrap">
        <span style="font-weight:700; color:var(--main);">화면 크기</span>
        <label><input type="radio" name="zoom" onclick="changeZoom('기본')" checked> 기본</label>
        <label><input type="radio" name="zoom" onclick="changeZoom('확대')"> 확대</label>
    </div>

    <div class="card player-select-wrap">
        <h3 style="margin-top:0; font-size:18px;">🕹 선수 선택(게임 인원에 맞게)</h3>
        <div id="friend-chips" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
            <div class="player-chip">경배</div>
            <div class="player-chip">원석</div>
            <div class="player-chip">정석</div>
            <div class="player-chip">진웅</div>
            <div class="player-chip">창한</div>
            <div class="player-chip">경석</div>
        </div>
        
        <div class="button-group">
            <button id="draw-btn" onclick="pickRandomOrder()">🎲 초구 추첨하기</button>
            <button id="reset-select-btn" onclick="resetSelection()">🔄 선택 취소</button>
        </div>
    </div>

    <div class="card searchCard">
        <h3 style="margin-top:0; font-size:18px;">🔍 기간별 선수 전적 검색</h3>
        <div style="margin-bottom: 15px;">
            <p style="font-size: 14px; font-weight: 700; color: var(--main); margin-bottom: 8px;">검색 기간</p>
            <div class="search-input-group">
                <input type="text" id="searchRange" placeholder="날짜 선택">
            </div>
        </div>
        
        <div style="margin-bottom: 20px;">
            <p style="font-size: 14px; font-weight: 700; color: var(--main); margin-bottom: 8px;">선수명</p>
            <div class="search-input-group">
                <select id="searchPlayer" style="width:100%; border:none; background:none; font-size:16px; font-weight:600; outline:none; text-align:center;">
                    <option value="">선택</option>
                    </select>
            </div>
        </div>

        <div class="button-group">
            <button style="background:#0984e3; color:white;" onclick="searchRecords()">기록 검색하기</button>
            <button style="background:#bdc3c7; color:#2d3436;" onclick="resetSearch()">🔄 리셋</button>
        </div>
    </div>

    <script>
        // 확대 모드 대응 changeZoom
        function changeZoom(v) {
            const body = document.body;
            if (v === '확대') {
                body.style.zoom = "1.15";
            } else {
                body.style.zoom = "1.0";
            }
        }

        // [중요] Flatpickr 확대 대응 설정
        flatpickr("#searchRange", {
            locale: "ko",
            mode: "range",
            dateFormat: "Y-m-d",
            static: true, // 달력이 입력창 밑에 고정되게 하여 확대 시 위치 오류 방지
            monthSelectorType: "static",
            onReady: function(selectedDates, dateStr, instance) {
                // 기존 디자인 유지용 로직
            }
        });

        // 나머지 기존 기능 코드 (인원 선택, 추첨, 저장 등) 
        // 사용자께서 작성하신 원본 로직을 이 아래에 그대로 붙여넣으시면 됩니다.
        function pickRandomOrder() { /* 원본 유지 */ }
        function resetSelection() { /* 원본 유지 */ }
        function searchRecords() { /* 원본 유지 */ }
        function resetSearch() { /* 원본 유지 */ }

    </script>
</body>
</html>
