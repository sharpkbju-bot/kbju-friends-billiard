<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr.J의 부동산</title>
    <style>
        /* 기본 스타일 유지 */
        body {
            font-family: 'Pretendard', sans-serif;
            font-weight: 900; /* 폰트 두께 900 유지 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        /* 버튼 그룹 레이아웃: 1mm(약 4px) 간격 설정 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 4px; /* 1mm 간격 구현 */
            margin-top: 20px;
        }

        /* 버튼 공통 디자인 */
        button {
            padding: 10px 20px;
            font-weight: 900; /* 버튼 글자 두께 900 */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            min-width: 80px;
            transition: opacity 0.2s;
        }

        .btn-ok { background-color: #2E8B57; color: white; }
        .btn-cancel { background-color: #6c757d; color: white; }
        .btn-exit { background-color: #dc3545; color: white; }

        button:hover {
            opacity: 0.8;
        }

        /* 안내 문구 */
        .warning-text {
            color: #dc3545;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #2E8B57;">Dr.J의 부동산</h1>
    
    <div id="confirm-area">
        <p class="warning-text">모든 설정을 초기화하시겠습니까?</p>
        
        <div class="button-group">
            <button class="btn-ok" onclick="handleReset()">OK</button>
            <button class="btn-cancel" onclick="handleCancel()">취소</button>
            <button class="btn-exit" onclick="handleExit()">앱 종료</button>
        </div>
    </div>
</div>

<script>
    function handleReset() {
        alert("초기화되었습니다.");
        location.reload();
    }

    function handleCancel() {
        // 취소 시 초기 화면으로 돌아가는 로직 (필요 시 수정)
        document.getElementById('confirm-area').style.display = 'none';
    }

    function handleExit() {
        // 앱 종료(창 닫기)
        window.close();
    }
</script>

</body>
</html>
